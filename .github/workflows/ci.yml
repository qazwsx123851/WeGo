name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/main/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/main/frontend
        run: npm install

      - name: Build Tailwind CSS
        working-directory: src/main/frontend
        run: npm run build

      - name: Copy CSS to static resources
        run: |
          mkdir -p src/main/resources/static/css
          cp src/main/frontend/dist/styles.css src/main/resources/static/css/

      - name: Build with Maven
        run: ./mvnw clean verify -DskipTests

      - name: Run tests
        run: ./mvnw test -Dspring.profiles.active=test

      - name: Generate coverage report
        run: ./mvnw jacoco:report

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/

      - name: Check coverage threshold
        run: |
          COVERAGE=$(grep -oP 'Total.*?([0-9]+)%' target/site/jacoco/index.html | grep -oP '[0-9]+' | head -1 || echo "0")
          echo "Code coverage: ${COVERAGE}%"
          if [ "$COVERAGE" -lt 80 ]; then
            echo "Warning: Coverage is below 80%"
          fi

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Check code style
        run: ./mvnw checkstyle:check || true
