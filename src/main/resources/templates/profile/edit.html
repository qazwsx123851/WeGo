<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(title='編輯個人資料')}"></head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 pb-20">
    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl
                   border-b border-gray-100 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Back Button -->
                <a th:href="@{/profile}" class="flex items-center gap-2 text-gray-600 dark:text-gray-300 hover:text-gray-800 dark:hover:text-gray-100 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                    <span>返回</span>
                </a>

                <!-- Title -->
                <h1 class="text-h5 text-gray-800 dark:text-gray-100 font-heading font-bold">編輯個人檔案</h1>

                <!-- Spacer -->
                <div class="w-16"></div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- Avatar Section -->
        <section class="glass-card p-6 mb-6 text-center animate-fade-in">
            <div class="w-24 h-24 mx-auto rounded-full bg-primary-100 dark:bg-primary-900/30
                        flex items-center justify-center
                        text-primary-600 dark:text-primary-400 text-h2 font-bold
                        overflow-hidden ring-4 ring-white dark:ring-gray-800 shadow-lg">
                <img th:if="${user.avatarUrl}" th:src="${user.avatarUrl}" alt="Profile" class="w-full h-full object-cover">
                <span th:unless="${user.avatarUrl}"
                      th:text="${user.nickname != null ? #strings.substring(user.nickname, 0, 1) : 'U'}">U</span>
            </div>
            <p class="text-body-sm text-gray-500 dark:text-gray-400 mt-3">頭像由 Google 帳戶提供</p>
        </section>

        <!-- Edit Form -->
        <section class="glass-card p-6 animate-fade-in">
            <!-- Error Message -->
            <div th:if="${error}" class="mb-4 p-3 bg-rose-100 dark:bg-rose-900/30 border border-rose-200 dark:border-rose-800 rounded-lg">
                <p class="text-body-sm text-rose-600 dark:text-rose-400" th:text="${error}">錯誤訊息</p>
            </div>

            <form th:action="@{/profile/edit}" method="post" data-validate-form novalidate data-prevent-double-submit class="space-y-6">
                <!-- CSRF Token -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <!-- Nickname Field -->
                <div>
                    <label for="nickname" class="block text-body-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        暱稱
                    </label>
                    <input type="text" id="nickname" name="nickname"
                           th:value="${user.nickname}"
                           maxlength="50"
                           required
                           data-validate="required"
                           data-validate-message="暱稱不可為空"
                           class="w-full px-4 py-3 border border-gray-200 dark:border-gray-700
                                  rounded-lg bg-white dark:bg-gray-800
                                  text-gray-800 dark:text-gray-100
                                  focus:ring-2 focus:ring-primary-500 focus:border-transparent
                                  transition-all duration-200"
                           placeholder="輸入您的暱稱">
                    <p class="mt-1 text-caption text-gray-500 dark:text-gray-400">最多 50 個字</p>
                </div>

                <!-- Email Field (Read-only) -->
                <div>
                    <label for="email" class="block text-body-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        電子郵件
                    </label>
                    <input type="email" id="email" name="email"
                           th:value="${user.email}"
                           readonly
                           disabled
                           class="w-full px-4 py-3 border border-gray-200 dark:border-gray-700
                                  rounded-lg bg-gray-100 dark:bg-gray-800/50
                                  text-gray-500 dark:text-gray-400
                                  cursor-not-allowed">
                    <p class="mt-1 text-caption text-gray-500 dark:text-gray-400">電子郵件由 Google 帳戶提供，無法修改</p>
                </div>

                <!-- Submit Button -->
                <div class="flex gap-3 pt-4">
                    <a th:href="@{/profile}"
                       class="flex-1 px-6 py-3 bg-gray-100 dark:bg-gray-800
                              text-gray-700 dark:text-gray-300
                              rounded-lg font-medium text-center
                              hover:bg-gray-200 dark:hover:bg-gray-700
                              transition-colors duration-200 cursor-pointer">
                        取消
                    </a>
                    <button type="submit"
                            class="flex-1 px-6 py-3 bg-primary-600 hover:bg-primary-700
                                   text-white rounded-lg font-medium
                                   transition-colors duration-200 cursor-pointer">
                        儲存
                    </button>
                </div>
            </form>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="flex justify-around max-w-md mx-auto">
            <!-- Dashboard -->
            <a th:href="@{/dashboard}" class="bottom-nav-item">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span class="text-xs mt-1">行程</span>
            </a>

            <!-- Expenses -->
            <a th:href="@{/expenses}" class="bottom-nav-item">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                <span class="text-xs mt-1">分帳</span>
            </a>

            <!-- Documents -->
            <a th:href="@{/documents}" class="bottom-nav-item">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <span class="text-xs mt-1">檔案</span>
            </a>

            <!-- Profile -->
            <a th:href="@{/profile}" class="bottom-nav-item active">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <span class="text-xs mt-1">我的</span>
            </a>
        </div>
    </nav>

    <!-- Scripts -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Success toast
        const params = new URLSearchParams(window.location.search);
        if (params.get('success') === 'profile_updated') {
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 right-4 z-50 pointer-events-auto animate-fade-in bg-green-500 text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-2';
            toast.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg><span>個人檔案已更新</span>';
            document.body.appendChild(toast);
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
            // Clean URL
            window.history.replaceState({}, '', window.location.pathname);
        }

        // Nickname validation now handled by FormValidation.autoInit() via data-validate attributes
    });
    </script>
    <script th:src="@{/js/app.js}" defer></script>
</body>
</html>
