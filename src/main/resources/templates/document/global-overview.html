<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(title='文件總覽')}"></head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 pb-20">
    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl
                   border-b border-gray-100 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <a th:href="@{/dashboard}" class="flex items-center gap-2">
                    <span class="text-h4 text-primary-600 dark:text-primary-400 font-heading font-bold">WeGo</span>
                </a>

                <!-- User Avatar/Menu -->
                <div class="flex items-center gap-3">
                    <a th:href="@{/profile}"
                       class="w-10 h-10 rounded-full bg-primary-100 dark:bg-primary-900/30
                              flex items-center justify-center
                              text-primary-600 dark:text-primary-400 font-medium
                              hover:ring-2 hover:ring-primary-500/50
                              transition-all duration-200 cursor-pointer overflow-hidden">
                        <img th:if="${picture}" th:src="${picture}" alt="Profile" class="w-full h-full object-cover">
                        <span th:unless="${picture}"
                              th:text="${name != null ? #strings.substring(name, 0, 1) : 'U'}">U</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- Page Title -->
        <section class="mb-6 animate-fade-in">
            <h1 class="text-h2 text-gray-800 dark:text-gray-100 mb-2 font-heading">檔案總覽</h1>
            <p class="text-body text-gray-500 dark:text-gray-400">管理您所有行程中的文件</p>
        </section>

        <!-- Storage Overview -->
        <section class="mb-6 flex flex-wrap gap-4">
            <span class="inline-flex items-center gap-2 px-3 py-1 bg-primary-100 dark:bg-primary-900/30 rounded-full text-body-sm text-primary-700 dark:text-primary-300">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <span th:text="${overview.totalDocuments} + ' 個檔案'">0 個檔案</span>
            </span>
            <span class="inline-flex items-center gap-2 px-3 py-1 bg-gray-100 dark:bg-gray-800 rounded-full text-body-sm text-gray-700 dark:text-gray-300">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
                </svg>
                <span th:text="${overview.formattedStorageSize}">0 KB</span>
            </span>
        </section>

        <!-- Filters -->
        <section class="mb-6">
            <form th:action="@{/documents}" method="get" class="flex flex-col sm:flex-row gap-3">
                <!-- Search -->
                <div class="flex-1">
                    <input type="text" name="search" th:value="${search}"
                           placeholder="搜尋檔案名稱..."
                           class="w-full px-4 py-2 border border-gray-200 dark:border-gray-700
                                  rounded-lg bg-white dark:bg-gray-800
                                  text-gray-800 dark:text-gray-100
                                  focus:ring-2 focus:ring-primary-500 focus:border-transparent
                                  transition-all duration-200">
                </div>

                <!-- Trip Filter -->
                <select name="tripId"
                        class="px-4 py-2 border border-gray-200 dark:border-gray-700
                               rounded-lg bg-white dark:bg-gray-800
                               text-gray-800 dark:text-gray-100
                               focus:ring-2 focus:ring-primary-500 focus:border-transparent
                               transition-all duration-200 cursor-pointer">
                    <option value="">所有行程</option>
                    <option th:each="trip : ${userTrips}"
                            th:value="${trip.id}"
                            th:selected="${selectedTripId != null and selectedTripId.equals(trip.id)}"
                            th:text="${trip.title} + ' (' + ${trip.documentCount} + ')'">行程名稱</option>
                </select>

                <!-- Type Filter -->
                <select name="type"
                        class="px-4 py-2 border border-gray-200 dark:border-gray-700
                               rounded-lg bg-white dark:bg-gray-800
                               text-gray-800 dark:text-gray-100
                               focus:ring-2 focus:ring-primary-500 focus:border-transparent
                               transition-all duration-200 cursor-pointer">
                    <option value="all" th:selected="${selectedType == 'all' or selectedType == null}">所有類型</option>
                    <option value="image" th:selected="${selectedType == 'image'}">圖片</option>
                    <option value="pdf" th:selected="${selectedType == 'pdf'}">PDF</option>
                </select>

                <!-- Submit -->
                <button type="submit"
                        class="px-6 py-2 bg-primary-600 hover:bg-primary-700 text-white
                               rounded-lg font-medium transition-colors duration-200 cursor-pointer">
                    搜尋
                </button>
            </form>
        </section>

        <!-- Documents Grid -->
        <section th:if="${overview.documents != null and !overview.documents.isEmpty()}" class="mb-8">
            <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
                <div th:each="doc : ${overview.documents}"
                     onclick="openDocumentPreview(this)"
                     th:data-id="${doc.id}"
                     th:data-trip-id="${doc.tripId}"
                     th:data-mime="${doc.mimeType ?: ''}"
                     class="glass-card group hover:shadow-card-hover transition-all duration-200 cursor-pointer overflow-hidden">
                    <!-- Preview -->
                    <div class="relative h-40 bg-gray-100 dark:bg-gray-800 flex items-center justify-center">
                        <!-- Image Preview -->
                        <img th:if="${doc.isImage}" th:src="|/api/trips/${doc.tripId}/documents/${doc.id}/preview|"
                             th:alt="${doc.originalFileName}"
                             class="w-full h-full object-cover">
                        <!-- PDF Icon -->
                        <div th:if="${doc.isPdf}" class="text-rose-500">
                            <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                      d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <!-- Other File Icon -->
                        <div th:if="${!doc.isImage and !doc.isPdf}" class="text-gray-400">
                            <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                        </div>
                        <!-- Trip Badge -->
                        <div class="absolute top-2 left-2 px-2 py-1 bg-black/50 backdrop-blur-sm rounded text-caption text-white truncate max-w-[80%]"
                             th:text="${doc.tripTitle}">行程名稱</div>
                    </div>
                    <!-- Info -->
                    <div class="p-3">
                        <h3 class="text-body-sm font-medium text-gray-800 dark:text-gray-100 truncate group-hover:text-primary-600 transition-colors"
                            th:text="${doc.originalFileName}">檔案名稱.jpg</h3>
                        <div class="flex items-center justify-between mt-1">
                            <span class="text-caption text-gray-500 dark:text-gray-400"
                                  th:text="${doc.formattedFileSize}">100 KB</span>
                            <span class="text-caption text-gray-400 dark:text-gray-500"
                                  th:text="${doc.uploadedByName}">上傳者</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Pagination -->
        <section th:if="${overview.totalPages > 1}" class="flex justify-center gap-2 mb-8">
            <a th:if="${overview.hasPrevious}"
               th:href="@{/documents(search=${search}, tripId=${selectedTripId}, type=${selectedType}, page=${currentPage - 1})}"
               class="px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700
                      rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700
                      transition-colors duration-200 cursor-pointer">
                上一頁
            </a>
            <span class="px-4 py-2 bg-primary-600 text-white rounded-lg"
                  th:text="${currentPage + 1} + ' / ' + ${overview.totalPages}">1 / 1</span>
            <a th:if="${overview.hasNext}"
               th:href="@{/documents(search=${search}, tripId=${selectedTripId}, type=${selectedType}, page=${currentPage + 1})}"
               class="px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700
                      rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700
                      transition-colors duration-200 cursor-pointer">
                下一頁
            </a>
        </section>

        <!-- Empty State -->
        <section th:if="${overview.documents == null or overview.documents.isEmpty()}" class="glass-card p-8 text-center animate-fade-in">
            <div class="w-24 h-24 mx-auto mb-4 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center">
                <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
            </div>
            <h3 class="text-h4 text-gray-700 dark:text-gray-200 mb-2 font-heading" th:if="${filter != null and filter.hasFilters()}">找不到符合的檔案</h3>
            <h3 class="text-h4 text-gray-700 dark:text-gray-200 mb-2 font-heading" th:unless="${filter != null and filter.hasFilters()}">還沒有任何檔案</h3>
            <p class="text-body-sm text-gray-500 dark:text-gray-400 mb-6" th:if="${filter != null and filter.hasFilters()}">請嘗試其他搜尋條件</p>
            <p class="text-body-sm text-gray-500 dark:text-gray-400 mb-6" th:unless="${filter != null and filter.hasFilters()}">上傳的憑證和照片會顯示在這裡</p>
            <a th:href="@{/dashboard}" th:unless="${filter != null and filter.hasFilters()}" class="btn-primary">
                前往行程
            </a>
            <a th:href="@{/documents}" th:if="${filter != null and filter.hasFilters()}" class="btn-secondary">
                清除篩選
            </a>
        </section>
    </main>

    <!-- Dynamic Pill Bar -->
    <nav th:replace="~{fragments/components :: bottom-nav}"></nav>

    <!-- Document Preview Modal -->
    <div id="preview-modal" class="fixed inset-0 z-50 hidden" aria-modal="true" role="dialog">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/80" onclick="closePreviewModal()"></div>

        <!-- Modal Content -->
        <div class="absolute inset-4 md:inset-8 flex flex-col bg-white dark:bg-gray-900 rounded-2xl overflow-hidden">
            <!-- Header -->
            <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-800 flex items-center justify-between flex-shrink-0">
                <h3 id="preview-title" class="text-base font-semibold text-gray-800 dark:text-gray-100 truncate">document.pdf</h3>
                <div class="flex items-center gap-2">
                    <a id="preview-download" href="#" download
                       class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer"
                       aria-label="下載">
                        <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                        </svg>
                    </a>
                    <button onclick="closePreviewModal()"
                            class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer"
                            aria-label="關閉">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Preview Area -->
            <div id="preview-area" class="flex-1 overflow-auto p-4 flex items-center justify-center bg-gray-100 dark:bg-gray-800">
            </div>

            <!-- Info Footer -->
            <div id="preview-info" class="px-4 py-3 border-t border-gray-100 dark:border-gray-800 text-sm text-gray-500 dark:text-gray-400 flex-shrink-0">
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script th:src="@{/js/app.js}" defer></script>
    <script>
        // CSRF Token
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content || '';
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN';

        function openDocumentPreview(card) {
            const docId = card.dataset.id;
            const tripId = card.dataset.tripId;
            const mimeType = card.dataset.mime || '';
            const isPdf = mimeType === 'application/pdf';
            const isImage = mimeType.startsWith('image/');

            // Get info from card DOM
            const fileName = card.querySelector('h3')?.textContent || '';
            const fileSize = card.querySelector('.text-caption')?.textContent || '';
            const tripName = card.querySelector('.absolute')?.textContent || '';

            // Update modal header
            document.getElementById('preview-title').textContent = fileName;
            document.getElementById('preview-info').textContent = fileSize + (tripName ? ' - ' + tripName : '');
            document.getElementById('preview-download').href = '#';

            // Clear and populate preview area
            const previewArea = document.getElementById('preview-area');
            previewArea.innerHTML = '';

            // Show modal
            document.getElementById('preview-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            if (isImage) {
                const img = document.createElement('img');
                img.src = '/api/trips/' + tripId + '/documents/' + docId + '/preview';
                img.alt = fileName;
                img.className = 'max-w-full max-h-full object-contain rounded-lg';
                previewArea.appendChild(img);
                fetchPreviewDownloadUrl(tripId, docId);
            } else if (isPdf) {
                const previewUrl = '/api/trips/' + tripId + '/documents/' + docId + '/preview';
                renderPdfPreview(previewArea, previewUrl);
                fetchPreviewDownloadUrl(tripId, docId);
            } else {
                renderGenericPreview(previewArea);
                fetchPreviewDownloadUrl(tripId, docId);
            }
        }

        function renderPdfPreview(container, url) {
            container.innerHTML = '';
            const iframe = document.createElement('iframe');
            iframe.src = url;
            iframe.className = 'w-full h-full rounded-xl';
            iframe.style.border = 'none';
            iframe.style.minHeight = '400px';
            iframe.title = 'PDF Preview';

            let loaded = false;
            iframe.onload = function() { loaded = true; };
            iframe.onerror = function() { renderPreviewError(container); };
            setTimeout(function() {
                if (!loaded) { renderPreviewError(container); }
            }, 15000);

            container.appendChild(iframe);
        }

        function renderPreviewError(container) {
            container.innerHTML = '';
            const wrapper = document.createElement('div');
            wrapper.className = 'text-center';
            wrapper.setAttribute('role', 'alert');
            wrapper.innerHTML = '<svg class="w-20 h-20 mx-auto text-gray-400 dark:text-gray-500 mb-4" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 2l5 5h-5V4z"/></svg>';
            const label = document.createElement('p');
            label.className = 'text-gray-500 dark:text-gray-400 mb-4';
            label.textContent = '無法預覽此檔案';
            wrapper.appendChild(label);

            const downloadBtn = document.createElement('a');
            downloadBtn.href = document.getElementById('preview-download').href || '#';
            downloadBtn.className = 'inline-flex items-center gap-2 px-4 py-2 bg-primary-500 text-white rounded-xl hover:bg-primary-600 transition-colors';
            downloadBtn.setAttribute('download', '');
            downloadBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>';
            const btnText = document.createElement('span');
            btnText.textContent = '下載查看';
            downloadBtn.appendChild(btnText);
            wrapper.appendChild(downloadBtn);

            container.appendChild(wrapper);
        }

        function renderGenericPreview(container) {
            container.innerHTML = '';
            const wrapper = document.createElement('div');
            wrapper.className = 'text-center';
            wrapper.innerHTML = '<svg class="w-24 h-24 mx-auto text-gray-400 dark:text-gray-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>';
            const label = document.createElement('p');
            label.className = 'text-gray-600 dark:text-gray-400';
            label.textContent = '此檔案類型不支援預覽';
            wrapper.appendChild(label);
            container.appendChild(wrapper);
        }

        async function fetchPreviewDownloadUrl(tripId, docId) {
            try {
                const response = await fetch('/api/trips/' + tripId + '/documents/' + docId + '/download');
                if (response.ok) {
                    const result = await response.json();
                    if (result.success && result.data && result.data.downloadUrl) {
                        document.getElementById('preview-download').href = result.data.downloadUrl;
                    }
                }
            } catch (error) {
                // Download URL fetch failed silently - download button stays as '#'
            }
        }

        function closePreviewModal() {
            document.getElementById('preview-modal').classList.add('hidden');
            document.body.style.overflow = '';
            // Clear iframe to stop any ongoing loads
            document.getElementById('preview-area').innerHTML = '';
        }

        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closePreviewModal();
            }
        });
    </script>
</body>
</html>
