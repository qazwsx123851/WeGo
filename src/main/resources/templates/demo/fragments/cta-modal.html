<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="cta-modal">
    <!-- Backdrop -->
    <div id="cta-modal-backdrop" class="fixed inset-0 bg-black/50 z-[100] hidden transition-opacity duration-300 opacity-0">
    </div>

    <!-- Modal -->
    <div id="cta-modal" class="fixed inset-0 z-[101] flex items-center justify-center p-4 hidden">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-sm w-full p-8 text-center transform transition-all duration-300 scale-95 opacity-0"
             id="cta-modal-content">
            <!-- Icon -->
            <div class="mx-auto w-16 h-16 bg-primary-100 dark:bg-primary-900/30 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8 text-primary-600 dark:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
                </svg>
            </div>

            <!-- Dynamic Title -->
            <h3 id="cta-title" class="text-xl font-bold text-gray-900 dark:text-white mb-2">
                想要開始規劃自己的旅程？
            </h3>

            <!-- Description -->
            <p class="text-gray-500 dark:text-gray-400 mb-6">
                免費註冊即可開始規劃你的旅程
            </p>

            <!-- Google Login Button -->
            <a th:href="@{/oauth2/authorization/google}"
               class="inline-flex items-center justify-center gap-3 w-full px-6 py-3 bg-white dark:bg-gray-700 border-2 border-gray-200 dark:border-gray-600 rounded-xl shadow-sm hover:shadow-md hover:border-primary-300 dark:hover:border-primary-500 transition-all duration-200 font-medium text-gray-700 dark:text-gray-200 mb-3">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Google 帳號登入
            </a>

            <!-- Continue Browsing Link -->
            <button id="cta-dismiss" class="text-sm text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
                繼續瀏覽 Demo
            </button>
        </div>
    </div>
</div>
</body>
</html>
