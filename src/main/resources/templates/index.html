<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='首頁')}"></head>
<body class="min-h-screen bg-gradient-to-br from-primary-50 via-white to-sky-100
             dark:from-gray-900 dark:via-gray-900 dark:to-gray-800">

    <div class="min-h-screen flex flex-col-reverse md:flex-row">

        <!-- Left: Branding + Login -->
        <div class="flex-1 flex flex-col items-center justify-center p-8 md:p-12">
            <div class="max-w-sm w-full text-center md:text-left">
                <!-- Logo -->
                <h1 class="text-display text-primary-900 dark:text-primary-400 font-heading">WeGo</h1>
                <p class="text-body-lg text-gray-600 dark:text-gray-400 mt-2">旅遊規劃協作平台</p>

                <!-- Tagline -->
                <p class="text-body text-gray-500 dark:text-gray-400 mt-6 mb-8">
                    專為好友、小團體設計的「重協作」旅遊規劃平台<br>
                    讓行程規劃變得輕鬆有趣
                </p>

                <!-- CTA Button -->
                <a th:href="@{/oauth2/authorization/google}"
                   class="btn-google"
                   aria-label="使用 Google 帳號登入">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    使用 Google 帳號登入
                </a>

                <!-- Footer -->
                <footer class="mt-8 text-caption text-gray-400 dark:text-gray-500">
                    &copy; <span th:text="${#temporals.year(#temporals.createNow())}">2026</span> WeGo. Made with love for travelers.
                </footer>
            </div>
        </div>

        <!-- Right: Feature Animation -->
        <div class="shrink-0 md:flex-1 flex flex-col items-center justify-center p-6 md:p-10
                    bg-gray-50/50 dark:bg-gray-800/30">
            <div class="w-full max-w-xl">
                <!-- Animation Stage -->
                <div id="animation-stage"
                     class="w-full h-[420px] sm:h-[480px] md:h-[520px] overflow-hidden"
                     style="opacity:0;transition:opacity 0.4s ease">
                </div>
            </div>
        </div>

    </div>

    <!-- Landing Animation Script -->
    <script th:src="@{/js/landing-animation.js}" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.LandingAnimation) {
                LandingAnimation.init('animation-stage');
            }
        });
    </script>
</body>
</html>
