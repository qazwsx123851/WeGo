<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<!--
    AI Chat Widget Fragment
    Floating chat button + expandable chat window for AI travel assistant.
    Mobile: bottom sheet (full-width, slide-up, backdrop)
    Desktop: floating card (right-side, scale animation)
    Include in trip pages: th:replace="~{fragments/chat-widget :: chat-widget(tripId=${trip.id})}"
-->

<th:block th:fragment="chat-widget(tripId)">

    <!-- Backdrop (mobile only) -->
    <div id="chat-backdrop"
         class="fixed inset-0 bg-black/30 z-[51]
                hidden transition-opacity duration-300"></div>

    <!-- Floating Chat Button -->
    <button id="chat-toggle-btn"
            th:data-trip-id="${tripId}"
            aria-label="開啟 AI 旅遊助手"
            class="fixed right-6 bottom-[10.5rem] z-[52]
                   w-14 h-14 rounded-full
                   bg-primary-500 hover:bg-primary-600 active:bg-primary-700
                   text-white shadow-lg shadow-primary-500/30
                   flex items-center justify-center
                   transition-all duration-200 active:scale-95 cursor-pointer">
        <!-- Gemini sparkle icon -->
        <svg id="chat-icon-open" class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M11.04 19.32Q12 21.51 12 24q0-2.49.93-4.68.96-2.19 2.58-3.81t3.81-2.55Q21.51 12 24 12q-2.49 0-4.68-.93a12.3 12.3 0 0 1-3.81-2.58 12.3 12.3 0 0 1-2.58-3.81Q12 2.49 12 0q0 2.49-.96 4.68-.93 2.19-2.55 3.81a12.3 12.3 0 0 1-3.81 2.58Q2.49 12 0 12q2.49 0 4.68.96 2.19.93 3.81 2.55t2.55 3.81"/>
        </svg>
        <!-- Close icon (hidden by default, desktop only) -->
        <svg id="chat-icon-close" class="w-7 h-7 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>

    <!-- Chat Window -->
    <div id="chat-window"
         class="fixed inset-x-0 bottom-0 sm:inset-x-auto sm:right-6 sm:bottom-[13rem] z-[52]
                w-full sm:w-[26rem] h-[85dvh] sm:h-[32rem] sm:max-h-[calc(100dvh-10rem)]
                bg-white dark:bg-gray-800
                rounded-t-2xl sm:rounded-2xl shadow-2xl
                border border-gray-200 dark:border-gray-700
                flex flex-col overflow-hidden
                transition-all duration-300 ease-out
                translate-y-full sm:translate-y-0
                sm:origin-bottom-right sm:scale-0
                opacity-0 pointer-events-none">

        <!-- Header -->
        <div class="flex items-center gap-3 px-4 py-2
                    bg-primary-500 text-white">
            <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M11.04 19.32Q12 21.51 12 24q0-2.49.93-4.68.96-2.19 2.58-3.81t3.81-2.55Q21.51 12 24 12q-2.49 0-4.68-.93a12.3 12.3 0 0 1-3.81-2.58 12.3 12.3 0 0 1-2.58-3.81Q12 2.49 12 0q0 2.49-.96 4.68-.93 2.19-2.55 3.81a12.3 12.3 0 0 1-3.81 2.58Q2.49 12 0 12q2.49 0 4.68.96 2.19.93 3.81 2.55t2.55 3.81"/>
                </svg>
            </div>
            <div class="flex-1 min-w-0">
                <h3 class="font-semibold text-sm">WeGo 旅遊助手</h3>
                <p class="text-xs text-white/80">旅遊、美食、景點推薦</p>
            </div>
            <!-- Expand button (desktop only) -->
            <button id="chat-expand-btn"
                    aria-label="展開聊天視窗"
                    class="hidden sm:flex w-8 h-8 rounded-full bg-white/20
                           items-center justify-center
                           hover:bg-white/30 transition-colors cursor-pointer">
                <svg id="chat-expand-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5v-4m0 4h-4m4 0l-5-5"/>
                </svg>
                <svg id="chat-collapse-icon" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 4v1.5M9 4H4m5 0L4 9m11-5v1.5M15 4h5m-5 0l5 5M9 20v-1.5M9 20H4m5 0l-5-5m11 5v-1.5m0 1.5h5m-5 0l5-5"/>
                </svg>
            </button>
            <!-- Close button in header -->
            <button id="chat-close-header"
                    aria-label="關閉聊天"
                    class="w-8 h-8 rounded-full bg-white/20
                           flex items-center justify-center
                           hover:bg-white/30 transition-colors cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Messages Area -->
        <div id="chat-messages"
             class="flex-1 overflow-y-auto overscroll-y-contain px-4 py-3 space-y-3">
            <!-- Welcome message -->
            <div class="flex gap-2">
                <div class="w-7 h-7 rounded-full bg-primary-100 dark:bg-primary-900/30
                            flex items-center justify-center flex-shrink-0 mt-0.5">
                    <svg class="w-4 h-4 text-primary-600 dark:text-primary-400" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M11.04 19.32Q12 21.51 12 24q0-2.49.93-4.68.96-2.19 2.58-3.81t3.81-2.55Q21.51 12 24 12q-2.49 0-4.68-.93a12.3 12.3 0 0 1-3.81-2.58 12.3 12.3 0 0 1-2.58-3.81Q12 2.49 12 0q0 2.49-.96 4.68-.93 2.19-2.55 3.81a12.3 12.3 0 0 1-3.81 2.58Q2.49 12 0 12q2.49 0 4.68.96 2.19.93 3.81 2.55t2.55 3.81"/>
                    </svg>
                </div>
                <div class="bg-gray-100 dark:bg-gray-700 rounded-2xl rounded-tl-sm px-3 py-2 max-w-[88%]">
                    <p class="text-sm text-gray-800 dark:text-gray-200">
                        你好！我是 WeGo 旅遊助手，可以幫你推薦餐廳、景點和行程安排。有什麼想問的嗎？
                    </p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="px-4 pt-2 pb-[calc(0.75rem+env(safe-area-inset-bottom))]">
            <!-- Unified input container -->
            <div class="flex items-center
                        bg-gray-50 dark:bg-gray-700
                        rounded-2xl
                        border border-gray-200 dark:border-gray-600
                        focus-within:ring-2 focus-within:ring-primary-500/50
                        transition-all duration-200
                        pl-4 pr-1.5 py-1.5">
                <textarea id="chat-input"
                          rows="1"
                          maxlength="500"
                          aria-label="輸入訊息"
                          placeholder="輸入你的問題..."
                          class="flex-1 resize-none bg-transparent border-0
                                 py-1.5 text-base
                                 text-gray-800 dark:text-gray-200
                                 placeholder-gray-400 dark:placeholder-gray-500
                                 focus:outline-none focus:ring-0 focus-visible:ring-0 focus-visible:ring-offset-0
                                 max-h-20 overflow-y-auto"></textarea>
                <button id="chat-send-btn"
                        disabled
                        aria-label="發送訊息"
                        class="w-10 h-10 rounded-xl
                               bg-primary-500 hover:bg-primary-600
                               disabled:bg-gray-300 dark:disabled:bg-gray-600
                               disabled:cursor-not-allowed
                               text-white flex items-center justify-center
                               transition-colors duration-200 cursor-pointer
                               touch-manipulation
                               flex-shrink-0 ml-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 19V5m0 0l-7 7m7-7l7 7"/>
                    </svg>
                </button>
            </div>
            <div class="flex items-center justify-between mt-1 px-1">
                <p class="text-[11px] text-gray-400 dark:text-gray-500">
                    Gemini 2.5 Flash · 回覆僅供參考
                </p>
                <span id="chat-char-count"
                      aria-live="polite"
                      class="text-[11px] text-gray-400 dark:text-gray-500 tabular-nums">
                    0/500
                </span>
            </div>
        </div>
    </div>

    <script th:src="@{/js/chat.js(v=4)}" defer></script>
</th:block>

</html>
