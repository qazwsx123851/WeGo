<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<!--
    WeGo UI Component Library
    Reusable Thymeleaf fragments for consistent UI across the application.
    Based on: docs/ui-design-guide.md

    Usage:
    <div th:replace="~{fragments/components :: button-primary(text='建立行程')}"></div>
-->

<!-- =====================================================
     BUTTONS
     ===================================================== -->

<!-- Primary Button (CTA - Adventure Orange) -->
<button th:fragment="button-cta(text, type='button', disabled=false)"
        th:type="${type}"
        th:disabled="${disabled}"
        class="btn-cta inline-flex items-center justify-center gap-2">
    <span th:text="${text}">按鈕文字</span>
</button>

<!-- Primary Button (Sky Blue) -->
<button th:fragment="button-primary(text, type='button', disabled=false)"
        th:type="${type}"
        th:disabled="${disabled}"
        class="btn-primary inline-flex items-center justify-center gap-2">
    <span th:text="${text}">按鈕文字</span>
</button>

<!-- Secondary Button (Outlined) -->
<button th:fragment="button-secondary(text, type='button', disabled=false)"
        th:type="${type}"
        th:disabled="${disabled}"
        class="min-h-[44px] cursor-pointer rounded-xl border border-gray-200 dark:border-gray-600
               bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700
               px-4 py-2.5 font-medium text-gray-700 dark:text-gray-200
               transition-all duration-200 active:scale-[0.98]
               focus:outline-none focus:ring-2 focus:ring-primary-500/50
               disabled:cursor-not-allowed disabled:opacity-50
               inline-flex items-center justify-center gap-2">
    <span th:text="${text}">按鈕文字</span>
</button>

<!-- Danger Button -->
<button th:fragment="button-danger(text, type='button', disabled=false)"
        th:type="${type}"
        th:disabled="${disabled}"
        class="min-h-[44px] cursor-pointer rounded-xl
               bg-error hover:bg-red-600 active:bg-red-700
               px-4 py-2.5 font-medium text-white
               transition-all duration-200 active:scale-[0.98]
               focus:outline-none focus:ring-2 focus:ring-error/50
               disabled:cursor-not-allowed disabled:opacity-50
               inline-flex items-center justify-center gap-2">
    <span th:text="${text}">按鈕文字</span>
</button>

<!-- Text Button -->
<button th:fragment="button-text(text, type='button')"
        th:type="${type}"
        class="btn-text inline-flex items-center justify-center gap-2">
    <span th:text="${text}">按鈕文字</span>
</button>

<!-- Icon Button -->
<button th:fragment="button-icon(ariaLabel)"
        th:aria-label="${ariaLabel}"
        type="button"
        class="p-2.5 min-w-[44px] min-h-[44px] rounded-full cursor-pointer
               text-gray-500 hover:text-gray-700 dark:hover:text-gray-200
               hover:bg-gray-100 dark:hover:bg-gray-800
               transition-colors duration-200
               focus:outline-none focus:ring-2 focus:ring-primary-500/50">
    <!-- Icon slot - use th:insert to add icon -->
</button>

<!-- Dark Mode Toggle Button -->
<button th:fragment="dark-mode-toggle"
        id="dark-mode-toggle"
        type="button"
        aria-label="切換深色模式"
        onclick="DarkMode.toggle(); this.querySelector('.icon-sun').classList.toggle('hidden'); this.querySelector('.icon-moon').classList.toggle('hidden');"
        class="p-2 min-w-[44px] min-h-[44px] rounded-full cursor-pointer
               text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200
               hover:bg-gray-100 dark:hover:bg-gray-800
               transition-colors duration-200
               focus:outline-none focus:ring-2 focus:ring-primary-500/50">
    <!-- Sun icon (shown in dark mode - click to switch to light) -->
    <svg class="icon-sun w-6 h-6 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
    </svg>
    <!-- Moon icon (shown in light mode - click to switch to dark) -->
    <svg class="icon-moon w-6 h-6 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
    </svg>
</button>


<!-- =====================================================
     CARDS
     ===================================================== -->

<!-- Glass Card -->
<div th:fragment="card-glass" class="glass-card p-6">
    <!-- Content slot -->
</div>

<!-- Standard Card -->
<div th:fragment="card"
     class="bg-white dark:bg-gray-800 rounded-2xl shadow-card hover:shadow-card-hover
            transition-all duration-300 overflow-hidden cursor-pointer">
    <!-- Content slot -->
</div>

<!-- Trip Card -->
<div th:fragment="trip-card(trip)"
     class="bg-white dark:bg-gray-800 rounded-2xl shadow-card hover:shadow-card-hover
            transition-all duration-300 overflow-hidden cursor-pointer group">
    <!-- Cover Image -->
    <div class="aspect-[16/9] bg-gray-100 dark:bg-gray-700 overflow-hidden">
        <img th:if="${trip.coverImageUrl}"
             th:src="${trip.coverImageUrl}"
             th:alt="${trip.title} + ' 封面'"
             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
             loading="lazy"/>
        <div th:unless="${trip.coverImageUrl}"
             class="w-full h-full flex items-center justify-center text-gray-400">
            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
        </div>
    </div>

    <!-- Content -->
    <div class="p-4 space-y-3">
        <h3 class="text-base font-semibold text-gray-800 dark:text-gray-100" th:text="${trip.title}">
            行程名稱
        </h3>
        <p class="text-sm text-gray-500 dark:text-gray-400">
            <span th:text="${#temporals.format(trip.startDate, 'MM/dd')}">01/01</span>
            -
            <span th:text="${#temporals.format(trip.endDate, 'MM/dd')}">01/07</span>
        </p>

        <!-- Member Avatars -->
        <div class="flex -space-x-2" th:if="${(trip?.memberCount ?: 0) > 0}">
            <span class="w-8 h-8 rounded-full bg-primary-100 dark:bg-primary-900/30
                         flex items-center justify-center text-xs font-medium
                         text-primary-600 dark:text-primary-400
                         ring-2 ring-white dark:ring-gray-800"
                  th:text="${(trip?.memberCount ?: 0)} + ' 人'">
                5 人
            </span>
        </div>
    </div>
</div>


<!-- =====================================================
     FORM ELEMENTS
     ===================================================== -->

<!-- Input Field -->
<div th:fragment="input(id, label, type='text', placeholder='', required=false)"
     class="space-y-1.5">
    <label th:for="${id}"
           class="block text-sm font-medium text-gray-700 dark:text-gray-300"
           th:text="${label}">
        標籤
    </label>
    <input th:id="${id}"
           th:name="${id}"
           th:type="${type}"
           th:placeholder="${placeholder}"
           th:required="${required}"
           autocomplete="off"
           class="w-full px-4 py-3
                  bg-white dark:bg-gray-800
                  border border-gray-200 dark:border-gray-700
                  rounded-xl
                  text-gray-800 dark:text-gray-100
                  placeholder:text-gray-400 dark:placeholder:text-gray-500
                  focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500
                  transition-all duration-200"/>
    <p class="text-xs text-error hidden" role="alert">此欄位必填</p>
</div>

<!-- Textarea -->
<div th:fragment="textarea(id, label, placeholder='', rows=4)"
     class="space-y-1.5">
    <label th:for="${id}"
           class="block text-sm font-medium text-gray-700 dark:text-gray-300"
           th:text="${label}">
        標籤
    </label>
    <textarea th:id="${id}"
              th:name="${id}"
              th:placeholder="${placeholder}"
              th:rows="${rows}"
              class="w-full px-4 py-3
                     bg-white dark:bg-gray-800
                     border border-gray-200 dark:border-gray-700
                     rounded-xl
                     text-gray-800 dark:text-gray-100
                     placeholder:text-gray-400 dark:placeholder:text-gray-500
                     focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500
                     transition-all duration-200 resize-none"></textarea>
</div>

<!-- Select Dropdown -->
<div th:fragment="select(id, label)"
     class="space-y-1.5">
    <label th:for="${id}"
           class="block text-sm font-medium text-gray-700 dark:text-gray-300"
           th:text="${label}">
        標籤
    </label>
    <select th:id="${id}"
            th:name="${id}"
            class="w-full px-4 py-3
                   bg-white dark:bg-gray-800
                   border border-gray-200 dark:border-gray-700
                   rounded-xl
                   text-gray-800 dark:text-gray-100
                   focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500
                   cursor-pointer">
        <!-- Options slot -->
    </select>
</div>


<!-- =====================================================
     FEEDBACK COMPONENTS
     ===================================================== -->

<!-- Toast Container -->
<div th:fragment="toast-container"
     id="toast-container"
     role="status"
     aria-live="polite"
     class="fixed top-4 right-4 z-50 space-y-3">
    <!-- Toast messages will be inserted here dynamically -->
</div>

<!-- Success Toast -->
<div th:fragment="toast-success(title, message)"
     class="flex items-center gap-3
            bg-white dark:bg-gray-800
            rounded-xl shadow-lg
            border-l-4 border-success
            px-4 py-3
            min-w-[280px]
            animate-slide-in">
    <svg class="w-5 h-5 text-success flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
    </svg>
    <div class="flex-1">
        <p class="font-medium text-gray-800 dark:text-gray-100" th:text="${title}">成功</p>
        <p th:if="${message}" class="text-sm text-gray-500 dark:text-gray-400" th:text="${message}">訊息</p>
    </div>
    <button aria-label="關閉通知"
            onclick="this.parentElement.remove()"
            class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 p-1 cursor-pointer">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
</div>

<!-- Error Toast -->
<div th:fragment="toast-error(title, message)"
     class="flex items-center gap-3
            bg-white dark:bg-gray-800
            rounded-xl shadow-lg
            border-l-4 border-error
            px-4 py-3
            min-w-[280px]
            animate-slide-in">
    <svg class="w-5 h-5 text-error flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <div class="flex-1">
        <p class="font-medium text-gray-800 dark:text-gray-100" th:text="${title}">錯誤</p>
        <p th:if="${message}" class="text-sm text-gray-500 dark:text-gray-400" th:text="${message}">訊息</p>
    </div>
    <button aria-label="關閉通知"
            onclick="this.parentElement.remove()"
            class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 p-1 cursor-pointer">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
</div>

<!-- Warning Toast -->
<div th:fragment="toast-warning(title, message)"
     class="flex items-center gap-3
            bg-white dark:bg-gray-800
            rounded-xl shadow-lg
            border-l-4 border-warning
            px-4 py-3
            min-w-[280px]
            animate-slide-in">
    <svg class="w-5 h-5 text-warning flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
    </svg>
    <div class="flex-1">
        <p class="font-medium text-gray-800 dark:text-gray-100" th:text="${title}">警告</p>
        <p th:if="${message}" class="text-sm text-gray-500 dark:text-gray-400" th:text="${message}">訊息</p>
    </div>
    <button aria-label="關閉通知"
            onclick="this.parentElement.remove()"
            class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 p-1 cursor-pointer">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
</div>


<!-- =====================================================
     LAYOUT COMPONENTS
     ===================================================== -->

<!-- Header -->
<header th:fragment="header(title)"
        class="sticky top-0 z-40 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl
               border-b border-gray-100 dark:border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <h1 class="text-h4 text-gray-800 dark:text-gray-100 font-heading" th:text="${title}">
                頁面標題
            </h1>
            <div class="flex items-center gap-2">
                <!-- Dark Mode Toggle -->
                <button id="header-dark-mode-toggle"
                        type="button"
                        aria-label="切換深色模式"
                        onclick="DarkMode.toggle(); this.querySelector('.icon-sun').classList.toggle('hidden'); this.querySelector('.icon-moon').classList.toggle('hidden');"
                        class="p-2 min-w-[44px] min-h-[44px] rounded-full cursor-pointer
                               text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200
                               hover:bg-gray-100 dark:hover:bg-gray-800
                               transition-colors duration-200
                               focus:outline-none focus:ring-2 focus:ring-primary-500/50">
                    <svg class="icon-sun w-6 h-6 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <svg class="icon-moon w-6 h-6 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                </button>
                <div id="header-actions">
                    <!-- Action buttons slot -->
                </div>
            </div>
        </div>
    </div>
</header>

<!-- Bottom Navigation -->
<nav th:fragment="bottom-nav"
     class="bottom-nav">
    <div class="flex justify-around max-w-md mx-auto">
        <!-- Dashboard -->
        <a th:href="@{/dashboard}"
           th:classappend="${#strings.startsWith(currentPath, '/dashboard') ? 'active' : ''}"
           class="bottom-nav-item">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            <span class="text-xs mt-1">行程</span>
        </a>

        <!-- Expenses -->
        <a th:href="@{/expenses}"
           th:classappend="${#strings.startsWith(currentPath, '/expenses') ? 'active' : ''}"
           class="bottom-nav-item">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            <span class="text-xs mt-1">分帳</span>
        </a>

        <!-- Add Button -->
        <button aria-label="新增"
                class="-mt-5 w-14 h-14 bg-adventure-500 hover:bg-adventure-600
                       rounded-full text-white shadow-lg shadow-adventure-500/30
                       flex items-center justify-center
                       transition-all duration-200 active:scale-95 cursor-pointer">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
        </button>

        <!-- Documents -->
        <a th:href="@{/documents}"
           th:classappend="${#strings.startsWith(currentPath, '/documents') ? 'active' : ''}"
           class="bottom-nav-item">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <span class="text-xs mt-1">檔案</span>
        </a>

        <!-- Profile -->
        <a th:href="@{/profile}"
           th:classappend="${#strings.startsWith(currentPath, '/profile') ? 'active' : ''}"
           class="bottom-nav-item">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span class="text-xs mt-1">我的</span>
        </a>
    </div>
</nav>


<!-- =====================================================
     LOADING STATES
     ===================================================== -->

<!-- Skeleton Card -->
<div th:fragment="skeleton-card"
     class="bg-white dark:bg-gray-800 rounded-2xl overflow-hidden animate-pulse">
    <div class="aspect-[16/9] bg-gray-200 dark:bg-gray-700"></div>
    <div class="p-4 space-y-3">
        <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-3/4"></div>
        <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-1/2"></div>
        <div class="flex gap-2">
            <div class="w-8 h-8 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
            <div class="w-8 h-8 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
        </div>
    </div>
</div>

<!-- Loading Spinner -->
<div th:fragment="spinner"
     class="flex items-center justify-center p-4">
    <svg class="animate-spin h-8 w-8 text-primary-500" fill="none" viewBox="0 0 24 24" aria-hidden="true">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <span class="sr-only">載入中...</span>
</div>


<!-- =====================================================
     EMPTY STATES
     ===================================================== -->

<!-- Empty State -->
<div th:fragment="empty-state(title, description)"
     class="text-center py-12 px-4">
    <div class="w-24 h-24 mx-auto mb-6 text-gray-300 dark:text-gray-600">
        <svg class="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                  d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
    </div>
    <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-2" th:text="${title}">
        沒有資料
    </h3>
    <p class="text-sm text-gray-500 dark:text-gray-400" th:text="${description}">
        描述文字
    </p>
</div>

</html>
