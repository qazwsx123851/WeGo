<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<!--
    WeGo Head Fragment
    Base HTML head element with meta tags, styles, and scripts.

    Usage:
    <head th:replace="~{fragments/head :: head(title='Page Title')}"></head>
-->

<!-- Base HTML Head -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <meta name="description" content="WeGo - 協作旅遊規劃平台">
    <meta name="theme-color" content="#0EA5E9">

    <!-- Dark Mode FOUC Prevention (must be inline and before styles) -->
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (theme === 'dark' || (!theme && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <!-- CSRF Token for AJAX requests -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <title th:text="${title} + ' - WeGo'">WeGo</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">

    <!-- Styles -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Anime.js v4 for stagger, timeline, scroll-triggered animations -->
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.0.2/lib/anime.umd.min.js"
            integrity="sha256-eYoXzWhAlC04pvV6/3nbaIRPo+LrT85bQ89TJbyOygQ="
            crossorigin="anonymous" defer></script>

    <!-- Lottie for animations -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.2/dist/lottie-player.js" defer></script>

    <!-- Flatpickr Date Picker -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/zh-tw.js" defer></script>

    <!-- WeGo Common Utilities (must load before page-specific JS) -->
    <script th:src="@{/js/common.js}"></script>
</head>

</html>
