<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="personalTab">
<body>
<div class="max-w-4xl mx-auto px-4 py-6"
     th:with="currSymbol=${(defaultCurrency ?: 'TWD') == 'TWD' ? 'NT$' : '$'}">
    <!-- 1. Summary card — only show when expenses exist -->
    <div class="mb-3 glass-card overflow-hidden"
         th:if="${personalExpenses != null and not #lists.isEmpty(personalExpenses)}">
        <!-- Hero total -->
        <div class="px-5 pt-4 pb-3">
                <p class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-1">個人總覽</p>
                <p class="text-3xl font-bold text-gray-900 dark:text-white tabular-nums"
                   th:text="${personalSummary != null ? currSymbol + #numbers.formatDecimal(personalSummary.totalAmount, 0, 'COMMA', 0, 'POINT') : currSymbol + '0'}">NT$0</p>
                <p class="text-xs text-gray-400 dark:text-gray-500 mt-0.5" th:text="${defaultCurrency ?: 'TWD'}">TWD</p>
        </div>

        <!-- Stats strip -->
        <div class="grid grid-cols-2 divide-x divide-gray-100 dark:divide-gray-700 border-t border-gray-100 dark:border-gray-700">
            <div class="px-5 py-3">
                <p class="text-xs text-gray-400 dark:text-gray-500 mb-0.5">日均花費</p>
                <p class="text-lg font-semibold text-gray-800 dark:text-gray-200 tabular-nums"
                   th:text="${personalSummary?.dailyAverage != null ? currSymbol + #numbers.formatDecimal(personalSummary.dailyAverage, 0, 'COMMA', 0, 'POINT') : '-'}">-</p>
            </div>
            <div class="px-5 py-3">
                <p class="text-xs text-gray-400 dark:text-gray-500 mb-0.5">記帳筆數</p>
                <p class="text-lg font-semibold text-gray-800 dark:text-gray-200"
                   th:text="${personalExpenses != null ? #lists.size(personalExpenses) : 0} + ' 筆'">0 筆</p>
            </div>
        </div>

        <!-- Budget: set -->
        <div class="px-5 py-3 border-t border-gray-100 dark:border-gray-700"
             th:if="${hasBudget and personalSummary != null}">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs font-medium text-gray-500 dark:text-gray-400">預算追蹤</span>
                <div class="flex items-center gap-1.5">
                    <span class="text-xs tabular-nums text-gray-600 dark:text-gray-300"
                          id="budget-display"
                          th:data-budget="${personalSummary.budget}">
                        <th:block th:text="${currSymbol + #numbers.formatDecimal(personalSummary.totalAmount, 0, 'COMMA', 0, 'POINT')}"/>
                        <span class="text-gray-300 dark:text-gray-600">/</span>
                        <th:block th:text="${currSymbol + #numbers.formatDecimal(personalSummary.budget, 0, 'COMMA', 0, 'POINT')}"/>
                    </span>
                    <button data-action="show-budget-modal"
                            class="p-1 rounded text-gray-300 hover:text-gray-500 dark:hover:text-gray-300 transition-colors cursor-pointer"
                            aria-label="編輯預算">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                        </svg>
                    </button>
                </div>
            </div>
            <!-- Progress bar with ARIA -->
            <div class="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-2.5 mb-1.5 overflow-hidden"
                 role="progressbar"
                 th:attr="aria-valuenow=${budgetPercentageCapped}, aria-valuemin=0, aria-valuemax=100"
                 th:aria-label="${'預算使用 ' + budgetPercentageCapped + '%'}">
                <div class="h-2.5 rounded-full transition-all duration-700 ease-out"
                     th:classappend="${personalSummary.budgetStatus?.name() == 'RED'} ? 'bg-red-500' : (${personalSummary.budgetStatus?.name() == 'YELLOW'} ? 'bg-yellow-400' : 'bg-emerald-500')"
                     th:style="'width: ' + ${budgetPercentageCapped} + '%'"></div>
            </div>
            <p class="text-[11px] font-medium flex items-center gap-1"
               th:classappend="${personalSummary.budgetStatus?.name() == 'RED'} ? 'text-red-500' : (${personalSummary.budgetStatus?.name() == 'YELLOW'} ? 'text-yellow-500 dark:text-yellow-400' : 'text-emerald-600 dark:text-emerald-400')">
                <!-- Warning SVG icon instead of emoji -->
                <svg th:if="${personalSummary.budgetStatus?.name() == 'RED'}" class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <span th:text="${personalSummary.budgetStatus?.name() == 'RED'} ? '已超出預算 ' + ${budgetPercentageCapped} + '%' : (${personalSummary.budgetStatus?.name() == 'YELLOW'} ? '即將到達預算上限 · ' + ${budgetPercentageCapped} + '%' : '預算使用 ' + ${budgetPercentageCapped} + '%')">預算充裕</span>
            </p>
        </div>

        <!-- Budget: not set -->
        <div class="px-5 py-3 border-t border-gray-100 dark:border-gray-700 flex items-center justify-between"
             th:if="${!hasBudget}">
            <div>
                <p class="text-xs font-medium text-gray-700 dark:text-gray-300">設定旅遊預算</p>
                <p class="text-[11px] text-gray-400 dark:text-gray-500 mt-0.5">追蹤花費進度並掌握預算狀況</p>
            </div>
            <button data-action="show-budget-modal"
                    class="text-sm font-medium text-blue-600 dark:text-blue-400 hover:text-blue-700 transition-colors cursor-pointer whitespace-nowrap flex items-center gap-1">
                設定
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- 2. Charts card — only show when data exists -->
    <div class="mb-3 glass-card p-4"
         th:if="${personalExpenses != null and not #lists.isEmpty(personalExpenses) and personalSummary != null}">
        <!-- Chart tab switcher (H1: dark mode fix) -->
        <div class="relative flex gap-1 p-1 bg-gray-100 dark:bg-gray-900 rounded-lg mb-4">
            <!-- Indicator: left/width offset by parent p-1 (4px) padding -->
            <div id="chart-tab-indicator"
                 class="absolute top-1 bottom-1 rounded-md bg-white dark:bg-gray-700 shadow-sm transition-all duration-300 ease-out"
                 style="left: 4px; width: calc(50% - 6px);"></div>
            <button data-action="show-chart" data-chart-type="category"
                    id="chart-tab-category"
                    class="relative z-10 flex-1 py-1.5 rounded-md text-xs font-medium transition-colors duration-200 cursor-pointer text-gray-800 dark:text-gray-100">
                類別分布
            </button>
            <button data-action="show-chart" data-chart-type="daily"
                    id="chart-tab-daily"
                    class="relative z-10 flex-1 py-1.5 rounded-md text-xs font-medium transition-colors duration-200 cursor-pointer text-gray-500 dark:text-gray-400">
                每日趨勢
            </button>
        </div>

        <!-- Category: stacked donut + 2-col legend grid -->
        <div id="chart-category" class="transition-opacity duration-200">
            <div class="relative h-48">
                <canvas id="personal-category-chart"></canvas>
            </div>
            <div id="personal-category-legend" class="mt-3 grid grid-cols-2 gap-2"></div>
        </div>

        <!-- Daily bar -->
        <div id="chart-daily" class="hidden transition-opacity duration-200">
            <div id="daily-chart-wrapper" style="-webkit-overflow-scrolling: touch">
                <canvas id="personal-daily-chart" style="height: 200px"></canvas>
            </div>
        </div>
    </div>

    <!-- 3. Expense list -->
    <div class="pb-6 space-y-2"
         th:if="${personalExpenses != null and not #lists.isEmpty(personalExpenses)}">
        <th:block th:each="expense : ${personalExpenses}">

            <!-- AUTO item -->
            <div th:if="${expense.source?.name() == 'AUTO'}"
                 class="expense-item-card bg-white dark:bg-gray-800 rounded-xl shadow-card px-4 py-3 hover:shadow-card-hover transition-all duration-200 cursor-pointer"
                 th:data-expense-id="${expense.tripExpenseId}"
                 th:attr="data-date=${expense.expenseDate != null ? #temporals.format(expense.expenseDate, 'MM/dd') : ''}"
                 data-action="toggle-auto-item">
                <div class="flex items-center gap-3">
                    <div class="flex-shrink-0 w-9 h-9 rounded-lg flex items-center justify-center"
                         th:classappend="${expense.category == 'FOOD'} ? 'bg-orange-100 dark:bg-orange-900/30' : (${expense.category == 'TRANSPORT'} ? 'bg-blue-100 dark:bg-blue-900/30' : (${expense.category == 'ACCOMMODATION'} ? 'bg-purple-100 dark:bg-purple-900/30' : (${expense.category == 'SHOPPING'} ? 'bg-pink-100 dark:bg-pink-900/30' : (${expense.category == 'ENTERTAINMENT'} ? 'bg-rose-100 dark:bg-rose-900/30' : (${expense.category == 'HEALTH'} ? 'bg-emerald-100 dark:bg-emerald-900/30' : 'bg-gray-100 dark:bg-gray-700')))))">
                        <!-- Food Icon -->
                        <svg th:if="${expense.category == 'FOOD'}" class="w-4 h-4 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                        <!-- Transport Icon -->
                        <svg th:if="${expense.category == 'TRANSPORT'}" class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                        </svg>
                        <!-- Accommodation Icon -->
                        <svg th:if="${expense.category == 'ACCOMMODATION'}" class="w-4 h-4 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                        </svg>
                        <!-- Shopping Icon -->
                        <svg th:if="${expense.category == 'SHOPPING'}" class="w-4 h-4 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                        </svg>
                        <!-- Entertainment Icon -->
                        <svg th:if="${expense.category == 'ENTERTAINMENT'}" class="w-4 h-4 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <!-- Health Icon -->
                        <svg th:if="${expense.category == 'HEALTH'}" class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                        </svg>
                        <!-- Other Icon -->
                        <svg th:if="${expense.category == 'OTHER' or expense.category == null}" class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-gray-800 dark:text-gray-100 truncate"
                           th:text="${expense.description}">描述</p>
                        <div class="flex items-center gap-1.5 mt-0.5">
                            <span class="text-[10px] font-medium px-1.5 py-0.5 rounded-full bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400">自動同步</span>
                            <span class="text-xs text-gray-400 dark:text-gray-500"
                                  th:if="${expense.expenseDate != null}"
                                  th:text="${#temporals.format(expense.expenseDate, 'MM/dd')}"></span>
                        </div>
                    </div>
                    <div class="flex items-center gap-1.5 flex-shrink-0">
                        <p class="text-sm font-semibold text-gray-900 dark:text-white tabular-nums"
                           th:text="${currSymbol + #numbers.formatDecimal(expense.amount, 0, 'COMMA', 2, 'POINT')}">NT$0</p>
                        <svg class="w-3.5 h-3.5 text-gray-300 dark:text-gray-600 transition-transform duration-200"
                             th:id="|auto-chevron-${expense.tripExpenseId}|"
                             fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </div>
                </div>
                <!-- Expandable detail (M5: smooth animation) -->
                <div th:id="|auto-detail-${expense.tripExpenseId}|"
                     class="overflow-hidden transition-all duration-200 ease-out max-h-0">
                    <div class="mt-3 pt-3 border-t border-gray-100 dark:border-gray-700 space-y-1.5">
                        <div class="flex justify-between text-xs text-gray-500">
                            <span>原始金額</span>
                            <span th:text="${(expense.originalCurrency ?: '') + ' ' + #numbers.formatDecimal((expense.originalAmount ?: 0), 0, 'COMMA', 2, 'POINT')}">TWD 0.00</span>
                        </div>
                        <div class="flex justify-between text-xs text-gray-500">
                            <span>付款人</span>
                            <span th:text="${expense.paidByName ?: ''}"></span>
                        </div>
                        <a th:href="|/trips/${tripId}/expenses/${expense.tripExpenseId}|"
                           class="inline-flex items-center gap-1 mt-1 text-xs text-blue-500 hover:text-blue-700 cursor-pointer">
                            查看團隊分帳
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                        </a>
                    </div>
                </div>
            </div>

            <!-- MANUAL item (H3: per-category icons, H2: 44px touch targets) -->
            <div th:if="${expense.source?.name() == 'MANUAL'}"
                 class="expense-item-card bg-white dark:bg-gray-800 rounded-xl shadow-card px-4 py-3 hover:shadow-card-hover transition-all duration-200"
                 th:attr="data-date=${expense.expenseDate != null ? #temporals.format(expense.expenseDate, 'MM/dd') : ''}">
                <div class="flex items-center gap-3">
                    <!-- Category-colored icon with per-category SVG -->
                    <div class="flex-shrink-0 w-9 h-9 rounded-lg flex items-center justify-center"
                         th:classappend="${expense.category == 'FOOD'} ? 'bg-orange-100 dark:bg-orange-900/30' : (${expense.category == 'TRANSPORT'} ? 'bg-blue-100 dark:bg-blue-900/30' : (${expense.category == 'ACCOMMODATION'} ? 'bg-purple-100 dark:bg-purple-900/30' : (${expense.category == 'SHOPPING'} ? 'bg-pink-100 dark:bg-pink-900/30' : (${expense.category == 'ENTERTAINMENT'} ? 'bg-rose-100 dark:bg-rose-900/30' : (${expense.category == 'HEALTH'} ? 'bg-emerald-100 dark:bg-emerald-900/30' : 'bg-gray-100 dark:bg-gray-700')))))">
                        <!-- Food Icon -->
                        <svg th:if="${expense.category == 'FOOD'}" class="w-4 h-4 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                        <!-- Transport Icon -->
                        <svg th:if="${expense.category == 'TRANSPORT'}" class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                        </svg>
                        <!-- Accommodation Icon -->
                        <svg th:if="${expense.category == 'ACCOMMODATION'}" class="w-4 h-4 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                        </svg>
                        <!-- Shopping Icon -->
                        <svg th:if="${expense.category == 'SHOPPING'}" class="w-4 h-4 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                        </svg>
                        <!-- Entertainment Icon -->
                        <svg th:if="${expense.category == 'ENTERTAINMENT'}" class="w-4 h-4 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <!-- Health Icon -->
                        <svg th:if="${expense.category == 'HEALTH'}" class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                        </svg>
                        <!-- Other Icon -->
                        <svg th:if="${expense.category == 'OTHER' or expense.category == null}" class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-gray-800 dark:text-gray-100 truncate"
                           th:text="${expense.description}">描述</p>
                        <div class="flex items-center gap-1.5 mt-0.5">
                            <!-- L2: Category-colored badge -->
                            <span class="text-[10px] font-medium px-1.5 py-0.5 rounded-full"
                                  th:classappend="${expense.category == 'FOOD'} ? 'bg-orange-50 dark:bg-orange-900/20 text-orange-600 dark:text-orange-400' : (${expense.category == 'TRANSPORT'} ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400' : (${expense.category == 'ACCOMMODATION'} ? 'bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400' : (${expense.category == 'SHOPPING'} ? 'bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400' : (${expense.category == 'ENTERTAINMENT'} ? 'bg-rose-50 dark:bg-rose-900/20 text-rose-600 dark:text-rose-400' : (${expense.category == 'HEALTH'} ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400' : 'bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400')))))"
                                  th:text="${expense.category == 'FOOD'} ? '餐飲' : (${expense.category == 'TRANSPORT'} ? '交通' : (${expense.category == 'ACCOMMODATION'} ? '住宿' : (${expense.category == 'SHOPPING'} ? '購物' : (${expense.category == 'ENTERTAINMENT'} ? '娛樂' : (${expense.category == 'HEALTH'} ? '健康' : '其他')))))">其他</span>
                            <span class="text-gray-200 dark:text-gray-600 text-xs"
                                  th:if="${expense.expenseDate != null}">·</span>
                            <span class="text-xs text-gray-400 dark:text-gray-500"
                                  th:if="${expense.expenseDate != null}"
                                  th:text="${#temporals.format(expense.expenseDate, 'MM/dd')}"></span>
                        </div>
                    </div>
                    <!-- H2: 44px touch targets + gap-2 spacing -->
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <p class="text-sm font-semibold text-gray-900 dark:text-white tabular-nums mr-0.5"
                           th:text="${currSymbol + #numbers.formatDecimal(expense.amount, 0, 'COMMA', 2, 'POINT')}">NT$0</p>
                        <a th:href="|/trips/${tripId}/personal-expenses/${expense.id}/edit|"
                           class="p-2 text-gray-300 dark:text-gray-600 hover:text-blue-500 transition-colors cursor-pointer min-w-[44px] min-h-[44px] flex items-center justify-center"
                           aria-label="編輯">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                            </svg>
                        </a>
                        <button th:data-expense-id="${expense.id}"
                                th:data-trip-id="${tripId}"
                                th:data-expense-desc="${expense.description}"
                                data-action="show-delete-modal"
                                class="p-2 text-gray-300 dark:text-gray-600 hover:text-red-500 transition-colors cursor-pointer min-w-[44px] min-h-[44px] flex items-center justify-center"
                                aria-label="刪除">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

        </th:block>
    </div>

    <!-- Empty state (H7: shows when no expenses, summary card hidden) -->
    <div class="glass-card p-8 text-center"
         th:if="${personalExpenses == null or #lists.isEmpty(personalExpenses)}">
        <div class="w-24 h-24 mx-auto mb-4 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center">
            <svg class="w-12 h-12 text-gray-300 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
        </div>
        <h3 class="text-base font-semibold text-gray-700 dark:text-gray-300 mb-2">尚未有個人記帳</h3>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">記錄您的個人花費並追蹤預算</p>
        <a th:href="|/trips/${tripId}/personal-expenses/create|"
           class="btn-cta inline-flex items-center gap-2 text-sm px-5 py-2.5 cursor-pointer">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            新增第一筆
        </a>
    </div>

    <!-- Budget Modal (C2: full accessibility) -->
    <div id="budget-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center"
         role="dialog" aria-modal="true" aria-labelledby="budget-modal-title"
         data-action="close-budget-modal-backdrop">
        <div class="glass-card mx-4 p-6 w-full max-w-sm transform transition-all duration-200">
            <h3 id="budget-modal-title" class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">設定個人預算</h3>
            <label for="budget-input" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">預算金額</label>
            <input id="budget-input" type="number" min="1" step="1"
                   class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2.5 mb-4 dark:bg-gray-800 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500"
                   placeholder="輸入預算金額">
            <div class="flex gap-3 justify-end">
                <button data-action="close-budget-modal" class="btn-text px-4 py-2.5 min-h-[44px]">取消</button>
                <button id="budget-submit-btn" data-action="submit-budget" class="btn-cta px-4 py-2.5 min-h-[44px] flex items-center gap-2">
                    <svg id="budget-spinner" class="w-4 h-4 animate-spin hidden" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                    <span id="budget-submit-text">確定</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal (C3: custom modal replacing native confirm) -->
    <div id="personal-delete-modal" class="fixed inset-0 z-[60] hidden"
         role="alertdialog" aria-modal="true" aria-labelledby="personal-delete-title" aria-describedby="personal-delete-desc">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity duration-200"
             data-action="close-delete-modal-backdrop"></div>
        <!-- Modal Content -->
        <div class="absolute inset-x-4 top-1/2 -translate-y-1/2 max-w-sm mx-auto
                    bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-2xl transform transition-all duration-200">
            <div class="w-12 h-12 mx-auto mb-4 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center">
                <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
            </div>
            <h3 id="personal-delete-title" class="text-lg font-semibold text-gray-800 dark:text-gray-100 text-center mb-2">確定要刪除？</h3>
            <p id="personal-delete-desc" class="text-sm text-gray-500 dark:text-gray-400 text-center mb-6">刪除後無法復原。</p>
            <div class="flex gap-3">
                <button data-action="close-delete-modal"
                        class="flex-1 min-h-[44px] px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-200 font-medium hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors cursor-pointer">
                    取消
                </button>
                <button id="personal-delete-confirm-btn" data-action="confirm-delete"
                        class="flex-1 min-h-[44px] px-4 py-2.5 rounded-xl bg-red-500 hover:bg-red-600 text-white font-medium transition-colors cursor-pointer flex items-center justify-center gap-2">
                    <svg id="personal-delete-spinner" class="w-4 h-4 animate-spin hidden" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                    刪除
                </button>
            </div>
        </div>
    </div>

    <!-- Chart data -->
    <div id="personal-chart-data"
         th:if="${personalSummary != null}"
         th:data-category-breakdown="${personalCategoryBreakdownJson}"
         th:data-daily-amounts="${personalDailyAmountsJson}"
         style="display:none">
    </div>
</div>
</body>
</html>
