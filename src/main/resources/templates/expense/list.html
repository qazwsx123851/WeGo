<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(title=${trip.title} + ' - 分帳')}"></head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 pb-20">
    <!-- Toast Container -->
    <div th:replace="~{fragments/components :: toast-container}"></div>

    <!-- Hidden data for JavaScript -->
    <input type="hidden" id="trip-id" th:value="${trip.id}"/>

    <!-- Header -->
    <header class="glass-card sticky top-0 z-40 rounded-none border-x-0 border-t-0">
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a th:href="@{/trips/{tripId}(tripId=${trip.id})}"
                   class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer"
                   aria-label="返回行程">
                    <svg class="w-5 h-5 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </a>
                <h1 class="text-h4 text-gray-800 dark:text-gray-100 font-heading">分帳</h1>
            </div>
            <a th:href="@{/trips/{tripId}/expenses/create(tripId=${trip.id})}"
               class="btn-cta flex items-center gap-2"
               aria-label="新增支出">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                <span class="hidden sm:inline">新增</span>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-6">
        <!-- Summary Card -->
        <section class="glass-card p-6 mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100">總覽</h2>
                <div class="flex items-center gap-2">
                    <a th:href="@{/trips/{tripId}/expenses/statistics(tripId=${trip.id})}"
                       class="btn-text text-sm flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                        </svg>
                        統計
                    </a>
                    <a th:href="@{/trips/{tripId}/settlement(tripId=${trip.id})}"
                       class="btn-text text-sm flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                        </svg>
                        結算
                    </a>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <!-- Total Expense -->
                <div class="bg-white/50 dark:bg-gray-800/50 rounded-xl p-4">
                    <p class="text-sm text-gray-500 dark:text-gray-400 mb-1">總支出</p>
                    <p class="text-xl font-semibold text-gray-800 dark:text-gray-100 font-mono"
                       th:text="${#numbers.formatDecimal(totalExpense, 0, 'COMMA', 0, 'POINT')}">0</p>
                    <p class="text-xs text-gray-400 dark:text-gray-500" th:text="${defaultCurrency}">TWD</p>
                </div>

                <!-- Your Balance -->
                <div class="bg-white/50 dark:bg-gray-800/50 rounded-xl p-4">
                    <p class="text-sm text-gray-500 dark:text-gray-400 mb-1">您的餘額</p>
                    <p class="text-xl font-semibold font-mono"
                       th:classappend="${userBalance >= 0 ? 'text-success dark:text-green-400' : 'text-error dark:text-red-400'}"
                       th:text="${(userBalance >= 0 ? '+' : '') + #numbers.formatDecimal(userBalance, 0, 'COMMA', 0, 'POINT')}">+0</p>
                    <p class="text-xs"
                       th:classappend="${userBalance >= 0 ? 'text-success/70 dark:text-green-400/70' : 'text-error/70 dark:text-red-400/70'}"
                       th:text="${userBalance >= 0 ? '可收回' : '需支付'}">狀態</p>
                </div>
            </div>

            <!-- Per Person Average -->
            <div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                <div class="flex items-center justify-between">
                    <span class="text-sm text-gray-500 dark:text-gray-400">人均花費</span>
                    <span class="font-semibold text-gray-800 dark:text-gray-100 font-mono"
                          th:text="'$' + ${#numbers.formatDecimal(perPersonAverage, 0, 'COMMA', 0, 'POINT')}">$0</span>
                </div>
            </div>

            <!-- Conversion Warnings -->
            <div th:if="${conversionWarnings != null and !conversionWarnings.isEmpty()}"
                 class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                <div class="flex gap-3 p-3 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-lg">
                    <svg class="w-5 h-5 text-amber-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    <div>
                        <p class="text-sm font-medium text-amber-700 dark:text-amber-300">匯率轉換警告</p>
                        <ul class="mt-1 space-y-0.5">
                            <li th:each="warning : ${conversionWarnings}"
                                class="text-xs text-amber-600 dark:text-amber-400"
                                th:text="${warning}">匯率轉換失敗訊息</li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>

        <!-- Expense List -->
        <section>
            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(expensesByDate)}" class="glass-card p-8 text-center">
                <div class="w-24 h-24 mx-auto mb-4 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center">
                    <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                              d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                </div>
                <h3 class="text-h4 text-gray-700 dark:text-gray-300 mb-2">還沒有任何支出</h3>
                <p class="text-body-sm text-gray-500 dark:text-gray-400 mb-6">記錄旅途中的支出，輕鬆進行分帳！</p>
                <a th:href="@{/trips/{tripId}/expenses/create(tripId=${trip.id})}"
                   class="btn-cta inline-flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    新增第一筆支出
                </a>
            </div>

            <!-- Grouped by Date -->
            <div th:each="dateGroup, groupStat : ${expensesByDate}" class="mb-4">
                <!-- Date Header - Clickable & Sticky -->
                <div class="sticky top-0 z-10 bg-gray-50/95 dark:bg-gray-900/95 backdrop-blur-sm py-2 -mx-4 px-4 cursor-pointer select-none"
                     onclick="toggleDateGroup(this)">
                    <div class="flex items-center gap-3">
                        <div class="flex-shrink-0 w-12 h-12 bg-primary-100 dark:bg-primary-900/30 rounded-xl flex flex-col items-center justify-center">
                            <span class="text-xs text-primary-600 dark:text-primary-400 font-medium"
                                  th:text="${#temporals.format(dateGroup.key, 'EEE')}">Mon</span>
                            <span class="text-lg font-bold text-primary-700 dark:text-primary-300"
                                  th:text="${#temporals.format(dateGroup.key, 'd')}">1</span>
                        </div>
                        <div class="flex-1">
                            <p class="text-sm font-medium text-gray-800 dark:text-gray-100"
                               th:text="${#temporals.format(dateGroup.key, 'MM月dd日')}">01月01日</p>
                            <p class="text-xs text-gray-500 dark:text-gray-400">
                                <span th:text="${#lists.size(dateGroup.value)}">0</span> 筆支出
                            </p>
                        </div>
                        <div class="text-right mr-1">
                            <p class="text-sm font-semibold text-gray-800 dark:text-gray-100 font-mono"
                               th:text="'$' + ${#numbers.formatDecimal(#aggregates.sum(dateGroup.value.![amount]), 0, 'COMMA', 0, 'POINT')}">$0</p>
                        </div>
                        <!-- Chevron Icon -->
                        <svg class="w-5 h-5 text-gray-400 dark:text-gray-500 transition-transform duration-200 chevron-icon flex-shrink-0"
                             th:classappend="${groupStat.first} ? 'rotate-180' : ''"
                             fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </div>
                </div>

                <!-- Expense Items - Collapsible -->
                <div class="expense-group-content space-y-2 mt-2 overflow-hidden transition-all duration-200 ease-out"
                     th:classappend="${groupStat.first} ? '' : 'max-h-0'"
                     th:style="${groupStat.first} ? '' : 'max-height: 0px'">
                    <div th:each="expense : ${dateGroup.value}"
                         class="expense-card bg-white dark:bg-gray-800 rounded-xl px-4 py-3 shadow-card hover:shadow-card-hover transition-all duration-200 cursor-pointer"
                         th:data-expense-id="${expense.id}"
                         th:data-expense-description="${expense.description}"
                         th:data-expense-amount="${expense.amount}"
                         th:data-expense-currency="${expense.currency}"
                         th:data-expense-category="${expense.category}"
                         th:data-expense-payer-name="${expense.paidByName}"
                         th:data-expense-split-type="${expense.splitType}"
                         th:data-expense-note="${expense.note}">
                        <div class="flex items-center gap-3">
                            <!-- Category Icon -->
                            <div class="flex-shrink-0 w-9 h-9 rounded-lg flex items-center justify-center"
                                 th:classappend="${expense.category == 'FOOD' ? 'bg-orange-100 dark:bg-orange-900/30' :
                                                  expense.category == 'TRANSPORT' ? 'bg-blue-100 dark:bg-blue-900/30' :
                                                  expense.category == 'ACCOMMODATION' ? 'bg-purple-100 dark:bg-purple-900/30' :
                                                  expense.category == 'ENTERTAINMENT' ? 'bg-pink-100 dark:bg-pink-900/30' :
                                                  'bg-gray-100 dark:bg-gray-700'}">
                                <!-- Food Icon -->
                                <svg th:if="${expense.category == 'FOOD'}" class="w-4 h-4 text-orange-600 dark:text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                                </svg>
                                <!-- Transport Icon -->
                                <svg th:if="${expense.category == 'TRANSPORT'}" class="w-4 h-4 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                                </svg>
                                <!-- Accommodation Icon -->
                                <svg th:if="${expense.category == 'ACCOMMODATION'}" class="w-4 h-4 text-purple-600 dark:text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                                </svg>
                                <!-- Entertainment Icon -->
                                <svg th:if="${expense.category == 'ENTERTAINMENT'}" class="w-4 h-4 text-pink-600 dark:text-pink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                                <!-- Other Icon -->
                                <svg th:if="${expense.category == 'OTHER' or expense.category == null}" class="w-4 h-4 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
                                </svg>
                            </div>

                            <!-- Expense Details (compact) -->
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium text-gray-800 dark:text-gray-100 truncate"
                                   th:text="${expense.description}">支出描述</p>
                                <div class="flex items-center gap-1.5 mt-0.5">
                                    <div class="w-4 h-4 rounded-full bg-primary-100 dark:bg-primary-900/30 flex items-center justify-center">
                                        <span class="text-[10px] font-medium text-primary-600 dark:text-primary-400"
                                              th:text="${expense.paidByName != null ? #strings.substring(expense.paidByName, 0, 1) : '?'}">A</span>
                                    </div>
                                    <span class="text-xs text-gray-500 dark:text-gray-400"
                                          th:text="${expense.paidByName != null ? expense.paidByName : '未知'}">付款人</span>
                                    <span class="text-gray-300 dark:text-gray-600 text-xs">·</span>
                                    <span class="text-xs text-gray-500 dark:text-gray-400"
                                          th:text="${expense.splitType?.name() == 'EQUAL' ? '均分' :
                                                     expense.splitType?.name() == 'PERCENTAGE' ? '百分比' :
                                                     expense.splitType?.name() == 'CUSTOM' ? '自訂' :
                                                     expense.splitType?.name() == 'SHARES' ? '比例' : '均分'}">均分</span>
                                    <span class="text-gray-300 dark:text-gray-600 text-xs">·</span>
                                    <span class="text-xs text-gray-400 dark:text-gray-500"
                                          th:text="${expense.splits != null ? #lists.size(expense.splits) : 0} + '人'">2人</span>
                                </div>
                            </div>

                            <!-- Amount -->
                            <div class="text-right flex-shrink-0">
                                <p class="text-sm font-semibold text-gray-800 dark:text-gray-100 font-mono"
                                   th:text="'$' + ${#numbers.formatDecimal(expense.amount, 0, 'COMMA', 0, 'POINT')}">$0</p>
                                <p th:if="${expense.currency != defaultCurrency}"
                                   class="text-[10px] text-gray-400 dark:text-gray-500"
                                   th:text="${expense.currency}">USD</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Expense Detail Modal -->
    <div id="expense-detail-modal" class="fixed inset-0 z-[55] hidden" aria-modal="true" role="dialog" aria-labelledby="expense-modal-title">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity duration-200" onclick="closeExpenseModal()"></div>

        <!-- Modal Content -->
        <div id="expense-modal-panel"
             class="absolute inset-x-0 bottom-0 max-h-[85vh] rounded-t-2xl
                    md:bottom-auto md:top-8 md:bottom-8 md:max-w-lg md:mx-auto md:rounded-2xl md:max-h-none
                    bg-white dark:bg-gray-900 overflow-hidden flex flex-col shadow-2xl
                    transform transition-all duration-200 translate-y-full md:translate-y-0 md:scale-95 md:opacity-0">
            <!-- Header -->
            <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-800 flex items-center justify-between flex-shrink-0">
                <h3 id="expense-modal-title" class="text-lg font-semibold text-gray-800 dark:text-gray-100">支出詳情</h3>
                <button onclick="closeExpenseModal()"
                        class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer"
                        aria-label="關閉">
                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Body - scrollable -->
            <div id="expense-modal-body" class="flex-1 overflow-y-auto overscroll-y-contain p-6"
                 style="-webkit-overflow-scrolling: touch;">
                <!-- Loading state -->
                <div id="expense-modal-loading" class="flex items-center justify-center py-12">
                    <div class="w-8 h-8 border-3 border-primary-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
                <!-- Content will be dynamically filled -->
                <div id="expense-modal-content" class="hidden"></div>
            </div>

            <!-- Footer with actions -->
            <div class="px-6 py-4 pb-[max(1rem,env(safe-area-inset-bottom))] border-t border-gray-100 dark:border-gray-800 flex gap-3 flex-shrink-0">
                <button onclick="editExpense()"
                        class="flex-1 min-h-[44px] px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-200 font-medium hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors cursor-pointer flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                    編輯
                </button>
                <button onclick="confirmDeleteExpense()"
                        class="flex-1 min-h-[44px] px-4 py-2.5 rounded-xl bg-error hover:bg-red-600 text-white font-medium transition-colors cursor-pointer flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                    刪除
                </button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-expense-modal" class="fixed inset-0 z-[60] hidden" aria-modal="true" role="alertdialog" aria-labelledby="delete-modal-title">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity duration-200" onclick="closeDeleteModal()"></div>

        <!-- Modal Content -->
        <div class="absolute inset-x-4 top-1/2 -translate-y-1/2 max-w-sm mx-auto
                    bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-2xl transform transition-all duration-200">
            <!-- Warning Icon -->
            <div class="w-12 h-12 mx-auto mb-4 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center">
                <svg class="w-6 h-6 text-error" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>

            <h3 id="delete-modal-title" class="text-lg font-semibold text-gray-800 dark:text-gray-100 text-center mb-2">確定要刪除？</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 text-center mb-6">刪除後無法復原，相關的分帳記錄也會一併刪除。</p>

            <div class="flex gap-3">
                <button onclick="closeDeleteModal()"
                        class="flex-1 min-h-[44px] px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-200 font-medium hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors cursor-pointer">
                    取消
                </button>
                <button onclick="deleteExpense()"
                        id="confirm-delete-btn"
                        class="flex-1 min-h-[44px] px-4 py-2.5 rounded-xl bg-error hover:bg-red-600 text-white font-medium transition-colors cursor-pointer">
                    刪除
                </button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav th:replace="~{fragments/components :: bottom-nav}"></nav>

    <script th:inline="javascript">
        // =====================
        // Configuration
        // =====================
        const tripId = document.getElementById('trip-id').value;
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content || '';
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN';

        // Current expense data
        let currentExpenseId = null;
        let currentExpenseData = null;

        // Event delegation for expense cards (replaces inline th:onclick)
        document.querySelectorAll('.expense-card').forEach(function(card) {
            card.addEventListener('click', function() {
                openExpenseModal(this);
            });
        });

        // =====================
        // Expense Detail Modal
        // =====================
        function openExpenseModal(cardElement) {
            // Get expense data from data attributes
            currentExpenseId = cardElement.dataset.expenseId;
            currentExpenseData = {
                id: cardElement.dataset.expenseId,
                description: cardElement.dataset.expenseDescription,
                amount: parseFloat(cardElement.dataset.expenseAmount),
                currency: cardElement.dataset.expenseCurrency || 'TWD',
                category: cardElement.dataset.expenseCategory,
                payerName: cardElement.dataset.expensePayerName,
                splitType: cardElement.dataset.expenseSplitType,
                note: cardElement.dataset.expenseNote
            };

            // Show modal with animation
            const modal = document.getElementById('expense-detail-modal');
            const panel = document.getElementById('expense-modal-panel');
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            // Hide bottom nav to prevent overlap with modal footer
            document.querySelector('.bottom-nav')?.classList.add('hidden');

            // Animate in
            requestAnimationFrame(() => {
                panel.classList.remove('translate-y-full');
                panel.classList.add('translate-y-0');
                panel.classList.remove('md:scale-95', 'md:opacity-0');
                panel.classList.add('md:scale-100', 'md:opacity-100');
            });

            // Show loading, hide content
            document.getElementById('expense-modal-loading').classList.remove('hidden');
            document.getElementById('expense-modal-content').classList.add('hidden');

            // Fetch full expense details from API
            fetchExpenseDetail(currentExpenseId);
        }

        async function fetchExpenseDetail(expenseId) {
            try {
                // Fetch all expenses and find the one we need (since there's no single expense endpoint)
                const response = await fetch(`/api/trips/${tripId}/expenses`);

                if (response.ok) {
                    const result = await response.json();
                    if (result.success && result.data) {
                        const expense = result.data.find(e => e.id === expenseId);
                        if (expense) {
                            currentExpenseData = expense;
                            renderExpenseDetail(expense);
                        } else {
                            showToast('error', '找不到支出記錄');
                            closeExpenseModal();
                        }
                    }
                } else {
                    // Use cached data from card
                    renderExpenseDetail(currentExpenseData);
                }
            } catch (error) {
                console.error('Error fetching expense:', error);
                // Use cached data from card
                renderExpenseDetail(currentExpenseData);
            }
        }

        function renderExpenseDetail(expense) {
            const content = document.getElementById('expense-modal-content');
            content.innerHTML = ''; // Clear previous content

            // Amount Section
            const amountSection = document.createElement('div');
            amountSection.className = 'text-center mb-6';

            const amountEl = document.createElement('p');
            amountEl.className = 'text-4xl font-bold text-gray-800 dark:text-gray-100 font-mono';
            amountEl.textContent = '$' + formatNumber(expense.amount);
            amountSection.appendChild(amountEl);

            const currencyEl = document.createElement('p');
            currencyEl.className = 'text-sm text-gray-500 dark:text-gray-400 mt-1';
            currencyEl.textContent = expense.currency || 'TWD';
            amountSection.appendChild(currencyEl);

            content.appendChild(amountSection);

            // Description
            const descSection = document.createElement('div');
            descSection.className = 'bg-gray-50 dark:bg-gray-800 rounded-xl p-4 mb-4';

            const descLabel = document.createElement('p');
            descLabel.className = 'text-xs text-gray-500 dark:text-gray-400 mb-1';
            descLabel.textContent = '描述';
            descSection.appendChild(descLabel);

            const descValue = document.createElement('p');
            descValue.className = 'text-gray-800 dark:text-gray-100 font-medium';
            descValue.textContent = expense.description || '-';
            descSection.appendChild(descValue);

            content.appendChild(descSection);

            // Info Grid
            const infoGrid = document.createElement('div');
            infoGrid.className = 'grid grid-cols-2 gap-4 mb-4';

            // Payer
            const payerDiv = createInfoItem('付款人', expense.paidByName || expense.payerName || '-');
            infoGrid.appendChild(payerDiv);

            // Category
            const categoryDiv = createInfoItem('類別', getCategoryLabel(expense.category));
            infoGrid.appendChild(categoryDiv);

            // Split Type
            const splitDiv = createInfoItem('分攤方式', getSplitTypeLabel(expense.splitType));
            infoGrid.appendChild(splitDiv);

            // Date
            const dateDiv = createInfoItem('日期', expense.expenseDate || formatDate(expense.createdAt));
            infoGrid.appendChild(dateDiv);

            content.appendChild(infoGrid);

            // Note
            if (expense.note) {
                const noteSection = document.createElement('div');
                noteSection.className = 'bg-gray-50 dark:bg-gray-800 rounded-xl p-4 mb-4';

                const noteLabel = document.createElement('p');
                noteLabel.className = 'text-xs text-gray-500 dark:text-gray-400 mb-1';
                noteLabel.textContent = '備註';
                noteSection.appendChild(noteLabel);

                const noteValue = document.createElement('p');
                noteValue.className = 'text-gray-800 dark:text-gray-100';
                noteValue.textContent = expense.note;
                noteSection.appendChild(noteValue);

                content.appendChild(noteSection);
            }

            // Splits Section
            if (expense.splits && expense.splits.length > 0) {
                const splitsSection = document.createElement('div');
                splitsSection.className = 'mt-4';

                const splitsLabel = document.createElement('p');
                splitsLabel.className = 'text-sm font-medium text-gray-700 dark:text-gray-300 mb-3';
                splitsLabel.textContent = '分攤明細';
                splitsSection.appendChild(splitsLabel);

                const splitsList = document.createElement('div');
                splitsList.className = 'space-y-2';

                expense.splits.forEach(split => {
                    const splitItem = document.createElement('div');
                    splitItem.className = 'flex items-center justify-between bg-gray-50 dark:bg-gray-800 rounded-lg px-3 py-2';

                    const userInfo = document.createElement('div');
                    userInfo.className = 'flex items-center gap-2';

                    const avatar = document.createElement('div');
                    avatar.className = 'w-7 h-7 rounded-full bg-primary-100 dark:bg-primary-900/30 flex items-center justify-center';
                    const avatarText = document.createElement('span');
                    avatarText.className = 'text-xs font-medium text-primary-600 dark:text-primary-400';
                    avatarText.textContent = (split.userNickname || '?').charAt(0);
                    avatar.appendChild(avatarText);
                    userInfo.appendChild(avatar);

                    const userName = document.createElement('span');
                    userName.className = 'text-sm text-gray-700 dark:text-gray-300';
                    userName.textContent = split.userNickname || '未知使用者';
                    userInfo.appendChild(userName);

                    splitItem.appendChild(userInfo);

                    const amountInfo = document.createElement('div');
                    amountInfo.className = 'flex items-center gap-2';

                    const splitAmount = document.createElement('span');
                    splitAmount.className = 'text-sm font-medium text-gray-800 dark:text-gray-100 font-mono';
                    splitAmount.textContent = '$' + formatNumber(split.amount);
                    amountInfo.appendChild(splitAmount);

                    if (split.isSettled) {
                        const settledBadge = document.createElement('span');
                        settledBadge.className = 'text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400';
                        settledBadge.textContent = '已結清';
                        amountInfo.appendChild(settledBadge);
                    }

                    splitItem.appendChild(amountInfo);
                    splitsList.appendChild(splitItem);
                });

                splitsSection.appendChild(splitsList);
                content.appendChild(splitsSection);
            }

            // Hide loading, show content
            document.getElementById('expense-modal-loading').classList.add('hidden');
            content.classList.remove('hidden');
        }

        function createInfoItem(label, value) {
            const div = document.createElement('div');
            div.className = 'bg-gray-50 dark:bg-gray-800 rounded-xl p-3';

            const labelEl = document.createElement('p');
            labelEl.className = 'text-xs text-gray-500 dark:text-gray-400 mb-1';
            labelEl.textContent = label;
            div.appendChild(labelEl);

            const valueEl = document.createElement('p');
            valueEl.className = 'text-sm text-gray-800 dark:text-gray-100 font-medium';
            valueEl.textContent = value;
            div.appendChild(valueEl);

            return div;
        }

        function closeExpenseModal() {
            const modal = document.getElementById('expense-detail-modal');
            const panel = document.getElementById('expense-modal-panel');

            // Animate out
            panel.classList.add('translate-y-full');
            panel.classList.remove('translate-y-0');
            panel.classList.add('md:scale-95', 'md:opacity-0');
            panel.classList.remove('md:scale-100', 'md:opacity-100');

            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
                currentExpenseId = null;
                currentExpenseData = null;

                // Restore bottom nav
                document.querySelector('.bottom-nav')?.classList.remove('hidden');
            }, 200);
        }

        // =====================
        // Edit Expense
        // =====================
        function editExpense() {
            if (currentExpenseId) {
                window.location.href = `/trips/${tripId}/expenses/${currentExpenseId}/edit`;
            }
        }

        // =====================
        // Delete Expense
        // =====================
        function confirmDeleteExpense() {
            document.getElementById('delete-expense-modal').classList.remove('hidden');
        }

        function closeDeleteModal() {
            document.getElementById('delete-expense-modal').classList.add('hidden');
        }

        async function deleteExpense() {
            if (!currentExpenseId) return;

            const deleteBtn = document.getElementById('confirm-delete-btn');
            deleteBtn.disabled = true;
            deleteBtn.textContent = '刪除中...';

            try {
                const response = await fetch(`/api/expenses/${currentExpenseId}`, {
                    method: 'DELETE',
                    headers: {
                        [csrfHeader]: csrfToken
                    }
                });

                if (response.ok) {
                    showToast('success', '支出已刪除');
                    closeDeleteModal();
                    closeExpenseModal();

                    // Remove the card from DOM
                    const card = document.querySelector(`[data-expense-id="${currentExpenseId}"]`);
                    if (card) {
                        const parentGroup = card.closest('.mb-6');
                        card.remove();

                        // Check if the date group is now empty
                        const remainingCards = parentGroup?.querySelectorAll('.expense-card');
                        if (remainingCards && remainingCards.length === 0) {
                            parentGroup.remove();
                        }
                    }

                    // Check if all expenses are deleted
                    const allCards = document.querySelectorAll('.expense-card');
                    if (allCards.length === 0) {
                        // Reload to show empty state
                        setTimeout(() => window.location.reload(), 500);
                    }
                } else {
                    let errorMsg = '刪除失敗';
                    try {
                        const error = await response.json();
                        errorMsg = error.message || errorMsg;
                    } catch (e) {}
                    showToast('error', errorMsg);
                }
            } catch (error) {
                console.error('Error deleting expense:', error);
                showToast('error', '網路錯誤，請稍後再試');
            } finally {
                deleteBtn.disabled = false;
                deleteBtn.textContent = '刪除';
            }
        }

        // =====================
        // Utility Functions
        // =====================
        // Date Group Accordion
        // =====================
        function toggleDateGroup(header) {
            const content = header.nextElementSibling;
            if (!content || !content.classList.contains('expense-group-content')) return;

            const chevron = header.querySelector('.chevron-icon');
            const isCollapsed = content.classList.contains('max-h-0');
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            if (isCollapsed) {
                // Expand
                content.classList.remove('max-h-0');
                content.style.maxHeight = content.scrollHeight + 'px';
                if (chevron) chevron.classList.add('rotate-180');

                // Clean up after transition
                const cleanup = () => {
                    content.style.maxHeight = '';
                    content.removeEventListener('transitionend', cleanup);
                };
                if (prefersReducedMotion) {
                    content.style.maxHeight = '';
                } else {
                    content.addEventListener('transitionend', cleanup);
                }
            } else {
                // Collapse: set explicit height first, then animate to 0
                content.style.maxHeight = content.scrollHeight + 'px';
                if (chevron) chevron.classList.remove('rotate-180');

                if (prefersReducedMotion) {
                    content.classList.add('max-h-0');
                    content.style.maxHeight = '0px';
                } else {
                    requestAnimationFrame(() => {
                        content.classList.add('max-h-0');
                        content.style.maxHeight = '0px';
                    });
                }
            }
        }

        // Initialize expanded groups on load
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.expense-group-content:not(.max-h-0)').forEach(content => {
                content.style.maxHeight = '';
            });
        });

        // =====================
        function formatNumber(num) {
            if (num === null || num === undefined) return '0';
            return parseFloat(num).toLocaleString('zh-TW', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }

        function formatDate(isoString) {
            if (!isoString) return '-';
            try {
                const date = new Date(isoString);
                return date.toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit' });
            } catch (e) {
                return '-';
            }
        }

        function getCategoryLabel(category) {
            const labels = {
                'FOOD': '餐飲',
                'TRANSPORT': '交通',
                'ACCOMMODATION': '住宿',
                'ENTERTAINMENT': '娛樂',
                'OTHER': '其他'
            };
            return labels[category] || '其他';
        }

        function getSplitTypeLabel(splitType) {
            const labels = {
                'EQUAL': '均分',
                'PERCENTAGE': '百分比',
                'CUSTOM': '自訂金額',
                'SHARES': '比例'
            };
            return labels[splitType] || '均分';
        }

        // =====================
        // Toast Notification
        // =====================
        function showToast(type, message) {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 bg-white dark:bg-gray-800 rounded-xl shadow-lg border-l-4 px-4 py-3 min-w-[280px] animate-slide-in ${type === 'success' ? 'border-success' : 'border-error'}`;

            // Icon
            const iconWrapper = document.createElement('div');
            iconWrapper.innerHTML = type === 'success'
                ? '<svg class="w-5 h-5 text-success flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>'
                : '<svg class="w-5 h-5 text-error flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
            toast.appendChild(iconWrapper.firstChild);

            // Message (using textContent to prevent XSS)
            const messageEl = document.createElement('p');
            messageEl.className = 'flex-1 text-gray-800 dark:text-gray-100';
            messageEl.textContent = message;
            toast.appendChild(messageEl);

            // Close button
            const closeBtn = document.createElement('button');
            closeBtn.className = 'text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 cursor-pointer';
            closeBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>';
            closeBtn.onclick = () => toast.remove();
            toast.appendChild(closeBtn);

            container.appendChild(toast);

            // Auto dismiss
            setTimeout(() => {
                toast.classList.add('animate-slide-out');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // =====================
        // Keyboard Navigation
        // =====================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const deleteModal = document.getElementById('delete-expense-modal');
                const detailModal = document.getElementById('expense-detail-modal');

                if (!deleteModal.classList.contains('hidden')) {
                    closeDeleteModal();
                } else if (!detailModal.classList.contains('hidden')) {
                    closeExpenseModal();
                }
            }
        });
    </script>

    <style>
        /* Animation for spinner */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }

        /* Border width utility */
        .border-3 {
            border-width: 3px;
        }

        /* Toast animations */
        @keyframes slide-in {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes slide-out {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
        .animate-slide-in {
            animation: slide-in 300ms ease-out;
        }
        .animate-slide-out {
            animation: slide-out 300ms ease-out;
        }
    </style>

    <!-- AI Chat Widget -->
    <div th:replace="~{fragments/chat-widget :: chat-widget(tripId=${trip.id})}"></div>
</body>
</html>
