<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WeGo - 分帳總覽">
    <meta name="theme-color" content="#0EA5E9">

    <!-- Dark Mode FOUC Prevention -->
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (theme === 'dark' || (!theme && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <title>分帳總覽 - WeGo</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 pb-20">
    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl
                   border-b border-gray-100 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <a th:href="@{/dashboard}" class="flex items-center gap-2">
                    <span class="text-h4 text-primary-600 dark:text-primary-400 font-heading font-bold">WeGo</span>
                </a>

                <!-- User Avatar/Menu -->
                <div class="flex items-center gap-3">
                    <a th:href="@{/profile}"
                       class="w-10 h-10 rounded-full bg-primary-100 dark:bg-primary-900/30
                              flex items-center justify-center
                              text-primary-600 dark:text-primary-400 font-medium
                              hover:ring-2 hover:ring-primary-500/50
                              transition-all duration-200 cursor-pointer overflow-hidden">
                        <img th:if="${picture}" th:src="${picture}" alt="Profile" class="w-full h-full object-cover">
                        <span th:unless="${picture}"
                              th:text="${name != null ? #strings.substring(name, 0, 1) : 'U'}">U</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- Page Title -->
        <section class="mb-8 animate-fade-in">
            <h1 class="text-h2 text-gray-800 dark:text-gray-100 mb-2 font-heading">分帳總覽</h1>
            <p class="text-body text-gray-500 dark:text-gray-400">查看您在所有行程中的支出統計</p>
        </section>

        <!-- Balance Overview Cards -->
        <section class="mb-8 grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
            <!-- Total Paid -->
            <div class="glass-card p-4">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-full bg-primary-100 dark:bg-primary-900/30 flex items-center justify-center">
                        <svg class="w-5 h-5 text-primary-600 dark:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                    </div>
                    <span class="text-body-sm text-gray-500 dark:text-gray-400">總支出</span>
                </div>
                <p class="text-h3 font-bold text-gray-800 dark:text-gray-100">
                    <span th:text="'$' + ${#numbers.formatDecimal(overview.totalPaid, 0, 0)}">$0</span>
                </p>
            </div>

            <!-- Owed to User -->
            <div class="glass-card p-4">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-full bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center">
                        <svg class="w-5 h-5 text-emerald-600 dark:text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <span class="text-body-sm text-gray-500 dark:text-gray-400">別人欠您</span>
                </div>
                <p class="text-h3 font-bold text-emerald-600 dark:text-emerald-400">
                    <span th:text="'$' + ${#numbers.formatDecimal(overview.totalOwedToUser, 0, 0)}">$0</span>
                </p>
            </div>

            <!-- User Owes -->
            <div class="glass-card p-4">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-full bg-rose-100 dark:bg-rose-900/30 flex items-center justify-center">
                        <svg class="w-5 h-5 text-rose-600 dark:text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <span class="text-body-sm text-gray-500 dark:text-gray-400">您欠別人</span>
                </div>
                <p class="text-h3 font-bold text-rose-600 dark:text-rose-400">
                    <span th:text="'$' + ${#numbers.formatDecimal(overview.totalOwed, 0, 0)}">$0</span>
                </p>
            </div>

            <!-- Net Balance -->
            <div class="glass-card p-4">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-full bg-adventure-100 dark:bg-adventure-900/30 flex items-center justify-center">
                        <svg class="w-5 h-5 text-adventure-600 dark:text-adventure-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                        </svg>
                    </div>
                    <span class="text-body-sm text-gray-500 dark:text-gray-400">淨餘額</span>
                </div>
                <p class="text-h3 font-bold"
                   th:classappend="${(overview?.netBalance ?: T(java.math.BigDecimal).ZERO).compareTo(T(java.math.BigDecimal).ZERO) >= 0} ? 'text-emerald-600 dark:text-emerald-400' : 'text-rose-600 dark:text-rose-400'">
                    <span th:if="${(overview?.netBalance ?: T(java.math.BigDecimal).ZERO).compareTo(T(java.math.BigDecimal).ZERO) >= 0}" th:text="'+$' + ${#numbers.formatDecimal(overview?.netBalance ?: 0, 0, 0)}">+$0</span>
                    <span th:if="${(overview?.netBalance ?: T(java.math.BigDecimal).ZERO).compareTo(T(java.math.BigDecimal).ZERO) < 0}" th:text="'-$' + ${#numbers.formatDecimal((overview?.netBalance ?: T(java.math.BigDecimal).ZERO).abs(), 0, 0)}">-$0</span>
                </p>
            </div>
        </section>

        <!-- Trip Count Badge -->
        <section class="mb-6">
            <span class="inline-flex items-center gap-2 px-3 py-1 bg-primary-100 dark:bg-primary-900/30 rounded-full text-body-sm text-primary-700 dark:text-primary-300">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span th:text="${overview.tripCount} + ' 個行程'">0 個行程</span>
            </span>
        </section>

        <!-- Unsettled Trips -->
        <section th:if="${unsettledTrips != null and !unsettledTrips.isEmpty()}">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-h4 text-gray-800 dark:text-gray-100 font-heading">待結清行程</h2>
            </div>
            <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                <a th:each="trip : ${unsettledTrips}" th:href="@{/trips/{id}/expenses(id=${trip.tripId})}"
                   class="glass-card group hover:shadow-card-hover transition-all duration-200 cursor-pointer overflow-hidden">
                    <!-- Cover Image -->
                    <div class="relative h-32 bg-gradient-to-br from-gray-300 to-gray-400 dark:from-gray-600 dark:to-gray-700">
                        <img th:if="${trip.coverImageUrl}" th:src="${trip.coverImageUrl}"
                             th:alt="${trip.tripTitle + ' 封面圖片'}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
                        <!-- Balance Badge -->
                        <div class="absolute top-3 right-3 px-2 py-1 rounded-lg text-caption font-medium"
                             th:classappend="${(trip?.userBalance ?: T(java.math.BigDecimal).ZERO).compareTo(T(java.math.BigDecimal).ZERO) >= 0} ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white'">
                            <span th:if="${(trip?.userBalance ?: T(java.math.BigDecimal).ZERO).compareTo(T(java.math.BigDecimal).ZERO) >= 0}" th:text="'+$' + ${#numbers.formatDecimal(trip?.userBalance ?: 0, 0, 0)}">+$0</span>
                            <span th:if="${(trip?.userBalance ?: T(java.math.BigDecimal).ZERO).compareTo(T(java.math.BigDecimal).ZERO) < 0}" th:text="'-$' + ${#numbers.formatDecimal((trip?.userBalance ?: T(java.math.BigDecimal).ZERO).abs(), 0, 0)}">-$0</span>
                        </div>
                    </div>
                    <!-- Info -->
                    <div class="p-4">
                        <h3 class="text-body font-semibold text-gray-800 dark:text-gray-100 mb-1 group-hover:text-primary-600 transition-colors"
                            th:text="${trip.tripTitle}">行程名稱</h3>
                        <p class="text-body-sm"
                           th:classappend="${(trip?.userBalance ?: T(java.math.BigDecimal).ZERO).compareTo(T(java.math.BigDecimal).ZERO) >= 0} ? 'text-emerald-600 dark:text-emerald-400' : 'text-rose-600 dark:text-rose-400'">
                            <span th:if="${(trip?.userBalance ?: T(java.math.BigDecimal).ZERO).compareTo(T(java.math.BigDecimal).ZERO) >= 0}">可收回</span>
                            <span th:if="${(trip?.userBalance ?: T(java.math.BigDecimal).ZERO).compareTo(T(java.math.BigDecimal).ZERO) < 0}">待付款</span>
                        </p>
                    </div>
                </a>
            </div>
        </section>

        <!-- Empty State -->
        <section th:if="${unsettledTrips == null or unsettledTrips.isEmpty()}" class="glass-card p-8 text-center animate-fade-in">
            <div class="w-24 h-24 mx-auto mb-4 bg-emerald-100 dark:bg-emerald-900/30 rounded-full flex items-center justify-center">
                <svg class="w-12 h-12 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <h3 class="text-h4 text-gray-700 dark:text-gray-200 mb-2 font-heading">所有帳目已結清</h3>
            <p class="text-body-sm text-gray-500 dark:text-gray-400">目前沒有待結清的分帳記錄</p>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="flex justify-around max-w-md mx-auto">
            <!-- Dashboard -->
            <a th:href="@{/dashboard}" class="bottom-nav-item">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span class="text-xs mt-1">行程</span>
            </a>

            <!-- Expenses -->
            <a th:href="@{/expenses}" class="bottom-nav-item active">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                <span class="text-xs mt-1">分帳</span>
            </a>

            <!-- Add Button -->
            <a th:href="@{/trips/create}" aria-label="新增"
               class="-mt-5 w-14 h-14 bg-adventure-500 hover:bg-adventure-600
                      rounded-full text-white shadow-lg shadow-adventure-500/30
                      flex items-center justify-center
                      transition-all duration-200 active:scale-95 cursor-pointer">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
            </a>

            <!-- Documents -->
            <a th:href="@{/documents}" class="bottom-nav-item">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <span class="text-xs mt-1">檔案</span>
            </a>

            <!-- Profile -->
            <a th:href="@{/profile}" class="bottom-nav-item">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <span class="text-xs mt-1">我的</span>
            </a>
        </div>
    </nav>

    <!-- Scripts -->
    <script th:src="@{/js/app.js}" defer></script>
</body>
</html>
