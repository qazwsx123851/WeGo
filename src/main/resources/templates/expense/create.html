<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(title=${expense?.id != null ? '編輯支出' : '新增支出'})}"></head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 pb-20" th:data-base-currency="${trip.baseCurrency}">
    <!-- Header -->
    <header class="glass-card sticky top-0 z-40 rounded-none border-x-0 border-t-0">
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a th:href="@{/trips/{tripId}/expenses(tripId=${trip.id})}"
                   class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer"
                   aria-label="返回分帳列表">
                    <svg class="w-5 h-5 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </a>
                <h1 class="text-h4 text-gray-800 dark:text-gray-100 font-heading"
                    th:text="${expense?.id != null ? '編輯支出' : '新增支出'}">新增支出</h1>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="max-w-4xl mx-auto px-4 py-6">
        <form th:action="${'/trips/' + trip.id + '/expenses' + (expense?.id != null ? '/' + expense.id : '')}"
              method="post"
              id="expense-form"
              data-prevent-double-submit
              class="space-y-6">
            <input type="hidden" name="_method" th:value="${expense?.id != null ? 'PUT' : 'POST'}">
            <input th:if="${activityId}" type="hidden" name="activityId" th:value="${activityId}">

            <!-- Amount Section -->
            <section class="glass-card p-6">
                <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">金額</h2>

                <div class="space-y-4">
                    <!-- Amount Input -->
                    <div class="space-y-1.5">
                        <label for="amount" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                            金額 <span class="text-error">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 font-medium">$</span>
                            <input type="number"
                                   id="amount"
                                   name="amount"
                                   th:value="${expense?.amount}"
                                   step="0.01"
                                   min="0"
                                   required
                                   inputmode="decimal"
                                   placeholder="0.00"
                                   class="w-full pl-8 pr-20 py-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-800 dark:text-gray-100 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all duration-200 text-lg font-mono">
                            <select id="currency"
                                    name="currency"
                                    class="absolute right-2 top-1/2 -translate-y-1/2 bg-gray-100 dark:bg-gray-700 border-0 rounded-lg py-1.5 px-2 text-sm font-medium text-gray-700 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-primary-500/50 cursor-pointer">
                                <option value="TWD" th:selected="${expense?.currency == 'TWD' or expense?.currency == null}">TWD</option>
                                <option value="USD" th:selected="${expense?.currency == 'USD'}">USD</option>
                                <option value="JPY" th:selected="${expense?.currency == 'JPY'}">JPY</option>
                                <option value="EUR" th:selected="${expense?.currency == 'EUR'}">EUR</option>
                                <option value="KRW" th:selected="${expense?.currency == 'KRW'}">KRW</option>
                                <option value="CNY" th:selected="${expense?.currency == 'CNY'}">CNY</option>
                                <option value="GBP" th:selected="${expense?.currency == 'GBP'}">GBP</option>
                                <option value="THB" th:selected="${expense?.currency == 'THB'}">THB</option>
                            </select>
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="space-y-1.5">
                        <label for="description" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                            描述 <span class="text-error">*</span>
                        </label>
                        <input type="text"
                               id="description"
                               name="description"
                               th:value="${expense?.description ?: activityName}"
                               required
                               maxlength="100"
                               placeholder="例如：午餐、計程車、門票..."
                               class="w-full px-4 py-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-800 dark:text-gray-100 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all duration-200">
                    </div>

                    <!-- Category -->
                    <div class="space-y-1.5">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">類別</label>
                        <div class="grid grid-cols-4 gap-2">
                            <!-- Food -->
                            <label class="cursor-pointer">
                                <input type="radio" name="category" value="FOOD" class="peer sr-only"
                                       th:checked="${expense?.category == 'FOOD' or expense?.category == null}">
                                <div class="flex flex-col items-center gap-1 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 peer-checked:border-orange-500 peer-checked:bg-orange-50 dark:peer-checked:bg-orange-900/20 transition-all duration-200">
                                    <div class="w-10 h-10 rounded-xl bg-orange-100 dark:bg-orange-900/30 flex items-center justify-center">
                                        <svg class="w-5 h-5 text-orange-600 dark:text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                                        </svg>
                                    </div>
                                    <span class="text-xs text-gray-600 dark:text-gray-400">餐飲</span>
                                </div>
                            </label>

                            <!-- Transport -->
                            <label class="cursor-pointer">
                                <input type="radio" name="category" value="TRANSPORT" class="peer sr-only"
                                       th:checked="${expense?.category == 'TRANSPORT'}">
                                <div class="flex flex-col items-center gap-1 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 peer-checked:border-blue-500 peer-checked:bg-blue-50 dark:peer-checked:bg-blue-900/20 transition-all duration-200">
                                    <div class="w-10 h-10 rounded-xl bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center">
                                        <svg class="w-5 h-5 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                                        </svg>
                                    </div>
                                    <span class="text-xs text-gray-600 dark:text-gray-400">交通</span>
                                </div>
                            </label>

                            <!-- Accommodation -->
                            <label class="cursor-pointer">
                                <input type="radio" name="category" value="ACCOMMODATION" class="peer sr-only"
                                       th:checked="${expense?.category == 'ACCOMMODATION'}">
                                <div class="flex flex-col items-center gap-1 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 peer-checked:border-purple-500 peer-checked:bg-purple-50 dark:peer-checked:bg-purple-900/20 transition-all duration-200">
                                    <div class="w-10 h-10 rounded-xl bg-purple-100 dark:bg-purple-900/30 flex items-center justify-center">
                                        <svg class="w-5 h-5 text-purple-600 dark:text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                                        </svg>
                                    </div>
                                    <span class="text-xs text-gray-600 dark:text-gray-400">住宿</span>
                                </div>
                            </label>

                            <!-- Shopping -->
                            <label class="cursor-pointer">
                                <input type="radio" name="category" value="SHOPPING" class="peer sr-only"
                                       th:checked="${expense?.category == 'SHOPPING'}">
                                <div class="flex flex-col items-center gap-1 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 peer-checked:border-pink-500 peer-checked:bg-pink-50 dark:peer-checked:bg-pink-900/20 transition-all duration-200">
                                    <div class="w-10 h-10 rounded-xl bg-pink-100 dark:bg-pink-900/30 flex items-center justify-center">
                                        <svg class="w-5 h-5 text-pink-600 dark:text-pink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                                        </svg>
                                    </div>
                                    <span class="text-xs text-gray-600 dark:text-gray-400">購物</span>
                                </div>
                            </label>

                            <!-- Entertainment -->
                            <label class="cursor-pointer">
                                <input type="radio" name="category" value="ENTERTAINMENT" class="peer sr-only"
                                       th:checked="${expense?.category == 'ENTERTAINMENT'}">
                                <div class="flex flex-col items-center gap-1 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 peer-checked:border-rose-500 peer-checked:bg-rose-50 dark:peer-checked:bg-rose-900/20 transition-all duration-200">
                                    <div class="w-10 h-10 rounded-xl bg-rose-100 dark:bg-rose-900/30 flex items-center justify-center">
                                        <svg class="w-5 h-5 text-rose-600 dark:text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                        </svg>
                                    </div>
                                    <span class="text-xs text-gray-600 dark:text-gray-400">娛樂</span>
                                </div>
                            </label>

                            <!-- Health -->
                            <label class="cursor-pointer">
                                <input type="radio" name="category" value="HEALTH" class="peer sr-only"
                                       th:checked="${expense?.category == 'HEALTH'}">
                                <div class="flex flex-col items-center gap-1 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 peer-checked:border-emerald-500 peer-checked:bg-emerald-50 dark:peer-checked:bg-emerald-900/20 transition-all duration-200">
                                    <div class="w-10 h-10 rounded-xl bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center">
                                        <svg class="w-5 h-5 text-emerald-600 dark:text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                                        </svg>
                                    </div>
                                    <span class="text-xs text-gray-600 dark:text-gray-400">健康</span>
                                </div>
                            </label>

                            <!-- Other -->
                            <label class="cursor-pointer">
                                <input type="radio" name="category" value="OTHER" class="peer sr-only"
                                       th:checked="${expense?.category == 'OTHER'}">
                                <div class="flex flex-col items-center gap-1 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 peer-checked:border-gray-500 peer-checked:bg-gray-50 dark:peer-checked:bg-gray-700/50 transition-all duration-200">
                                    <div class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-gray-700 flex items-center justify-center">
                                        <svg class="w-5 h-5 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
                                        </svg>
                                    </div>
                                    <span class="text-xs text-gray-600 dark:text-gray-400">其他</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Date -->
                    <div class="space-y-1.5">
                        <label for="expenseDate" class="block text-sm font-medium text-gray-700 dark:text-gray-300">日期</label>

                        <!-- Quick Date Chips -->
                        <div id="date-chips" class="flex flex-wrap gap-2"
                             th:with="tripStart=${trip?.startDate != null ? #temporals.format(trip.startDate, 'yyyy-MM-dd') : ''},
                                      tripEnd=${trip?.endDate != null ? #temporals.format(trip.endDate, 'yyyy-MM-dd') : ''},
                                      currentVal=${expense?.expenseDate != null ? #temporals.format(expense.expenseDate, 'yyyy-MM-dd') : #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                            <button type="button" class="date-chip min-h-[44px] px-4 py-2 rounded-xl text-sm font-medium border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:border-primary-400 hover:bg-primary-50 dark:hover:bg-primary-900/20 transition-all duration-200 cursor-pointer"
                                    data-date-offset="0">今天</button>
                            <button type="button" class="date-chip min-h-[44px] px-4 py-2 rounded-xl text-sm font-medium border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:border-primary-400 hover:bg-primary-50 dark:hover:bg-primary-900/20 transition-all duration-200 cursor-pointer"
                                    data-date-offset="-1">昨天</button>
                        </div>

                        <!-- Date Input with Calendar Icon -->
                        <div class="relative">
                            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 dark:text-gray-500 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                            <input type="text"
                                   id="expenseDate"
                                   name="expenseDate"
                                   data-datepicker
                                   readonly
                                   th:value="${expense?.expenseDate != null ? #temporals.format(expense.expenseDate, 'yyyy-MM-dd') : (activityDate ?: #temporals.format(#temporals.createNow(), 'yyyy-MM-dd'))}"
                                   th:data-min-date="${trip?.startDate != null ? #temporals.format(trip.startDate, 'yyyy-MM-dd') : ''}"
                                   th:data-max-date="${trip?.endDate != null ? #temporals.format(trip.endDate, 'yyyy-MM-dd') : ''}"
                                   placeholder="選擇日期"
                                   class="w-full pl-10 pr-4 py-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all duration-200 cursor-pointer">
                        </div>
                    </div>
                </div>
            </section>

            <!-- Payer Section -->
            <section class="glass-card p-6">
                <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">付款人</h2>

                <div class="space-y-1.5">
                    <label for="payerId" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                        誰先付錢？ <span class="text-error">*</span>
                    </label>
                    <select id="payerId"
                            name="payerId"
                            required
                            class="w-full px-4 py-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all duration-200 cursor-pointer">
                        <option value="">請選擇付款人</option>
                        <option th:each="member : ${members}"
                                th:value="${member.userId}"
                                th:text="${member.nickname}"
                                th:selected="${expense?.paidBy == member.userId or (expense?.paidBy == null and member.userId == currentUserId)}">
                            成員名稱
                        </option>
                    </select>
                </div>
            </section>

            <!-- Split Method Section -->
            <section class="glass-card p-6">
                <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">分帳方式</h2>

                <!-- Split Method Tabs -->
                <div class="flex gap-2 mb-4 p-1 bg-gray-100 dark:bg-gray-800 rounded-xl">
                    <button type="button"
                            data-split-method="EQUAL"
                            class="split-tab flex-1 py-2 px-3 rounded-lg text-sm font-medium transition-all duration-200 active"
                            th:classappend="${expense?.splitType?.name() == 'EQUAL' or expense?.splitType == null ? 'active' : ''}">
                        均分
                    </button>
                    <button type="button"
                            data-split-method="PERCENTAGE"
                            class="split-tab flex-1 py-2 px-3 rounded-lg text-sm font-medium transition-all duration-200"
                            th:classappend="${expense?.splitType?.name() == 'PERCENTAGE' ? 'active' : ''}">
                        百分比
                    </button>
                    <button type="button"
                            data-split-method="CUSTOM"
                            class="split-tab flex-1 py-2 px-3 rounded-lg text-sm font-medium transition-all duration-200"
                            th:classappend="${expense?.splitType?.name() == 'CUSTOM' ? 'active' : ''}">
                        自訂金額
                    </button>
                </div>
                <input type="hidden" id="splitMethod" name="splitMethod"
                       th:value="${expense?.splitType != null ? expense.splitType.name() : 'EQUAL'}">

                <!-- Participants -->
                <div class="space-y-3">
                    <p class="text-sm text-gray-600 dark:text-gray-400">選擇要分攤的成員</p>

                    <!-- Equal Split -->
                    <div id="split-equal" class="split-content space-y-2">
                        <div th:each="member : ${members}" class="flex items-center gap-3 p-3 bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700">
                            <label class="flex items-center gap-3 flex-1 cursor-pointer">
                                <input type="checkbox"
                                       th:name="'participantIds'"
                                       th:value="${member.userId}"
                                       checked
                                       class="participant-checkbox w-5 h-5 rounded border-gray-300 text-primary-500 focus:ring-primary-500 cursor-pointer">
                                <div class="w-8 h-8 rounded-full bg-primary-100 dark:bg-primary-900/30 flex items-center justify-center">
                                    <span class="text-sm font-medium text-primary-600 dark:text-primary-400"
                                          th:text="${member?.nickname?.length() > 0 ? #strings.substring(member.nickname, 0, 1) : '?'}">A</span>
                                </div>
                                <span class="text-sm font-medium text-gray-800 dark:text-gray-100"
                                      th:text="${member.nickname}">成員名稱</span>
                            </label>
                            <span class="text-sm text-gray-500 dark:text-gray-400 font-mono equal-amount">$0</span>
                        </div>
                    </div>

                    <!-- Percentage Split -->
                    <div id="split-percentage" class="split-content space-y-2 hidden">
                        <div th:each="member : ${members}" class="flex items-center gap-3 p-3 bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700">
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input type="checkbox"
                                       th:data-user-id="${member.userId}"
                                       class="percentage-participant-checkbox w-5 h-5 rounded border-gray-300 text-primary-500 focus:ring-primary-500 cursor-pointer"
                                       checked>
                                <div class="w-8 h-8 rounded-full bg-primary-100 dark:bg-primary-900/30 flex items-center justify-center">
                                    <span class="text-sm font-medium text-primary-600 dark:text-primary-400"
                                          th:text="${member?.nickname?.length() > 0 ? #strings.substring(member.nickname, 0, 1) : '?'}">A</span>
                                </div>
                                <span class="text-sm font-medium text-gray-800 dark:text-gray-100"
                                      th:text="${member.nickname}">成員名稱</span>
                            </label>
                            <div class="flex-1"></div>
                            <div class="flex items-center gap-2">
                                <input type="number"
                                       th:name="'percentages[' + ${member.userId} + ']'"
                                       th:id="'percentage-' + ${member.userId}"
                                       value="0"
                                       min="0"
                                       max="100"
                                       step="1"
                                       class="percentage-input w-16 px-2 py-1 text-sm bg-gray-100 dark:bg-gray-700 border-0 rounded-lg text-right font-mono focus:outline-none focus:ring-2 focus:ring-primary-500/50">
                                <span class="text-sm text-gray-500 dark:text-gray-400">%</span>
                            </div>
                            <span class="text-sm text-gray-500 dark:text-gray-400 font-mono w-20 text-right percentage-amount">$0</span>
                        </div>
                        <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-800/50 rounded-xl">
                            <span class="text-sm font-medium text-gray-600 dark:text-gray-400">總計</span>
                            <span id="percentage-total" class="text-sm font-semibold font-mono"
                                  th:classappend="${true ? 'text-success' : 'text-error'}">0%</span>
                        </div>
                    </div>

                    <!-- Custom Split -->
                    <div id="split-custom" class="split-content space-y-2 hidden">
                        <div th:each="member : ${members}" class="flex items-center gap-3 p-3 bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700">
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input type="checkbox"
                                       th:data-user-id="${member.userId}"
                                       class="custom-participant-checkbox w-5 h-5 rounded border-gray-300 text-primary-500 focus:ring-primary-500 cursor-pointer"
                                       checked>
                                <div class="w-8 h-8 rounded-full bg-primary-100 dark:bg-primary-900/30 flex items-center justify-center">
                                    <span class="text-sm font-medium text-primary-600 dark:text-primary-400"
                                          th:text="${member?.nickname?.length() > 0 ? #strings.substring(member.nickname, 0, 1) : '?'}">A</span>
                                </div>
                                <span class="text-sm font-medium text-gray-800 dark:text-gray-100"
                                      th:text="${member.nickname}">成員名稱</span>
                            </label>
                            <div class="flex-1"></div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm text-gray-500 dark:text-gray-400">$</span>
                                <input type="number"
                                       th:name="'customAmounts[' + ${member.userId} + ']'"
                                       th:id="'custom-' + ${member.userId}"
                                       value="0"
                                       min="0"
                                       step="0.01"
                                       class="custom-input w-24 px-2 py-1 text-sm bg-gray-100 dark:bg-gray-700 border-0 rounded-lg text-right font-mono focus:outline-none focus:ring-2 focus:ring-primary-500/50">
                            </div>
                        </div>
                        <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-800/50 rounded-xl">
                            <span class="text-sm font-medium text-gray-600 dark:text-gray-400">總計</span>
                            <span id="custom-total" class="text-sm font-semibold font-mono text-gray-800 dark:text-gray-100">$0</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Notes Section -->
            <section class="glass-card p-6">
                <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">備註</h2>
                <textarea id="notes"
                          name="notes"
                          th:text="${expense?.note}"
                          rows="3"
                          maxlength="500"
                          placeholder="可選填的備註資訊..."
                          class="w-full px-4 py-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-800 dark:text-gray-100 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all duration-200 resize-none"></textarea>
            </section>

            <!-- Submit Button -->
            <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl border-t border-gray-100 dark:border-gray-800">
                <div class="max-w-4xl mx-auto flex gap-3">
                    <a th:href="@{/trips/{tripId}/expenses(tripId=${trip.id})}"
                       class="flex-1 btn-text text-center py-3 rounded-xl border border-gray-200 dark:border-gray-700">
                        取消
                    </a>
                    <button type="submit" class="flex-1 btn-cta py-3">
                        <span th:text="${expense?.id != null ? '儲存變更' : '新增支出'}">新增支出</span>
                    </button>
                </div>
            </div>
        </form>
    </main>

    <!-- Expense form module -->
    <script th:src="@{/js/app.js}" defer></script>
    <script th:src="@{/js/expense.js}" defer></script>

    <style>
        .split-tab {
            color: rgb(107 114 128);
        }
        .split-tab.active {
            background-color: white;
            color: rgb(31 41 55);
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }
        .dark .split-tab.active {
            background-color: rgb(55 65 81);
            color: rgb(243 244 246);
        }

        /* Flatpickr Dark Mode */
        .dark .flatpickr-calendar {
            background: rgb(31 41 55);
            border-color: rgb(55 65 81);
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.3);
        }
        .dark .flatpickr-months .flatpickr-month,
        .dark .flatpickr-current-month .flatpickr-monthDropdown-months {
            background: rgb(31 41 55);
            color: rgb(243 244 246);
        }
        .dark .flatpickr-current-month input.cur-year {
            color: rgb(243 244 246);
        }
        .dark .flatpickr-weekdays {
            background: rgb(31 41 55);
        }
        .dark span.flatpickr-weekday {
            color: rgb(156 163 175);
            background: rgb(31 41 55);
        }
        .dark .flatpickr-day {
            color: rgb(229 231 235);
        }
        .dark .flatpickr-day:hover {
            background: rgb(55 65 81);
            border-color: rgb(55 65 81);
        }
        .dark .flatpickr-day.today {
            border-color: rgb(14 165 233);
        }
        .dark .flatpickr-day.today:hover {
            background: rgb(14 165 233);
            border-color: rgb(14 165 233);
            color: white;
        }
        .dark .flatpickr-day.selected {
            background: rgb(14 165 233);
            border-color: rgb(14 165 233);
            color: white;
        }
        .dark .flatpickr-day.flatpickr-disabled,
        .dark .flatpickr-day.flatpickr-disabled:hover {
            color: rgb(75 85 99);
            background: transparent;
        }
        .dark .flatpickr-day.prevMonthDay,
        .dark .flatpickr-day.nextMonthDay {
            color: rgb(75 85 99);
        }
        .dark .flatpickr-months .flatpickr-prev-month,
        .dark .flatpickr-months .flatpickr-next-month {
            fill: rgb(156 163 175);
        }
        .dark .flatpickr-months .flatpickr-prev-month:hover,
        .dark .flatpickr-months .flatpickr-next-month:hover {
            fill: rgb(243 244 246);
        }
        .dark .flatpickr-monthDropdown-months option {
            background: rgb(31 41 55);
            color: rgb(243 244 246);
        }

        /* Flatpickr altInput styling - inherit padding for calendar icon */
        .relative > input.form-control.input {
            padding-left: 2.5rem !important;
            cursor: pointer;
        }
    </style>
</body>
</html>
