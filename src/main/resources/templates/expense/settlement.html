<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title=${trip.title} + ' - 結算明細')}"></head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 pb-20">
    <!-- Toast Container -->
    <div th:replace="~{fragments/components :: toast-container}"></div>

    <!-- Header -->
    <header class="glass-card sticky top-0 z-40 rounded-none border-x-0 border-t-0">
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a th:href="@{/trips/{tripId}/expenses(tripId=${trip.id})}"
                   class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer"
                   aria-label="返回分帳列表">
                    <svg class="w-5 h-5 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </a>
                <h1 class="text-h4 text-gray-800 dark:text-gray-100 font-heading">結算明細</h1>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-6">
        <!-- Summary Overview -->
        <section class="glass-card p-6 mb-6">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-12 h-12 rounded-xl bg-primary-100 dark:bg-primary-900/30 flex items-center justify-center">
                    <svg class="w-6 h-6 text-primary-600 dark:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div>
                    <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100" th:text="${trip.title}">行程名稱</h2>
                    <p class="text-sm text-gray-500 dark:text-gray-400">
                        <span th:text="${#temporals.format(trip.startDate, 'MM/dd')}">01/01</span> -
                        <span th:text="${#temporals.format(trip.endDate, 'MM/dd')}">01/07</span>
                    </p>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                <div class="text-center">
                    <p class="text-2xl font-bold text-gray-800 dark:text-gray-100 font-mono"
                       th:text="'$' + ${#numbers.formatDecimal(settlement.totalExpenses != null ? settlement.totalExpenses : 0, 0, 'COMMA', 0, 'POINT')}">$0</p>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                        總支出 (<span th:text="${settlement.baseCurrency}">TWD</span>)
                    </p>
                </div>
                <div class="text-center">
                    <p class="text-2xl font-bold text-gray-800 dark:text-gray-100 font-mono"
                       th:text="'$' + ${#numbers.formatDecimal(perPersonAverage != null ? perPersonAverage : 0, 0, 'COMMA', 0, 'POINT')}">$0</p>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">人均花費</p>
                </div>
                <div class="text-center">
                    <p class="text-2xl font-bold text-gray-800 dark:text-gray-100"
                       th:text="${settlement.expenseCount}">0</p>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">筆交易</p>
                </div>
            </div>

            <!-- Currency Breakdown -->
            <div th:if="${settlement.currencyBreakdown != null and #maps.size(settlement.currencyBreakdown) > 1}"
                 class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-2">各幣別原始金額</p>
                <div class="flex flex-wrap gap-2">
                    <div th:each="entry : ${settlement.currencyBreakdown}"
                         class="inline-flex items-center gap-1 px-3 py-1 bg-gray-100 dark:bg-gray-700/50 rounded-full text-sm">
                        <span class="font-medium text-gray-700 dark:text-gray-300" th:text="${entry.key}">USD</span>
                        <span class="text-gray-500 dark:text-gray-400 font-mono"
                              th:text="'$' + ${#numbers.formatDecimal(entry.value, 0, 'COMMA', 0, 'POINT')}">$100</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Simplified Settlements -->
        <section class="mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                    </svg>
                    建議轉帳
                </h2>
                <span th:if="${settlement.settlements != null and !#lists.isEmpty(settlement.settlements)}"
                      class="text-xs text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded-full"
                      th:text="${#lists.size(settlement.settlements)} + ' 筆轉帳'">0 筆轉帳</span>
            </div>

            <!-- All Settled State -->
            <div th:if="${settlement.settlements == null or #lists.isEmpty(settlement.settlements)}" class="glass-card p-8 text-center">
                <div class="w-20 h-20 mx-auto mb-4 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center">
                    <svg class="w-10 h-10 text-green-500 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-2">所有帳目已結清</h3>
                <p class="text-sm text-gray-500 dark:text-gray-400">目前沒有待處理的轉帳</p>
            </div>

            <!-- Settlement List -->
            <div th:unless="${settlement.settlements == null or #lists.isEmpty(settlement.settlements)}" class="space-y-3">
                <div th:each="item, iterStat : ${settlement.settlements}"
                     class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-card">
                    <div class="flex items-center gap-3">
                        <!-- From User -->
                        <div class="flex items-center gap-2 min-w-0">
                            <div th:if="${item.fromUserAvatarUrl != null}"
                                 class="w-10 h-10 rounded-full overflow-hidden flex-shrink-0 ring-2 ring-red-200 dark:ring-red-800">
                                <img th:src="${item.fromUserAvatarUrl}"
                                     th:alt="${item.fromUserName}"
                                     class="w-full h-full object-cover"
                                     referrerpolicy="no-referrer">
                            </div>
                            <div th:unless="${item.fromUserAvatarUrl != null}"
                                 class="w-10 h-10 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center flex-shrink-0 ring-2 ring-red-200 dark:ring-red-800">
                                <span class="text-sm font-semibold text-red-600 dark:text-red-400"
                                      th:text="${#strings.substring(item.fromUserName, 0, 1)}">A</span>
                            </div>
                            <span class="text-sm font-medium text-gray-800 dark:text-gray-100 truncate hidden sm:inline"
                                  th:text="${item.fromUserName}">付款人</span>
                        </div>

                        <!-- Arrow with Amount -->
                        <div class="flex-1 flex items-center justify-center">
                            <div class="flex items-center gap-2 px-4 py-2 bg-gray-50 dark:bg-gray-700/50 rounded-full">
                                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                                </svg>
                                <span class="font-semibold font-mono text-primary-600 dark:text-primary-400"
                                      th:text="'$' + ${#numbers.formatDecimal(item.amount, 0, 'COMMA', 0, 'POINT')}">$0</span>
                            </div>
                        </div>

                        <!-- To User -->
                        <div class="flex items-center gap-2 min-w-0">
                            <span class="text-sm font-medium text-gray-800 dark:text-gray-100 truncate hidden sm:inline"
                                  th:text="${item.toUserName}">收款人</span>
                            <div th:if="${item.toUserAvatarUrl != null}"
                                 class="w-10 h-10 rounded-full overflow-hidden flex-shrink-0 ring-2 ring-green-200 dark:ring-green-800">
                                <img th:src="${item.toUserAvatarUrl}"
                                     th:alt="${item.toUserName}"
                                     class="w-full h-full object-cover"
                                     referrerpolicy="no-referrer">
                            </div>
                            <div th:unless="${item.toUserAvatarUrl != null}"
                                 class="w-10 h-10 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center flex-shrink-0 ring-2 ring-green-200 dark:ring-green-800">
                                <span class="text-sm font-semibold text-green-600 dark:text-green-400"
                                      th:text="${#strings.substring(item.toUserName, 0, 1)}">B</span>
                            </div>
                        </div>
                    </div>

                    <!-- Mobile Names -->
                    <div class="sm:hidden mt-3 pt-3 border-t border-gray-100 dark:border-gray-700 flex justify-between text-sm">
                        <div class="flex items-center gap-1">
                            <span class="text-red-500">付</span>
                            <span class="text-gray-600 dark:text-gray-400" th:text="${item.fromUserName}">付款人</span>
                        </div>
                        <div class="flex items-center gap-1">
                            <span class="text-green-500">收</span>
                            <span class="text-gray-600 dark:text-gray-400" th:text="${item.toUserName}">收款人</span>
                        </div>
                    </div>

                    <!-- Index indicator -->
                    <div class="mt-3 pt-3 border-t border-gray-100 dark:border-gray-700 flex items-center justify-between">
                        <span class="text-xs text-gray-500 dark:text-gray-400">
                            第 <span th:text="${iterStat.index + 1}">1</span> 筆，共
                            <span th:text="${#lists.size(settlement.settlements)}">3</span> 筆
                        </span>
                        <span class="text-xs text-gray-400 dark:text-gray-500" th:text="${settlement.baseCurrency}">TWD</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Help Text -->
        <section th:if="${settlement.settlements != null and !#lists.isEmpty(settlement.settlements)}" class="mb-6">
            <div class="p-4 bg-blue-50 dark:bg-blue-900/20 rounded-xl border border-blue-100 dark:border-blue-800">
                <div class="flex gap-3">
                    <svg class="w-5 h-5 text-blue-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <div class="text-sm text-blue-700 dark:text-blue-300">
                        <p class="font-medium mb-1">債務簡化說明</p>
                        <p class="text-blue-600 dark:text-blue-400">系統已自動將複雜的多方債務關係簡化為最少的轉帳次數，讓結算更方便！</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Actions -->
        <section class="flex flex-col sm:flex-row gap-3">
            <a th:href="@{/trips/{tripId}/expenses(tripId=${trip.id})}"
               class="btn-secondary flex-1 flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                返回分帳列表
            </a>
            <a th:href="@{/trips/{tripId}(tripId=${trip.id})}"
               class="btn-text flex-1 flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                返回行程
            </a>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav th:replace="~{fragments/components :: bottom-nav}"></nav>
</body>
</html>
