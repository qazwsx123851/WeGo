<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${trip.title} + ' - 結算明細 - WeGo'">結算明細 - WeGo</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 pb-20">
    <!-- Header -->
    <header class="glass-card sticky top-0 z-40 rounded-none border-x-0 border-t-0">
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a th:href="@{/trips/{tripId}/expenses(tripId=${trip.id})}"
                   class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer"
                   aria-label="返回分帳列表">
                    <svg class="w-5 h-5 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </a>
                <h1 class="text-h4 text-gray-800 dark:text-gray-100 font-heading">結算明細</h1>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-6">
        <!-- Summary Overview -->
        <section class="glass-card p-6 mb-6">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-12 h-12 rounded-xl bg-primary-100 dark:bg-primary-900/30 flex items-center justify-center">
                    <svg class="w-6 h-6 text-primary-600 dark:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div>
                    <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100" th:text="${trip.title}">行程名稱</h2>
                    <p class="text-sm text-gray-500 dark:text-gray-400">
                        <span th:text="${#temporals.format(trip.startDate, 'MM/dd')}">01/01</span> -
                        <span th:text="${#temporals.format(trip.endDate, 'MM/dd')}">01/07</span>
                    </p>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                <div class="text-center">
                    <p class="text-2xl font-bold text-gray-800 dark:text-gray-100 font-mono"
                       th:text="'$' + ${#numbers.formatDecimal(totalExpense, 0, 'COMMA', 0, 'POINT')}">$0</p>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">總支出</p>
                </div>
                <div class="text-center">
                    <p class="text-2xl font-bold text-gray-800 dark:text-gray-100"
                       th:text="${expenseCount}">0</p>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">筆交易</p>
                </div>
                <div class="text-center">
                    <p class="text-2xl font-bold text-gray-800 dark:text-gray-100"
                       th:text="${memberCount}">0</p>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">位成員</p>
                </div>
            </div>
        </section>

        <!-- Individual Balances -->
        <section class="mb-6">
            <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">個人餘額</h2>

            <div class="space-y-3">
                <div th:each="balance : ${memberBalances}"
                     class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-card">
                    <div class="flex items-center gap-3">
                        <!-- Avatar -->
                        <div class="w-12 h-12 rounded-full flex items-center justify-center"
                             th:classappend="${balance.amount >= 0 ? 'bg-success/10 dark:bg-green-900/30' : 'bg-error/10 dark:bg-red-900/30'}">
                            <span class="text-lg font-semibold"
                                  th:classappend="${balance.amount >= 0 ? 'text-success dark:text-green-400' : 'text-error dark:text-red-400'}"
                                  th:text="${#strings.substring(balance.user.name, 0, 1)}">A</span>
                        </div>

                        <!-- Name & Details -->
                        <div class="flex-1">
                            <p class="font-medium text-gray-800 dark:text-gray-100"
                               th:text="${balance.user.name}">成員名稱</p>
                            <div class="flex items-center gap-3 mt-1 text-xs text-gray-500 dark:text-gray-400">
                                <span>
                                    已付
                                    <span class="font-mono font-medium text-gray-700 dark:text-gray-300"
                                          th:text="'$' + ${#numbers.formatDecimal(balance.totalPaid, 0, 'COMMA', 0, 'POINT')}">$0</span>
                                </span>
                                <span class="text-gray-300 dark:text-gray-600">|</span>
                                <span>
                                    應付
                                    <span class="font-mono font-medium text-gray-700 dark:text-gray-300"
                                          th:text="'$' + ${#numbers.formatDecimal(balance.totalOwed, 0, 'COMMA', 0, 'POINT')}">$0</span>
                                </span>
                            </div>
                        </div>

                        <!-- Balance -->
                        <div class="text-right">
                            <p class="text-lg font-semibold font-mono"
                               th:classappend="${balance.amount >= 0 ? 'text-success dark:text-green-400' : 'text-error dark:text-red-400'}"
                               th:text="${(balance.amount >= 0 ? '+' : '') + #numbers.formatDecimal(balance.amount, 0, 'COMMA', 0, 'POINT')}">+0</p>
                            <p class="text-xs"
                               th:classappend="${balance.amount >= 0 ? 'text-success/70 dark:text-green-400/70' : 'text-error/70 dark:text-red-400/70'}"
                               th:text="${balance.amount >= 0 ? '可收回' : '需支付'}">狀態</p>
                        </div>
                    </div>

                    <!-- Progress Bar -->
                    <div class="mt-3 h-2 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                        <div class="h-full rounded-full transition-all duration-300"
                             th:classappend="${balance.amount >= 0 ? 'bg-success' : 'bg-error'}"
                             th:style="'width: ' + ${balance.percentage} + '%'"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Simplified Settlements -->
        <section class="mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100">簡化結算</h2>
                <span class="text-xs text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded-full"
                      th:text="${#lists.size(settlements)} + ' 筆轉帳'">0 筆轉帳</span>
            </div>

            <!-- All Settled State -->
            <div th:if="${#lists.isEmpty(settlements)}" class="glass-card p-8 text-center">
                <div class="w-20 h-20 mx-auto mb-4 bg-success/10 dark:bg-green-900/30 rounded-full flex items-center justify-center">
                    <svg class="w-10 h-10 text-success dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-2">所有帳目已結清</h3>
                <p class="text-sm text-gray-500 dark:text-gray-400">目前沒有待處理的轉帳</p>
            </div>

            <!-- Settlement List -->
            <div th:unless="${#lists.isEmpty(settlements)}" class="space-y-3">
                <div th:each="settlement, iterStat : ${settlements}"
                     class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-card">
                    <div class="flex items-center gap-3">
                        <!-- From User -->
                        <div class="flex items-center gap-2">
                            <div class="w-10 h-10 rounded-full bg-error/10 dark:bg-red-900/30 flex items-center justify-center">
                                <span class="text-sm font-semibold text-error dark:text-red-400"
                                      th:text="${#strings.substring(settlement.from.name, 0, 1)}">A</span>
                            </div>
                            <span class="text-sm font-medium text-gray-800 dark:text-gray-100 hidden sm:inline"
                                  th:text="${settlement.from.name}">付款人</span>
                        </div>

                        <!-- Arrow with Amount -->
                        <div class="flex-1 flex items-center justify-center">
                            <div class="flex items-center gap-2 px-4 py-2 bg-gray-50 dark:bg-gray-700/50 rounded-full">
                                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                                </svg>
                                <span class="font-semibold font-mono text-gray-800 dark:text-gray-100"
                                      th:text="'$' + ${#numbers.formatDecimal(settlement.amount, 0, 'COMMA', 0, 'POINT')}">$0</span>
                                <span th:if="${settlement.currency != defaultCurrency}"
                                      class="text-xs text-gray-500 dark:text-gray-400"
                                      th:text="${settlement.currency}">TWD</span>
                            </div>
                        </div>

                        <!-- To User -->
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-medium text-gray-800 dark:text-gray-100 hidden sm:inline"
                                  th:text="${settlement.to.name}">收款人</span>
                            <div class="w-10 h-10 rounded-full bg-success/10 dark:bg-green-900/30 flex items-center justify-center">
                                <span class="text-sm font-semibold text-success dark:text-green-400"
                                      th:text="${#strings.substring(settlement.to.name, 0, 1)}">B</span>
                            </div>
                        </div>
                    </div>

                    <!-- Mobile Names -->
                    <div class="sm:hidden mt-3 pt-3 border-t border-gray-100 dark:border-gray-700 flex justify-between text-sm">
                        <span class="text-gray-600 dark:text-gray-400" th:text="${settlement.from.name}">付款人</span>
                        <span class="text-gray-600 dark:text-gray-400" th:text="${settlement.to.name}">收款人</span>
                    </div>

                    <!-- Mark as Settled Button -->
                    <div class="mt-3 pt-3 border-t border-gray-100 dark:border-gray-700">
                        <form th:action="@{/trips/{tripId}/settlements/{settlementId}/complete(tripId=${trip.id}, settlementId=${settlement.id})}"
                              method="post"
                              class="flex items-center justify-between">
                            <span class="text-xs text-gray-500 dark:text-gray-400">
                                第 <span th:text="${iterStat.index + 1}">1</span> 筆，共
                                <span th:text="${#lists.size(settlements)}">3</span> 筆
                            </span>
                            <button type="submit"
                                    class="inline-flex items-center gap-1 px-3 py-1.5 text-sm font-medium text-primary-600 dark:text-primary-400 hover:bg-primary-50 dark:hover:bg-primary-900/20 rounded-lg transition-colors cursor-pointer">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                </svg>
                                標記已轉帳
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <!-- Expense Breakdown by Category -->
        <section class="mb-6">
            <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">支出分類</h2>

            <div class="glass-card p-6">
                <div class="space-y-4">
                    <div th:each="category : ${expensesByCategory}"
                         class="flex items-center gap-3">
                        <!-- Category Icon -->
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center"
                             th:classappend="${category.key == 'FOOD' ? 'bg-orange-100 dark:bg-orange-900/30' :
                                              category.key == 'TRANSPORT' ? 'bg-blue-100 dark:bg-blue-900/30' :
                                              category.key == 'ACCOMMODATION' ? 'bg-purple-100 dark:bg-purple-900/30' :
                                              category.key == 'ENTERTAINMENT' ? 'bg-pink-100 dark:bg-pink-900/30' :
                                              'bg-gray-100 dark:bg-gray-700'}">
                            <svg th:if="${category.key == 'FOOD'}" class="w-5 h-5 text-orange-600 dark:text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                            </svg>
                            <svg th:if="${category.key == 'TRANSPORT'}" class="w-5 h-5 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                            </svg>
                            <svg th:if="${category.key == 'ACCOMMODATION'}" class="w-5 h-5 text-purple-600 dark:text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                            </svg>
                            <svg th:if="${category.key == 'ENTERTAINMENT'}" class="w-5 h-5 text-pink-600 dark:text-pink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <svg th:if="${category.key == 'OTHER' or category.key == null}" class="w-5 h-5 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
                            </svg>
                        </div>

                        <!-- Category Name & Progress -->
                        <div class="flex-1">
                            <div class="flex items-center justify-between mb-1">
                                <span class="text-sm font-medium text-gray-800 dark:text-gray-100"
                                      th:text="${category.key == 'FOOD' ? '餐飲' :
                                                 category.key == 'TRANSPORT' ? '交通' :
                                                 category.key == 'ACCOMMODATION' ? '住宿' :
                                                 category.key == 'ENTERTAINMENT' ? '娛樂' : '其他'}">類別</span>
                                <span class="text-sm font-mono text-gray-600 dark:text-gray-400"
                                      th:text="'$' + ${#numbers.formatDecimal(category.totalAmount, 0, 'COMMA', 0, 'POINT')}">$0</span>
                            </div>
                            <div class="h-2 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                                <div class="h-full rounded-full transition-all duration-300"
                                     th:classappend="${category.key == 'FOOD' ? 'bg-orange-500' :
                                                      category.key == 'TRANSPORT' ? 'bg-blue-500' :
                                                      category.key == 'ACCOMMODATION' ? 'bg-purple-500' :
                                                      category.key == 'ENTERTAINMENT' ? 'bg-pink-500' : 'bg-gray-500'}"
                                     th:style="'width: ' + ${category.percentage} + '%'"></div>
                            </div>
                        </div>

                        <!-- Percentage -->
                        <span class="text-sm font-medium text-gray-500 dark:text-gray-400 w-12 text-right"
                              th:text="${category.percentage} + '%'">0%</span>
                    </div>
                </div>

                <!-- Empty state for categories -->
                <div th:if="${#lists.isEmpty(expensesByCategory)}" class="text-center py-4">
                    <p class="text-sm text-gray-500 dark:text-gray-400">尚無支出記錄</p>
                </div>
            </div>
        </section>

        <!-- Expense Breakdown by Member -->
        <section class="mb-6">
            <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">成員支出統計</h2>

            <div class="glass-card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="bg-gray-50 dark:bg-gray-800/50">
                                <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider">成員</th>
                                <th class="px-4 py-3 text-right text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider">已付</th>
                                <th class="px-4 py-3 text-right text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider">應付</th>
                                <th class="px-4 py-3 text-right text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider">餘額</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
                            <tr th:each="balance : ${memberBalances}"
                                class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
                                <td class="px-4 py-3">
                                    <div class="flex items-center gap-2">
                                        <div class="w-8 h-8 rounded-full bg-primary-100 dark:bg-primary-900/30 flex items-center justify-center">
                                            <span class="text-xs font-semibold text-primary-600 dark:text-primary-400"
                                                  th:text="${#strings.substring(balance.user.name, 0, 1)}">A</span>
                                        </div>
                                        <span class="text-sm font-medium text-gray-800 dark:text-gray-100"
                                              th:text="${balance.user.name}">成員名稱</span>
                                    </div>
                                </td>
                                <td class="px-4 py-3 text-right text-sm font-mono text-gray-700 dark:text-gray-300"
                                    th:text="'$' + ${#numbers.formatDecimal(balance.totalPaid, 0, 'COMMA', 0, 'POINT')}">$0</td>
                                <td class="px-4 py-3 text-right text-sm font-mono text-gray-700 dark:text-gray-300"
                                    th:text="'$' + ${#numbers.formatDecimal(balance.totalOwed, 0, 'COMMA', 0, 'POINT')}">$0</td>
                                <td class="px-4 py-3 text-right">
                                    <span class="text-sm font-semibold font-mono"
                                          th:classappend="${balance.amount >= 0 ? 'text-success dark:text-green-400' : 'text-error dark:text-red-400'}"
                                          th:text="${(balance.amount >= 0 ? '+' : '') + #numbers.formatDecimal(balance.amount, 0, 'COMMA', 0, 'POINT')}">+0</span>
                                </td>
                            </tr>
                        </tbody>
                        <tfoot>
                            <tr class="bg-gray-50 dark:bg-gray-800/50 font-semibold">
                                <td class="px-4 py-3 text-sm text-gray-800 dark:text-gray-100">總計</td>
                                <td class="px-4 py-3 text-right text-sm font-mono text-gray-800 dark:text-gray-100"
                                    th:text="'$' + ${#numbers.formatDecimal(totalExpense, 0, 'COMMA', 0, 'POINT')}">$0</td>
                                <td class="px-4 py-3 text-right text-sm font-mono text-gray-800 dark:text-gray-100"
                                    th:text="'$' + ${#numbers.formatDecimal(totalExpense, 0, 'COMMA', 0, 'POINT')}">$0</td>
                                <td class="px-4 py-3 text-right text-sm font-mono text-gray-800 dark:text-gray-100">$0</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </section>

        <!-- Help Text -->
        <section class="text-center">
            <div class="inline-flex items-center gap-2 px-4 py-2 bg-info-light dark:bg-blue-900/30 rounded-xl">
                <svg class="w-4 h-4 text-info dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span class="text-sm text-info-dark dark:text-blue-300">
                    簡化結算使用最少轉帳次數來平衡所有帳目
                </span>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="max-w-4xl mx-auto px-4 flex justify-around">
            <a th:href="@{/trips/{tripId}(tripId=${trip.id})}" class="bottom-nav-item" aria-label="行程">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span class="text-caption">行程</span>
            </a>
            <a th:href="@{/trips/{tripId}/expenses(tripId=${trip.id})}" class="bottom-nav-item active" aria-label="分帳">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                <span class="text-caption">分帳</span>
            </a>
            <a th:href="@{/trips/{tripId}/documents(tripId=${trip.id})}" class="bottom-nav-item" aria-label="檔案">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <span class="text-caption">檔案</span>
            </a>
            <a th:href="@{/trips/{tripId}/settings(tripId=${trip.id})}" class="bottom-nav-item" aria-label="設定">
