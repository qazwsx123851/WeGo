<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<!--
    Activity Create/Edit Form
    Form for creating or editing an activity with place search,
    time picker, and activity type selection.
-->
<head th:replace="~{fragments/head :: head(title=${activity?.id != null} ? '編輯景點' : '新增景點')}"></head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 pb-20">
    <!-- Toast Container -->
    <div th:replace="~{fragments/components :: toast-container}"></div>

    <!-- Header -->
    <header class="glass-card sticky top-0 z-40 rounded-none border-x-0 border-t-0">
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
            <!-- Back Button & Title -->
            <div class="flex items-center gap-3">
                <a th:href="@{/trips/{tripId}/activities(tripId=${trip.id})}"
                   class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800
                          transition-colors duration-200 cursor-pointer"
                   aria-label="取消">
                    <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </a>
                <h1 class="text-h4 text-gray-800 dark:text-gray-100 font-heading"
                    th:text="${activity?.id != null} ? '編輯景點' : '新增景點'">新增景點</h1>
            </div>

            <!-- Save Button -->
            <button type="submit" form="activity-form"
                    class="btn-primary px-4 py-2 text-sm">
                儲存
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="max-w-4xl mx-auto px-4 py-6">
        <form id="activity-form"
              th:action="${'/trips/' + trip.id + '/activities' + (activity?.id != null ? '/' + activity.id : '')}"
              method="post"
              data-validate-form
              novalidate
              data-prevent-double-submit
              class="space-y-6">

            <!-- Activity Type Selection -->
            <section class="glass-card p-4">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">
                    景點類型
                </label>
                <div class="grid grid-cols-4 gap-2">
                    <!-- Attraction -->
                    <label class="activity-type-option cursor-pointer">
                        <input type="radio" name="type" value="ATTRACTION"
                               th:checked="${activity?.place?.category == null or (activity?.place?.category != 'restaurant' and activity?.place?.category != 'transit_station' and activity?.place?.category != 'lodging')}"
                               class="sr-only peer">
                        <div class="flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700
                                    peer-checked:border-primary-500 peer-checked:bg-primary-50 dark:peer-checked:bg-primary-900/20
                                    transition-all duration-200">
                            <div class="w-10 h-10 rounded-full bg-primary-100 dark:bg-primary-900/30
                                        text-primary-600 dark:text-primary-400
                                        flex items-center justify-center">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                            </div>
                            <span class="text-xs font-medium text-gray-700 dark:text-gray-300">景點</span>
                        </div>
                    </label>

                    <!-- Restaurant -->
                    <label class="activity-type-option cursor-pointer">
                        <input type="radio" name="type" value="RESTAURANT"
                               th:checked="${activity?.place?.category == 'restaurant'}"
                               class="sr-only peer">
                        <div class="flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700
                                    peer-checked:border-adventure-500 peer-checked:bg-adventure-50 dark:peer-checked:bg-adventure-900/20
                                    transition-all duration-200">
                            <div class="w-10 h-10 rounded-full bg-adventure-100 dark:bg-adventure-900/30
                                        text-adventure-600 dark:text-adventure-400
                                        flex items-center justify-center">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                                </svg>
                            </div>
                            <span class="text-xs font-medium text-gray-700 dark:text-gray-300">餐廳</span>
                        </div>
                    </label>

                    <!-- Transport -->
                    <label class="activity-type-option cursor-pointer">
                        <input type="radio" name="type" value="TRANSPORT"
                               th:checked="${activity?.place?.category == 'transit_station'}"
                               class="sr-only peer">
                        <div class="flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700
                                    peer-checked:border-gray-500 peer-checked:bg-gray-50 dark:peer-checked:bg-gray-700/50
                                    transition-all duration-200">
                            <div class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-700
                                        text-gray-600 dark:text-gray-400
                                        flex items-center justify-center">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                                </svg>
                            </div>
                            <span class="text-xs font-medium text-gray-700 dark:text-gray-300">交通</span>
                        </div>
                    </label>

                    <!-- Accommodation -->
                    <label class="activity-type-option cursor-pointer">
                        <input type="radio" name="type" value="ACCOMMODATION"
                               th:checked="${activity?.place?.category == 'lodging'}"
                               class="sr-only peer">
                        <div class="flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700
                                    peer-checked:border-success peer-checked:bg-success-light dark:peer-checked:bg-green-900/20
                                    transition-all duration-200">
                            <div class="w-10 h-10 rounded-full bg-success-light dark:bg-green-900/30
                                        text-success-dark dark:text-green-400
                                        flex items-center justify-center">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                                </svg>
                            </div>
                            <span class="text-xs font-medium text-gray-700 dark:text-gray-300">住宿</span>
                        </div>
                    </label>
                </div>
            </section>

            <!-- Place Search -->
            <section class="glass-card p-4 space-y-4 relative z-30 overflow-visible">
                <h2 class="text-base font-semibold text-gray-800 dark:text-gray-100">地點資訊</h2>

                <!-- Place Name Input with Search -->
                <div class="space-y-1.5">
                    <label for="placeName" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                        地點名稱 <span class="text-error">*</span>
                    </label>
                    <div class="relative">
                        <input type="text"
                               id="placeName"
                               name="placeName"
                               th:value="${activity?.place?.name}"
                               required
                               autocomplete="off"
                               data-validate="required"
                               data-validate-message="請輸入地點名稱"
                               placeholder="搜尋或輸入地點名稱"
                               class="w-full px-4 py-3 pr-10
                                      bg-white dark:bg-gray-800
                                      border border-gray-200 dark:border-gray-700
                                      rounded-xl
                                      text-gray-800 dark:text-gray-100
                                      placeholder:text-gray-400 dark:placeholder:text-gray-500
                                      focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500
                                      transition-all duration-200">
                        <button type="button"
                                id="place-search-btn"
                                class="absolute right-3 top-1/2 -translate-y-1/2 p-1
                                       text-gray-400 hover:text-primary-500
                                       transition-colors duration-200 cursor-pointer"
                                aria-label="搜尋地點">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                        </button>
                        <!-- Search Results Dropdown (hidden by default) -->
                        <div id="place-search-results"
                             class="hidden absolute z-50 w-full mt-1 top-full left-0
                                    bg-white dark:bg-gray-800
                                    border border-gray-200 dark:border-gray-700 rounded-xl
                                    shadow-xl ring-1 ring-black/5 dark:ring-white/10
                                    max-h-60 overflow-y-auto">
                            <!-- Results populated by JS -->
                        </div>
                    </div>
                    <p class="text-xs text-error hidden" role="alert">請輸入地點名稱</p>
                </div>

                <!-- Address (optional, auto-filled from search) -->
                <div class="space-y-1.5">
                    <label for="address" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                        地址
                    </label>
                    <input type="text"
                           id="address"
                           name="address"
                           th:value="${activity?.place?.address}"
                           placeholder="地址將自動填入或手動輸入"
                           class="w-full px-4 py-3
                                  bg-white dark:bg-gray-800
                                  border border-gray-200 dark:border-gray-700
                                  rounded-xl
                                  text-gray-800 dark:text-gray-100
                                  placeholder:text-gray-400 dark:placeholder:text-gray-500
                                  focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500
                                  transition-all duration-200">
                </div>

                <!-- Hidden fields for place coordinates -->
                <input type="hidden" id="placeId" name="placeId" th:value="${activity?.place?.googlePlaceId}">
                <input type="hidden" id="latitude" name="latitude" th:value="${activity?.place?.latitude}">
                <input type="hidden" id="longitude" name="longitude" th:value="${activity?.place?.longitude}">
            </section>

            <!-- Date & Time -->
            <section class="glass-card p-4 space-y-4">
                <h2 class="text-base font-semibold text-gray-800 dark:text-gray-100">日期與時間</h2>

                <!-- Date Selection -->
                <div class="space-y-1.5">
                    <label for="activityDate" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                        日期 <span class="text-error">*</span>
                    </label>
                    <select id="activityDate"
                            name="activityDate"
                            required
                            data-validate="required"
                            data-validate-message="請選擇日期"
                            class="w-full px-4 py-3
                                   bg-white dark:bg-gray-800
                                   border border-gray-200 dark:border-gray-700
                                   rounded-xl
                                   text-gray-800 dark:text-gray-100
                                   focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500
                                   cursor-pointer">
                        <option value="" disabled selected>選擇日期</option>
                        <th:block th:each="date, dateStat : ${dates}">
                            <option th:value="${#temporals.format(date, 'yyyy-MM-dd')}"
                                    th:text="${#temporals.format(date, 'M月d日 (E)')}"
                                    th:selected="${activity?.day != null and activity.day == (dateStat.index + 1)}">
                                3月15日 (一)
                            </option>
                        </th:block>
                    </select>
                </div>

                <!-- Time Range -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label for="startTime" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                            開始時間
                        </label>
                        <input type="text"
                               id="startTime"
                               name="startTime"
                               data-timepicker
                               th:value="${activity?.startTime != null ? #temporals.format(activity.startTime, 'HH:mm') : ''}"
                               placeholder="選擇開始時間"
                               class="w-full px-4 py-3
                                      bg-white dark:bg-gray-800
                                      border border-gray-200 dark:border-gray-700
                                      rounded-xl
                                      text-gray-800 dark:text-gray-100
                                      focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500
                                      transition-all duration-200">
                    </div>
                    <div class="space-y-1.5">
                        <label for="endTime" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                            結束時間
                        </label>
                        <input type="text"
                               id="endTime"
                               name="endTime"
                               data-timepicker
                               th:value="${activity?.endTime != null ? #temporals.format(activity.endTime, 'HH:mm') : ''}"
                               placeholder="選擇結束時間"
                               class="w-full px-4 py-3
                                      bg-white dark:bg-gray-800
                                      border border-gray-200 dark:border-gray-700
                                      rounded-xl
                                      text-gray-800 dark:text-gray-100
                                      focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500
                                      transition-all duration-200">
                    </div>
                </div>

                <!-- Duration (auto-calculated or manual) -->
                <div class="space-y-1.5">
                    <label for="durationMinutes" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                        停留時間 (分鐘)
                    </label>
                    <div class="flex items-center gap-2">
                        <input type="number"
                               id="durationMinutes"
                               name="durationMinutes"
                               th:value="${activity?.durationMinutes}"
                               min="0"
                               step="1"
                               placeholder="例: 90"
                               class="flex-1 px-4 py-3
                                      bg-white dark:bg-gray-800
                                      border border-gray-200 dark:border-gray-700
                                      rounded-xl
                                      text-gray-800 dark:text-gray-100
                                      placeholder:text-gray-400 dark:placeholder:text-gray-500
                                      focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500
                                      transition-all duration-200">
                        <span class="text-sm text-gray-500 dark:text-gray-400" id="duration-display">
                            <!-- Calculated display, e.g., "1.5 小時" -->
                        </span>
                    </div>
                </div>
            </section>

            <!-- Transport Mode Selection -->
            <section class="glass-card p-4 space-y-4">
                <h2 class="text-base font-semibold text-gray-800 dark:text-gray-100">
                    前往此景點的交通方式
                </h2>

                <!-- Primary Transport Options (4-column grid) -->
                <div class="grid grid-cols-4 gap-2" id="transport-mode-primary">
                    <!-- Walking -->
                    <label class="transport-mode-option cursor-pointer">
                        <input type="radio" name="transportMode" value="WALKING"
                               th:checked="${activity?.transportMode == null or activity?.transportMode.name() == 'WALKING'}"
                               class="sr-only peer">
                        <div class="flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700
                                    peer-checked:border-primary-500 peer-checked:bg-primary-50 dark:peer-checked:bg-primary-900/20
                                    hover:bg-gray-50 dark:hover:bg-gray-800
                                    transition-all duration-200 min-h-[70px]">
                            <div class="w-8 h-8 flex items-center justify-center text-gray-600 dark:text-gray-400
                                        peer-checked:text-primary-500">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M13 5.25c.414 0 .75-.336.75-.75V4a.75.75 0 00-1.5 0v.5c0 .414.336.75.75.75zM12 8a2 2 0 100-4 2 2 0 000 4zm-.5 2.5l-2 4.5L12 13l2.5 2-2-4.5"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M10.5 15l-1.5 4m4-4l1.5 4"/>
                                </svg>
                            </div>
                            <span class="text-xs font-medium text-gray-700 dark:text-gray-300">步行</span>
                        </div>
                    </label>

                    <!-- Transit -->
                    <label class="transport-mode-option cursor-pointer">
                        <input type="radio" name="transportMode" value="TRANSIT"
                               th:checked="${activity?.transportMode?.name() == 'TRANSIT'}"
                               class="sr-only peer">
                        <div class="flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700
                                    peer-checked:border-primary-500 peer-checked:bg-primary-50 dark:peer-checked:bg-primary-900/20
                                    hover:bg-gray-50 dark:hover:bg-gray-800
                                    transition-all duration-200 min-h-[70px]">
                            <div class="w-8 h-8 flex items-center justify-center text-gray-600 dark:text-gray-400">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2m-8 0h8m-8 0H6a2 2 0 00-2 2v8a2 2 0 002 2h.5m3.5 0h4m0 0h.5a2 2 0 002-2V9a2 2 0 00-2-2h-2M10 19v2m4-2v2"/>
                                </svg>
                            </div>
                            <span class="text-xs font-medium text-gray-700 dark:text-gray-300">大眾運輸</span>
                        </div>
                    </label>

                    <!-- Driving -->
                    <label class="transport-mode-option cursor-pointer">
                        <input type="radio" name="transportMode" value="DRIVING"
                               th:checked="${activity?.transportMode?.name() == 'DRIVING'}"
                               class="sr-only peer">
                        <div class="flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700
                                    peer-checked:border-primary-500 peer-checked:bg-primary-50 dark:peer-checked:bg-primary-900/20
                                    hover:bg-gray-50 dark:hover:bg-gray-800
                                    transition-all duration-200 min-h-[70px]">
                            <div class="w-8 h-8 flex items-center justify-center text-gray-600 dark:text-gray-400">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M19 17H5m14 0a2 2 0 100-4h-1l-2-4H8l-2 4H5a2 2 0 100 4m14 0v1a1 1 0 01-1 1h-1a1 1 0 01-1-1v-1m-10 0v1a1 1 0 01-1 1H5a1 1 0 01-1-1v-1"/>
                                </svg>
                            </div>
                            <span class="text-xs font-medium text-gray-700 dark:text-gray-300">開車</span>
                        </div>
                    </label>

                    <!-- Bicycling -->
                    <label class="transport-mode-option cursor-pointer">
                        <input type="radio" name="transportMode" value="BICYCLING"
                               th:checked="${activity?.transportMode?.name() == 'BICYCLING'}"
                               class="sr-only peer">
                        <div class="flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700
                                    peer-checked:border-primary-500 peer-checked:bg-primary-50 dark:peer-checked:bg-primary-900/20
                                    hover:bg-gray-50 dark:hover:bg-gray-800
                                    transition-all duration-200 min-h-[70px]">
                            <div class="w-8 h-8 flex items-center justify-center text-gray-600 dark:text-gray-400">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <circle cx="5.5" cy="17.5" r="3.5" stroke-width="2"/>
                                    <circle cx="18.5" cy="17.5" r="3.5" stroke-width="2"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M15 6h2l3 6m-5-6l-3 6h6m-6 0l-2 5.5M5.5 17.5l4-6"/>
                                </svg>
                            </div>
                            <span class="text-xs font-medium text-gray-700 dark:text-gray-300">騎車</span>
                        </div>
                    </label>
                </div>

                <!-- More Options Toggle -->
                <button type="button" id="toggle-more-transport"
                        class="w-full flex items-center justify-center gap-2 py-2 text-sm text-gray-500 dark:text-gray-400
                               hover:text-primary-500 transition-colors duration-200 cursor-pointer">
                    <span id="toggle-more-text">更多選項</span>
                    <svg id="toggle-more-icon" class="w-4 h-4 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>

                <!-- Extended Transport Options (hidden by default) -->
                <div id="transport-mode-extended" class="hidden grid grid-cols-3 gap-2">
                    <!-- Flight -->
                    <label class="transport-mode-option cursor-pointer">
                        <input type="radio" name="transportMode" value="FLIGHT"
                               th:checked="${activity?.transportMode?.name() == 'FLIGHT'}"
                               class="sr-only peer transport-requires-manual">
                        <div class="flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700
                                    peer-checked:border-adventure-500 peer-checked:bg-adventure-50 dark:peer-checked:bg-adventure-900/20
                                    hover:bg-gray-50 dark:hover:bg-gray-800
                                    transition-all duration-200 min-h-[70px]">
                            <div class="w-8 h-8 flex items-center justify-center text-gray-600 dark:text-gray-400">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M12 19l-2 3m4-3l2 3M5 17h14l1-7-4 2V5a1 1 0 00-1-1h-6a1 1 0 00-1 1v7l-4-2 1 7z"/>
                                </svg>
                            </div>
                            <span class="text-xs font-medium text-gray-700 dark:text-gray-300">飛機</span>
                        </div>
                    </label>

                    <!-- High Speed Rail -->
                    <label class="transport-mode-option cursor-pointer">
                        <input type="radio" name="transportMode" value="HIGH_SPEED_RAIL"
                               th:checked="${activity?.transportMode?.name() == 'HIGH_SPEED_RAIL'}"
                               class="sr-only peer transport-requires-manual">
                        <div class="flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700
                                    peer-checked:border-adventure-500 peer-checked:bg-adventure-50 dark:peer-checked:bg-adventure-900/20
                                    hover:bg-gray-50 dark:hover:bg-gray-800
                                    transition-all duration-200 min-h-[70px]">
                            <div class="w-8 h-8 flex items-center justify-center text-gray-600 dark:text-gray-400">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M13 10V3L4 14h7v7l9-11h-7z"/>
                                </svg>
                            </div>
                            <span class="text-xs font-medium text-gray-700 dark:text-gray-300">高鐵</span>
                        </div>
                    </label>

                    <!-- Not Calculated -->
                    <label class="transport-mode-option cursor-pointer">
                        <input type="radio" name="transportMode" value="NOT_CALCULATED"
                               th:checked="${activity?.transportMode?.name() == 'NOT_CALCULATED'}"
                               class="sr-only peer">
                        <div class="flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700
                                    peer-checked:border-gray-500 peer-checked:bg-gray-50 dark:peer-checked:bg-gray-700/50
                                    hover:bg-gray-50 dark:hover:bg-gray-800
                                    transition-all duration-200 min-h-[70px]">
                            <div class="w-8 h-8 flex items-center justify-center text-gray-600 dark:text-gray-400">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/>
                                </svg>
                            </div>
                            <span class="text-xs font-medium text-gray-700 dark:text-gray-300">不計算</span>
                        </div>
                    </label>
                </div>

                <!-- Manual Transport Duration Input (shown when FLIGHT or HIGH_SPEED_RAIL selected) -->
                <div id="manual-transport-input" class="hidden space-y-3 p-4 rounded-xl bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800">
                    <!-- Info banner -->
                    <div class="flex items-start gap-2">
                        <svg class="w-5 h-5 text-blue-500 dark:text-blue-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <p class="text-sm text-blue-700 dark:text-blue-300">
                            Google Maps 不支援飛機或高鐵的路線計算，請手動輸入預估交通時間。
                        </p>
                    </div>

                    <div class="space-y-1.5">
                        <label for="manualTransportMinutes" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                            預估交通時間 (分鐘) <span class="text-error">*</span>
                        </label>
                        <div class="flex items-center gap-3">
                            <input type="number"
                                   id="manualTransportMinutes"
                                   name="manualTransportMinutes"
                                   th:value="${activity?.transportDurationMinutes}"
                                   min="1"
                                   max="2880"
                                   step="1"
                                   placeholder="例: 180 (3小時)"
                                   class="flex-1 px-4 py-3
                                          bg-white dark:bg-gray-800
                                          border border-gray-200 dark:border-gray-700
                                          rounded-xl
                                          text-gray-800 dark:text-gray-100
                                          placeholder:text-gray-400 dark:placeholder:text-gray-500
                                          focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500
                                          transition-all duration-200">
                            <span id="manual-transport-display" class="text-sm text-gray-600 dark:text-gray-300 min-w-[80px] font-medium">
                                <!-- Calculated display -->
                            </span>
                        </div>
                        <p class="text-xs text-gray-500 dark:text-gray-400">
                            包含搭乘時間與候機/候車時間，建議查詢航班或車次資訊後填寫
                        </p>
                    </div>
                </div>
            </section>

            <!-- Notes -->
            <section class="glass-card p-4 space-y-4">
                <h2 class="text-base font-semibold text-gray-800 dark:text-gray-100">備註</h2>

                <div class="space-y-1.5">
                    <label for="notes" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                        備註說明
                    </label>
                    <textarea id="notes"
                              name="notes"
                              th:text="${activity?.note}"
                              rows="3"
                              placeholder="記錄任何想法、注意事項或預約資訊..."
                              class="w-full px-4 py-3
                                     bg-white dark:bg-gray-800
                                     border border-gray-200 dark:border-gray-700
                                     rounded-xl
                                     text-gray-800 dark:text-gray-100
                                     placeholder:text-gray-400 dark:placeholder:text-gray-500
                                     focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500
                                     transition-all duration-200 resize-none"></textarea>
                </div>
            </section>

            <!-- Delete Button (Edit mode only) -->
            <div th:if="${activity?.id != null}" class="pt-4">
                <button type="button"
                        id="delete-activity-btn"
                        class="w-full min-h-[44px] cursor-pointer rounded-xl
                               bg-error-light dark:bg-red-900/20
                               border border-error/20
                               px-4 py-2.5 font-medium text-error-dark dark:text-red-400
                               hover:bg-error hover:text-white
                               transition-all duration-200 active:scale-[0.98]
                               focus:outline-none focus:ring-2 focus:ring-error/50">
                    刪除此景點
                </button>
            </div>
        </form>
    </main>

    <!-- Delete Confirmation Dialog (hidden by default) -->
    <div id="delete-dialog"
         class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div role="alertdialog"
             aria-modal="true"
             aria-labelledby="delete-dialog-title"
             aria-describedby="delete-dialog-desc"
             class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
            <div class="px-6 pt-6 pb-4">
                <h3 id="delete-dialog-title" class="text-lg font-semibold text-gray-800 dark:text-gray-100">
                    確定要刪除此景點？
                </h3>
                <p id="delete-dialog-desc" class="text-sm text-gray-500 dark:text-gray-400 mt-2">
                    刪除後將無法復原。
                </p>
            </div>
            <div class="px-6 pb-6 flex gap-3">
                <button type="button"
                        id="cancel-delete-btn"
                        class="flex-1 px-4 py-2.5 rounded-xl
                               border border-gray-200 dark:border-gray-600
                               text-gray-700 dark:text-gray-200 font-medium
                               hover:bg-gray-50 dark:hover:bg-gray-700
                               transition-colors duration-200 cursor-pointer">
                    取消
                </button>
                <form th:if="${activity?.id != null}"
                      th:action="@{/trips/{tripId}/activities/{activityId}/delete(tripId=${trip.id}, activityId=${activity.id})}"
                      method="post">
                    <button type="submit"
                            class="flex-1 px-4 py-2.5 rounded-xl
                                   bg-error hover:bg-red-600
                                   text-white font-medium
                                   transition-colors duration-200 cursor-pointer">
                        刪除
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script th:src="@{/js/app.js}" defer></script>
    <script th:inline="javascript">
        // Trip search configuration from server
        window.tripSearchConfig = {
            lat: /*[[${searchLat}]]*/ 25.0330,
            lng: /*[[${searchLng}]]*/ 121.5654,
            radius: /*[[${searchRadius}]]*/ 50000
        };
    </script>
    <script th:src="@{/js/activity-form.js}" defer></script>
</body>
</html>
