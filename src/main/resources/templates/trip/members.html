<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<!--
    Trip Members Management Page
    Displays member list with roles, invite link functionality, and member management.
-->
<head th:replace="~{fragments/head :: head(title='成員管理')}"></head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 pb-20">
    <!-- Toast Container -->
    <div th:replace="~{fragments/components :: toast-container}"></div>

    <!-- Header with Back Button -->
    <header class="sticky top-0 z-40 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl
                   border-b border-gray-100 dark:border-gray-800">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Back Button -->
                <a th:href="@{/trips/{id}(id=${trip.id})}"
                   class="flex items-center gap-2 text-gray-600 dark:text-gray-300
                          hover:text-gray-800 dark:hover:text-gray-100
                          transition-colors duration-200 cursor-pointer min-w-[44px] min-h-[44px]"
                   aria-label="返回">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                    <span class="hidden sm:inline">返回</span>
                </a>

                <!-- Title -->
                <h1 class="text-h4 text-gray-800 dark:text-gray-100 font-heading">成員管理</h1>

                <!-- Spacer for alignment -->
                <div class="w-[44px]"></div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- Trip Info Header -->
        <div class="glass-card p-4 mb-6 flex items-center gap-4">
            <div class="w-16 h-16 rounded-xl overflow-hidden bg-gray-100 dark:bg-gray-800 flex-shrink-0">
                <img th:if="${trip.coverImageUrl}"
                     th:src="${trip.coverImageUrl}"
                     th:alt="${trip.title}"
                     class="w-full h-full object-cover"/>
                <div th:unless="${trip.coverImageUrl}"
                     class="w-full h-full flex items-center justify-center
                            bg-gradient-to-br from-primary-100 to-sky-100 dark:from-primary-900/30 dark:to-sky-900/30">
                    <svg class="w-8 h-8 text-primary-300 dark:text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                              d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
            </div>
            <div class="flex-1 min-w-0">
                <h2 class="text-base font-semibold text-gray-800 dark:text-gray-100 truncate"
                    th:text="${trip.title}">東京五日遊</h2>
                <p class="text-sm text-gray-500 dark:text-gray-400"
                   th:text="${memberCount} + ' 位成員'">5 位成員</p>
            </div>
        </div>

        <!-- Invite Section (Owner/Editor only) -->
        <section th:if="${canInvite}" class="mb-8">
            <h3 class="text-base font-semibold text-gray-800 dark:text-gray-100 mb-4">邀請新成員</h3>

            <div class="glass-card p-6">
                <!-- Invite Link -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        邀請連結
                    </label>
                    <div class="flex gap-2">
                        <input type="text"
                               id="inviteLink"
                               readonly
                               value=""
                               placeholder="點擊「產生連結」以取得邀請連結"
                               class="flex-1 px-4 py-3
                                      bg-gray-50 dark:bg-gray-800
                                      border border-gray-200 dark:border-gray-700
                                      rounded-xl
                                      text-gray-600 dark:text-gray-400
                                      text-sm truncate"/>
                        <button type="button"
                                id="copyLinkBtn"
                                class="btn-primary flex items-center gap-2 whitespace-nowrap"
                                aria-label="複製連結">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
                            </svg>
                            <span>複製</span>
                        </button>
                    </div>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">
                        將此連結分享給朋友，他們即可加入行程
                    </p>
                </div>

                <!-- Link Expiry Info -->
                <div id="inviteLinkExpiry" class="hidden flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span>連結有效期限：72 小時</span>
                </div>

                <!-- Generate New Link -->
                <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-100 dark:border-gray-700">
                    <span class="text-sm text-gray-600 dark:text-gray-400">連結已過期或想產生新連結？</span>
                    <button type="button"
                            onclick="generateInviteLink()"
                            class="btn-text text-sm cursor-pointer">
                        產生新連結
                    </button>
                </div>
            </div>
        </section>

        <!-- Member List -->
        <section>
            <h3 class="text-base font-semibold text-gray-800 dark:text-gray-100 mb-4">
                成員列表
                <span class="text-gray-400 dark:text-gray-500 font-normal"
                      th:text="'(' + ${memberCount} + ')'"></span>
            </h3>

            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(members)}"
                 class="glass-card p-8 text-center">
                <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-gray-100 dark:bg-gray-800
                            flex items-center justify-center">
                    <svg class="w-8 h-8 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </div>
                <h3 class="text-base font-semibold text-gray-700 dark:text-gray-200 mb-2">
                    還沒有成員
                </h3>
                <p class="text-sm text-gray-500 dark:text-gray-400">
                    使用上方邀請連結邀請朋友加入
                </p>
            </div>

            <!-- Member Cards -->
            <div th:unless="${#lists.isEmpty(members)}" class="space-y-3">
                <div th:each="member : ${members}"
                     class="glass-card p-4 flex items-center gap-4">
                    <!-- Avatar -->
                    <img th:if="${member.avatarUrl}"
                         th:src="${member.avatarUrl}"
                         th:alt="${member.nickname}"
                         class="w-12 h-12 rounded-full object-cover flex-shrink-0"/>
                    <div th:unless="${member.avatarUrl}"
                         class="w-12 h-12 rounded-full flex-shrink-0
                                bg-primary-100 dark:bg-primary-900/30
                                flex items-center justify-center
                                text-primary-600 dark:text-primary-400 font-semibold"
                         th:text="${member.nickname != null ? #strings.substring(member.nickname, 0, 1) : 'U'}">M</div>

                    <!-- Member Info -->
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2">
                            <h4 class="font-medium text-gray-800 dark:text-gray-100 truncate"
                                th:text="${member.nickname}">王小明</h4>
                            <!-- Role Badge -->
                            <span th:if="${member.role.name() == 'OWNER'}"
                                  class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium
                                         bg-adventure-100 dark:bg-adventure-900/30
                                         text-adventure-700 dark:text-adventure-400">
                                建立者
                            </span>
                            <span th:if="${member.role.name() == 'EDITOR'}"
                                  class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium
                                         bg-primary-100 dark:bg-primary-900/30
                                         text-primary-700 dark:text-primary-400">
                                編輯者
                            </span>
                            <span th:if="${member.role.name() == 'VIEWER'}"
                                  class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium
                                         bg-gray-100 dark:bg-gray-800
                                         text-gray-600 dark:text-gray-400">
                                檢視者
                            </span>
                        </div>
                        <!-- Email field removed - MemberSummary doesn't include email for privacy -->
                        <p class="text-sm text-gray-500 dark:text-gray-400"
                           th:text="${member.role.name()}">EDITOR</p>
                    </div>

                    <!-- Actions (Owner only, cannot remove self) -->
                    <div th:if="${isOwner && member.userId != currentUserId}" class="flex items-center gap-2">
                        <!-- Change Role Dropdown -->
                        <div class="relative">
                            <button type="button"
                                    onclick="toggleRoleDropdown(this)"
                                    class="p-2 rounded-lg text-gray-500 dark:text-gray-400
                                           hover:bg-gray-100 dark:hover:bg-gray-800
                                           transition-colors duration-200 cursor-pointer"
                                    aria-label="變更角色">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                            </button>

                            <!-- Role Dropdown Menu -->
                            <div class="role-dropdown hidden absolute right-0 w-36
                                        bg-white dark:bg-gray-800
                                        rounded-xl shadow-lg
                                        border border-gray-100 dark:border-gray-700
                                        py-1 z-10"
                                 style="bottom: 100%; margin-bottom: 0.5rem;">
                                <button type="button"
                                        th:data-trip-id="${trip.id}"
                                        th:data-user-id="${member.userId}"
                                        data-role="EDITOR"
                                        onclick="changeRole(this.dataset.tripId, this.dataset.userId, this.dataset.role)"
                                        class="w-full px-4 py-2 text-left text-sm
                                               text-gray-700 dark:text-gray-300
                                               hover:bg-gray-100 dark:hover:bg-gray-700
                                               transition-colors duration-200 cursor-pointer">
                                    設為編輯者
                                </button>
                                <button type="button"
                                        th:data-trip-id="${trip.id}"
                                        th:data-user-id="${member.userId}"
                                        data-role="VIEWER"
                                        onclick="changeRole(this.dataset.tripId, this.dataset.userId, this.dataset.role)"
                                        class="w-full px-4 py-2 text-left text-sm
                                               text-gray-700 dark:text-gray-300
                                               hover:bg-gray-100 dark:hover:bg-gray-700
                                               transition-colors duration-200 cursor-pointer">
                                    設為檢視者
                                </button>
                            </div>
                        </div>

                        <!-- Remove Member -->
                        <button type="button"
                                onclick="confirmRemoveMember(this)"
                                th:data-member-id="${member.userId}"
                                th:data-member-name="${member.nickname != null ? member.nickname : 'Unknown'}"
                                class="p-2 rounded-lg text-gray-500 dark:text-gray-400
                                       hover:bg-error-light dark:hover:bg-error/10 hover:text-error
                                       transition-colors duration-200 cursor-pointer"
                                aria-label="移除成員">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                    </div>

                    <!-- Current User Badge -->
                    <span th:if="${member.userId == currentUserId}"
                          class="text-xs text-gray-400 dark:text-gray-500">
                        (你)
                    </span>
                </div>
            </div>
        </section>

        <!-- Leave Trip Button (for non-owners) -->
        <div th:if="${!isOwner}" class="mt-8">
            <button type="button"
                    onclick="confirmLeaveTrip()"
                    class="w-full min-h-[44px] cursor-pointer rounded-xl
                           border border-error/30 dark:border-error/20
                           bg-white dark:bg-gray-800
                           hover:bg-error-light dark:hover:bg-error/10
                           px-4 py-3 font-medium text-error
                           transition-all duration-200 active:scale-[0.98]
                           focus:outline-none focus:ring-2 focus:ring-error/50">
                離開行程
            </button>
        </div>
    </main>

    <!-- Remove Member Confirmation Dialog -->
    <div id="removeMemberDialog"
         class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50
                flex items-center justify-center p-4 hidden">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden"
             role="alertdialog" aria-modal="true" aria-labelledby="dialog-title">
            <div class="px-6 pt-6 pb-4">
                <h3 id="dialog-title" class="text-lg font-semibold text-gray-800 dark:text-gray-100">
                    確定要移除成員？
                </h3>
                <p id="dialog-desc" class="text-sm text-gray-500 dark:text-gray-400 mt-2">
                    移除 <span id="memberName" class="font-medium text-gray-700 dark:text-gray-300">成員名稱</span> 後，他將無法再存取此行程。
                </p>
            </div>
            <div class="px-6 pb-6 flex gap-3">
                <button type="button"
                        onclick="closeRemoveDialog()"
                        class="flex-1 px-4 py-2.5 rounded-xl
                               border border-gray-200 dark:border-gray-600
                               text-gray-700 dark:text-gray-200 font-medium
                               hover:bg-gray-50 dark:hover:bg-gray-700
                               transition-colors duration-200 cursor-pointer">
                    取消
                </button>
                <button type="button"
                        onclick="removeMember()"
                        class="flex-1 px-4 py-2.5 rounded-xl
                               bg-error hover:bg-red-600
                               text-white font-medium
                               transition-colors duration-200 cursor-pointer">
                    移除
                </button>
            </div>
        </div>
    </div>

    <!-- Leave Trip Confirmation Dialog -->
    <div id="leaveTripDialog"
         class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50
                flex items-center justify-center p-4 hidden">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden"
             role="alertdialog" aria-modal="true">
            <div class="px-6 pt-6 pb-4">
                <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100">
                    確定要離開行程？
                </h3>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">
                    離開後你將無法再存取此行程，需要建立者重新邀請才能加入。
                </p>
            </div>
            <div class="px-6 pb-6 flex gap-3">
                <button type="button"
                        onclick="closeLeaveDialog()"
                        class="flex-1 px-4 py-2.5 rounded-xl
                               border border-gray-200 dark:border-gray-600
                               text-gray-700 dark:text-gray-200 font-medium
                               hover:bg-gray-50 dark:hover:bg-gray-700
                               transition-colors duration-200 cursor-pointer">
                    取消
                </button>
                <button type="button"
                        onclick="leaveTrip()"
                        class="flex-1 px-4 py-2.5 rounded-xl
                               bg-error hover:bg-red-600
                               text-white font-medium
                               transition-colors duration-200 cursor-pointer">
                    離開
                </button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav th:replace="~{fragments/components :: bottom-nav}"></nav>

    <!-- Scripts -->
    <script th:src="@{/js/app.js}" defer></script>
    <script th:inline="javascript">
        // CSRF Token
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content || '';
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN';

        // Trip ID
        const tripId = /*[[${trip.id}]]*/ '';

        // Currently selected member for removal
        let selectedMemberId = null;
        let selectedMemberName = null;

        /**
         * Toast notification (fallback if app.js Toast not available)
         */
        function showToast(type, message) {
            if (typeof Toast !== 'undefined') {
                type === 'success' ? Toast.success(message) : Toast.error(message);
                return;
            }

            // Fallback: simple toast - use textContent to prevent XSS
            const container = document.getElementById('toast-container') || document.body;
            const toast = document.createElement('div');
            toast.className = `fixed top-4 right-4 z-50 flex items-center gap-3 bg-white dark:bg-gray-800
                               rounded-xl shadow-lg border-l-4 px-4 py-3 min-w-[280px]
                               ${type === 'success' ? 'border-green-500' : 'border-red-500'}`;
            const messageEl = document.createElement('p');
            messageEl.className = 'text-gray-800 dark:text-gray-100';
            messageEl.textContent = message;
            toast.appendChild(messageEl);
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        /**
         * Change member role via AJAX
         * @param {string} tripId - Trip ID
         * @param {string} userId - User ID to change role
         * @param {string} newRole - New role (EDITOR or VIEWER)
         */
        async function changeRole(tripId, userId, newRole) {
            try {
                const response = await fetch(`/api/trips/${tripId}/members/${userId}/role`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify({ role: newRole })
                });

                if (response.ok) {
                    showToast('success', '成員角色已更新');
                    setTimeout(() => window.location.reload(), 1000);
                } else {
                    const error = await response.json();
                    showToast('error', error.message || '更新失敗');
                }
            } catch (error) {
                showToast('error', '網路錯誤，請稍後再試');
            }
        }

        /**
         * Confirm remove member - shows dialog
         * @param {HTMLElement} btn - Button element with data attributes
         */
        function confirmRemoveMember(btn) {
            selectedMemberId = btn.dataset.memberId;
            selectedMemberName = btn.dataset.memberName;

            document.getElementById('memberName').textContent = selectedMemberName;
            document.getElementById('removeMemberDialog').classList.remove('hidden');
        }

        /**
         * Execute member removal via AJAX
         */
        async function removeMember() {
            if (!selectedMemberId) return;

            try {
                const response = await fetch(`/api/trips/${tripId}/members/${selectedMemberId}`, {
                    method: 'DELETE',
                    headers: {
                        [csrfHeader]: csrfToken
                    }
                });

                if (response.ok) {
                    showToast('success', '成員已移除');
                    closeRemoveDialog();
                    setTimeout(() => window.location.reload(), 1000);
                } else {
                    const error = await response.json();
                    showToast('error', error.message || '移除失敗');
                }
            } catch (error) {
                showToast('error', '網路錯誤，請稍後再試');
            }
        }

        /**
         * Generate new invite link via AJAX
         */
        async function generateInviteLink() {
            try {
                const response = await fetch(`/api/trips/${tripId}/invites`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify({
                        role: 'EDITOR',
                        expiresInHours: 168  // 7 days
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('inviteLink').value = data.data.inviteUrl;
                    const expiryEl = document.getElementById('inviteLinkExpiry');
                    if (expiryEl) expiryEl.classList.remove('hidden');
                    showToast('success', '已產生新的邀請連結');
                } else {
                    const error = await response.json();
                    showToast('error', error.message || '產生連結失敗');
                }
            } catch (error) {
                showToast('error', '網路錯誤，請稍後再試');
            }
        }

        /**
         * Leave trip via AJAX
         * Uses the same endpoint as remove member (self-removal)
         */
        async function leaveTrip() {
            try {
                const response = await fetch(`/api/trips/${tripId}/members/me`, {
                    method: 'DELETE',
                    headers: {
                        [csrfHeader]: csrfToken
                    }
                });

                if (response.ok) {
                    showToast('success', '已離開行程');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    const error = await response.json();
                    showToast('error', error.message || '離開行程失敗');
                }
            } catch (error) {
                showToast('error', '網路錯誤，請稍後再試');
            }
        }

        // Copy invite link using modern Clipboard API
        document.getElementById('copyLinkBtn')?.addEventListener('click', async function() {
            const linkInput = document.getElementById('inviteLink');
            const btn = this;

            try {
                await navigator.clipboard.writeText(linkInput.value);
                // Show success feedback
                const originalText = btn.querySelector('span').textContent;
                btn.querySelector('span').textContent = '已複製';
                setTimeout(() => {
                    btn.querySelector('span').textContent = originalText;
                }, 2000);
            } catch (err) {
                // Fallback for older browsers
                linkInput.select();
                document.execCommand('copy');
                const originalText = btn.querySelector('span').textContent;
                btn.querySelector('span').textContent = '已複製';
                setTimeout(() => {
                    btn.querySelector('span').textContent = originalText;
                }, 2000);
            }
        });

        function closeRemoveDialog() {
            document.getElementById('removeMemberDialog').classList.add('hidden');
            selectedMemberId = null;
            selectedMemberName = null;
        }

        // Leave trip confirmation
        function confirmLeaveTrip() {
            document.getElementById('leaveTripDialog').classList.remove('hidden');
        }

        function closeLeaveDialog() {
            document.getElementById('leaveTripDialog').classList.add('hidden');
        }

        /**
         * Toggle role dropdown visibility
         * @param {HTMLElement} btn - The gear button element
         */
        function toggleRoleDropdown(btn) {
            const dropdown = btn.parentElement.querySelector('.role-dropdown');
            // Close all other dropdowns first
            document.querySelectorAll('.role-dropdown').forEach(function(d) {
                if (d !== dropdown) d.classList.add('hidden');
            });
            dropdown.classList.toggle('hidden');
        }

        // Close role dropdowns when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.relative')) {
                document.querySelectorAll('.role-dropdown').forEach(function(d) {
                    d.classList.add('hidden');
                });
            }
        });

        // Close dialogs on escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeRemoveDialog();
                closeLeaveDialog();
                document.querySelectorAll('.role-dropdown').forEach(function(d) {
                    d.classList.add('hidden');
                });
            }
        });

        // Close dialogs on backdrop click
        document.getElementById('removeMemberDialog')?.addEventListener('click', function(e) {
            if (e.target === this) closeRemoveDialog();
        });

        document.getElementById('leaveTripDialog')?.addEventListener('click', function(e) {
            if (e.target === this) closeLeaveDialog();
        });
    </script>
</body>
</html>
