<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<!--
    Trip Detail View Page
    Displays trip information, quick actions, and navigation to activities/expenses/members.
-->
<head th:replace="~{fragments/layout :: head(title=${trip.title})}"></head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 pb-20">
    <!-- Toast Container -->
    <div th:replace="~{fragments/components :: toast-container}"></div>

    <!-- Hero Header with Cover Image -->
    <header class="relative">
        <!-- Cover Image -->
        <div class="aspect-[16/9] sm:aspect-[21/9] w-full bg-gray-100 dark:bg-gray-800 overflow-hidden">
            <img th:if="${trip.coverImageUrl}"
                 th:src="${trip.coverImageUrl}"
                 th:alt="${trip.title} + ' 封面'"
                 class="w-full h-full object-cover"/>
            <div th:unless="${trip.coverImageUrl}"
                 class="w-full h-full flex items-center justify-center
                        bg-gradient-to-br from-primary-100 to-sky-100 dark:from-primary-900/30 dark:to-sky-900/30">
                <svg class="w-24 h-24 text-primary-300 dark:text-primary-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                          d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
        </div>

        <!-- Overlay Navigation -->
        <div class="absolute top-0 left-0 right-0 bg-gradient-to-b from-black/50 to-transparent">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
                <!-- Back Button -->
                <a th:href="@{/dashboard}"
                   class="flex items-center justify-center w-10 h-10 rounded-full
                          bg-white/20 backdrop-blur-sm hover:bg-white/30
                          text-white transition-all duration-200 cursor-pointer"
                   aria-label="返回">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </a>

                <!-- Action Buttons -->
                <div class="flex items-center gap-2">
                    <!-- Share Button -->
                    <button type="button"
                            aria-label="分享行程"
                            class="flex items-center justify-center w-10 h-10 rounded-full
                                   bg-white/20 backdrop-blur-sm hover:bg-white/30
                                   text-white transition-all duration-200 cursor-pointer">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
                        </svg>
                    </button>

                    <!-- Edit Button (Owner/Editor only) -->
                    <a th:if="${canEdit}"
                       th:href="@{/trip/{id}/edit(id=${trip.id})}"
                       aria-label="編輯行程"
                       class="flex items-center justify-center w-10 h-10 rounded-full
                              bg-white/20 backdrop-blur-sm hover:bg-white/30
                              text-white transition-all duration-200 cursor-pointer">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                        </svg>
                    </a>

                    <!-- More Options -->
                    <button type="button"
                            aria-label="更多選項"
                            class="flex items-center justify-center w-10 h-10 rounded-full
                                   bg-white/20 backdrop-blur-sm hover:bg-white/30
                                   text-white transition-all duration-200 cursor-pointer">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 -mt-8 relative z-10">
        <!-- Trip Info Card -->
        <div class="glass-card p-6 mb-6">
            <!-- Title and Description -->
            <div class="mb-4">
                <h1 class="text-h2 text-gray-800 dark:text-gray-100 font-heading mb-2"
                    th:text="${trip.title}">東京五日遊</h1>
                <p th:if="${trip.description}"
                   class="text-body text-gray-600 dark:text-gray-400"
                   th:text="${trip.description}">
                    探索日本首都的美食與文化
                </p>
            </div>

            <!-- Trip Meta Info -->
            <div class="flex flex-wrap items-center gap-4 text-sm text-gray-500 dark:text-gray-400">
                <!-- Date Range -->
                <div class="flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    <span>
                        <span th:text="${#temporals.format(trip.startDate, 'yyyy/MM/dd')}">2024/03/15</span>
                        -
                        <span th:text="${#temporals.format(trip.endDate, 'yyyy/MM/dd')}">2024/03/19</span>
                    </span>
                </div>

                <!-- Duration -->
                <div class="flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span th:text="${tripDays} + ' 天 ' + ${tripNights} + ' 夜'">5 天 4 夜</span>
                </div>

                <!-- Member Count -->
                <a th:href="@{/trip/{id}/members(id=${trip.id})}"
                   class="flex items-center gap-2 hover:text-primary-600 dark:hover:text-primary-400
                          transition-colors duration-200 cursor-pointer">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                    <span th:text="${memberCount} + ' 位成員'">5 位成員</span>
                </a>
            </div>

            <!-- Member Avatars -->
            <div class="flex items-center mt-4 pt-4 border-t border-gray-100 dark:border-gray-700">
                <div class="flex -space-x-2">
                    <th:block th:each="member, iterStat : ${members}" th:if="${iterStat.index < 5}">
                        <img th:if="${member.avatarUrl}"
                             th:src="${member.avatarUrl}"
                             th:alt="${member.displayName}"
                             class="w-8 h-8 rounded-full ring-2 ring-white dark:ring-gray-800 object-cover"/>
                        <span th:unless="${member.avatarUrl}"
                              class="w-8 h-8 rounded-full bg-primary-100 dark:bg-primary-900/30
                                     flex items-center justify-center text-xs font-medium
                                     text-primary-600 dark:text-primary-400
                                     ring-2 ring-white dark:ring-gray-800"
                              th:text="${#strings.substring(member.displayName, 0, 1)}">M</span>
                    </th:block>
                    <span th:if="${memberCount > 5}"
                          class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-700
                                 flex items-center justify-center text-xs font-medium
                                 text-gray-600 dark:text-gray-300
                                 ring-2 ring-white dark:ring-gray-800"
                          th:text="'+' + (${memberCount} - 5)">+2</span>
                </div>
                <a th:href="@{/trip/{id}/members(id=${trip.id})}"
                   class="ml-3 text-sm text-primary-600 dark:text-primary-400
                          hover:text-primary-700 dark:hover:text-primary-300
                          font-medium transition-colors duration-200 cursor-pointer">
                    管理成員
                </a>
            </div>
        </div>

        <!-- Quick Actions Grid -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
            <!-- Activities -->
            <a th:href="@{/trip/{id}/activities(id=${trip.id})}"
               class="glass-card p-4 text-center group hover:shadow-lg transition-all duration-200 cursor-pointer">
                <div class="w-12 h-12 mx-auto mb-3 rounded-full bg-primary-100 dark:bg-primary-900/30
                            flex items-center justify-center
                            group-hover:scale-110 transition-transform duration-200">
                    <svg class="w-6 h-6 text-primary-600 dark:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </div>
                <h3 class="text-sm font-semibold text-gray-800 dark:text-gray-100">景點</h3>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1"
                   th:text="${activityCount} + ' 個'">12 個</p>
            </a>

            <!-- Expenses -->
            <a th:href="@{/trip/{id}/expenses(id=${trip.id})}"
               class="glass-card p-4 text-center group hover:shadow-lg transition-all duration-200 cursor-pointer">
                <div class="w-12 h-12 mx-auto mb-3 rounded-full bg-adventure-100 dark:bg-adventure-900/30
                            flex items-center justify-center
                            group-hover:scale-110 transition-transform duration-200">
                    <svg class="w-6 h-6 text-adventure-600 dark:text-adventure-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                </div>
                <h3 class="text-sm font-semibold text-gray-800 dark:text-gray-100">分帳</h3>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1"
                   th:text="${expenseCount} + ' 筆'">8 筆</p>
            </a>

            <!-- Documents -->
            <a th:href="@{/trip/{id}/documents(id=${trip.id})}"
               class="glass-card p-4 text-center group hover:shadow-lg transition-all duration-200 cursor-pointer">
                <div class="w-12 h-12 mx-auto mb-3 rounded-full bg-success-light dark:bg-success/10
                            flex items-center justify-center
                            group-hover:scale-110 transition-transform duration-200">
                    <svg class="w-6 h-6 text-success dark:text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                </div>
                <h3 class="text-sm font-semibold text-gray-800 dark:text-gray-100">檔案</h3>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1"
                   th:text="${documentCount} + ' 個'">5 個</p>
            </a>

            <!-- Todos -->
            <a th:href="@{/trip/{id}/todos(id=${trip.id})}"
               class="glass-card p-4 text-center group hover:shadow-lg transition-all duration-200 cursor-pointer">
                <div class="w-12 h-12 mx-auto mb-3 rounded-full bg-warning-light dark:bg-warning/10
                            flex items-center justify-center
                            group-hover:scale-110 transition-transform duration-200">
                    <svg class="w-6 h-6 text-warning-dark dark:text-warning" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                    </svg>
                </div>
                <h3 class="text-sm font-semibold text-gray-800 dark:text-gray-100">代辦</h3>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1"
                   th:text="${todoCompletedCount} + '/' + ${todoCount}">3/10</p>
            </a>
        </div>

        <!-- Daily Schedule Preview -->
        <section class="mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-h4 text-gray-800 dark:text-gray-100 font-heading">行程概覽</h2>
                <a th:href="@{/trip/{id}/activities(id=${trip.id})}"
                   class="text-sm text-primary-600 dark:text-primary-400
                          hover:text-primary-700 dark:hover:text-primary-300
                          font-medium transition-colors duration-200 cursor-pointer">
                    查看全部
                </a>
            </div>

            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(upcomingActivities)}"
                 class="glass-card p-8 text-center">
                <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-gray-100 dark:bg-gray-800
                            flex items-center justify-center">
                    <svg class="w-8 h-8 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                              d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                              d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </div>
                <h3 class="text-base font-semibold text-gray-700 dark:text-gray-200 mb-2">
                    還沒有景點
                </h3>
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">
                    開始新增想去的景點吧！
                </p>
                <a th:if="${canEdit}"
                   th:href="@{/trip/{id}/activities/add(id=${trip.id})}"
                   class="btn-primary inline-flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    新增景點
                </a>
            </div>

            <!-- Activity List -->
            <div th:unless="${#lists.isEmpty(upcomingActivities)}" class="space-y-3">
                <div th:each="activity : ${upcomingActivities}"
                     class="glass-card p-4 flex items-center gap-4 group
                            hover:shadow-md transition-all duration-200 cursor-pointer">
                    <!-- Activity Order -->
                    <div class="w-10 h-10 flex-shrink-0 rounded-full
                                bg-primary-100 dark:bg-primary-900/30
                                flex items-center justify-center
                                text-primary-600 dark:text-primary-400 font-semibold text-sm"
                         th:text="${activity.orderIndex}">1</div>

                    <!-- Activity Info -->
                    <div class="flex-1 min-w-0">
                        <h4 class="font-medium text-gray-800 dark:text-gray-100 truncate"
                            th:text="${activity.placeName}">淺草寺</h4>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5"
                           th:text="${activity.formattedTime}">10:00 - 12:00</p>
                    </div>

                    <!-- Arrow -->
                    <svg class="w-5 h-5 text-gray-400 dark:text-gray-500
                                group-hover:text-gray-600 dark:group-hover:text-gray-300
                                group-hover:translate-x-1 transition-all duration-200"
                         fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </div>
            </div>
        </section>

        <!-- Expense Summary -->
        <section class="mb-6" th:if="${totalExpense != null && totalExpense > 0}">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-h4 text-gray-800 dark:text-gray-100 font-heading">支出摘要</h2>
                <a th:href="@{/trip/{id}/expenses(id=${trip.id})}"
                   class="text-sm text-primary-600 dark:text-primary-400
                          hover:text-primary-700 dark:hover:text-primary-300
                          font-medium transition-colors duration-200 cursor-pointer">
                    查看明細
                </a>
            </div>

            <div class="glass-card p-6">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-gray-600 dark:text-gray-400">總支出</span>
                    <span class="text-2xl font-bold text-gray-800 dark:text-gray-100 font-mono"
                          th:text="'$' + ${#numbers.formatDecimal(totalExpense, 0, 'COMMA', 0, 'POINT')}">$12,500</span>
                </div>
                <div class="flex items-center justify-between text-sm">
                    <span class="text-gray-500 dark:text-gray-400">人均支出</span>
                    <span class="text-gray-700 dark:text-gray-200 font-medium font-mono"
                          th:text="'$' + ${#numbers.formatDecimal(averageExpense, 0, 'COMMA', 0, 'POINT')}">$2,500</span>
                </div>
            </div>
        </section>
    </main>

    <!-- Floating Action Button (Editor/Owner) -->
    <button th:if="${canEdit}"
            type="button"
            aria-label="新增"
            class="fixed right-6 bottom-24 z-30
                   w-14 h-14 rounded-full
                   bg-adventure-500 hover:bg-adventure-600 active:bg-adventure-700
                   text-white shadow-lg shadow-adventure-500/30
                   flex items-center justify-center
                   transition-all duration-200 active:scale-95 cursor-pointer">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
    </button>

    <!-- Bottom Navigation -->
    <nav th:replace="~{fragments/components :: bottom-nav}"></nav>

    <!-- Scripts -->
    <script th:src="@{/js/app.js}" defer></script>
</body>
</html>
