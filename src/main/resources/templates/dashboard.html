<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WeGo - 協作旅遊規劃平台">
    <meta name="theme-color" content="#0EA5E9">

    <!-- Dark Mode FOUC Prevention (must be inline and before styles) -->
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (theme === 'dark' || (!theme && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <title>我的行程 - WeGo</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.2/dist/lottie-player.js" defer></script>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 pb-20">
    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl
                   border-b border-gray-100 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <a th:href="@{/dashboard}" class="flex items-center gap-2">
                    <span class="text-h4 text-primary-600 dark:text-primary-400 font-heading font-bold">WeGo</span>
                </a>

                <!-- User Avatar/Menu -->
                <div class="flex items-center gap-2">
                    <!-- Dark Mode Toggle -->
                    <button type="button"
                            aria-label="切換深色模式"
                            onclick="DarkMode.toggle(); this.querySelector('.icon-sun').classList.toggle('hidden'); this.querySelector('.icon-moon').classList.toggle('hidden');"
                            class="p-2 min-w-[44px] min-h-[44px] rounded-full cursor-pointer
                                   text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200
                                   hover:bg-gray-100 dark:hover:bg-gray-800
                                   transition-colors duration-200
                                   focus:outline-none focus:ring-2 focus:ring-primary-500/50">
                        <svg class="icon-sun w-6 h-6 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                        <svg class="icon-moon w-6 h-6 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>

                    <button aria-label="通知"
                            class="p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-200
                                   hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full
                                   transition-colors duration-200 cursor-pointer">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                    </button>
                    <a th:href="@{/profile}"
                       class="w-10 h-10 rounded-full bg-primary-100 dark:bg-primary-900/30
                              flex items-center justify-center
                              text-primary-600 dark:text-primary-400 font-medium
                              hover:ring-2 hover:ring-primary-500/50
                              transition-all duration-200 cursor-pointer overflow-hidden">
                        <img th:if="${picture}" th:src="${picture}" alt="Profile" class="w-full h-full object-cover">
                        <span th:unless="${picture}"
                              th:text="${name != null ? #strings.substring(name, 0, 1) : 'U'}">U</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- Welcome Section -->
        <section class="mb-8 animate-fade-in">
            <h1 class="text-h2 text-gray-800 dark:text-gray-100 mb-2 font-heading">
                <span th:text="${greeting != null ? greeting : '嗨'}">嗨</span>，<span th:text="${name}">User</span>
            </h1>
            <p class="text-body text-gray-500 dark:text-gray-400">準備開始規劃下一趟旅程了嗎？</p>
        </section>

        <!-- Quick Actions -->
        <section class="mb-8">
            <a th:href="@{/trips/create}" class="btn-cta inline-flex items-center gap-2"
               aria-label="建立新行程">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                建立新行程
            </a>
        </section>

        <!-- Upcoming Trips -->
        <section th:if="${upcomingTrips != null and !upcomingTrips.isEmpty()}" class="mb-8">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-h4 text-gray-800 dark:text-gray-100 font-heading">即將出發</h2>
            </div>
            <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                <a th:each="trip : ${upcomingTrips}" th:href="@{/trips/{id}(id=${trip.id})}"
                   class="glass-card group hover:shadow-card-hover transition-all duration-200 cursor-pointer overflow-hidden">
                    <!-- Cover Image -->
                    <div class="relative h-40 bg-gradient-to-br from-primary-400 to-primary-600">
                        <img th:if="${trip.coverImageUrl}" th:src="${trip.coverImageUrl}"
                             th:alt="${trip.title + ' 封面圖片'}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
                        <!-- Days Until -->
                        <div th:if="${trip.daysUntil != null}"
                             class="absolute top-3 right-3 bg-white/90 dark:bg-gray-800/90 rounded-lg px-2 py-1 text-caption font-medium">
                            <span th:if="${trip.daysUntil == 0}" class="text-adventure-500">今天出發!</span>
                            <span th:if="${trip.daysUntil == 1}" class="text-adventure-500">明天出發</span>
                            <span th:if="${trip.daysUntil > 1}" th:text="'還有 ' + ${trip.daysUntil} + ' 天'"
                                  class="text-gray-700 dark:text-gray-200"></span>
                        </div>
                    </div>
                    <!-- Info -->
                    <div class="p-4">
                        <h3 class="text-body font-semibold text-gray-800 dark:text-gray-100 mb-1 group-hover:text-primary-600 transition-colors"
                            th:text="${trip.title}">行程名稱</h3>
                        <p class="text-body-sm text-gray-500 dark:text-gray-400"
                           th:text="${#temporals.format(trip.startDate, 'M/d')} + ' - ' + ${#temporals.format(trip.endDate, 'M/d')}">
                            1/15 - 1/20
                        </p>
                        <!-- Members -->
                        <div class="flex items-center gap-2 mt-3">
                            <div class="flex -space-x-2">
                                <span th:each="member, iterStat : ${trip.members}" th:if="${iterStat.index < 3}"
                                      class="w-6 h-6 rounded-full bg-primary-100 dark:bg-primary-900/30
                                             flex items-center justify-center text-caption text-primary-600
                                             dark:text-primary-400 border-2 border-white dark:border-gray-800"
                                      th:text="${member.nickname?.length() > 0 ? #strings.substring(member.nickname, 0, 1) : 'U'}">M</span>
                            </div>
                            <span th:if="${#lists.size(trip.members) > 3}"
                                  class="text-caption text-gray-400"
                                  th:text="'+' + (${#lists.size(trip.members)} - 3)">+2</span>
                        </div>
                    </div>
                </a>
            </div>
        </section>

        <!-- All Trips -->
        <section th:if="${trips != null and !trips.isEmpty()}">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-h4 text-gray-800 dark:text-gray-100 font-heading">所有行程</h2>
                <a th:href="@{/trips}" class="text-body-sm text-primary-600 hover:text-primary-700 font-medium">
                    查看全部
                </a>
            </div>
            <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                <a th:each="trip : ${trips}" th:href="@{/trips/{id}(id=${trip.id})}"
                   class="glass-card group hover:shadow-card-hover transition-all duration-200 cursor-pointer overflow-hidden">
                    <!-- Cover Image -->
                    <div class="relative h-32 bg-gradient-to-br from-gray-300 to-gray-400 dark:from-gray-600 dark:to-gray-700">
                        <img th:if="${trip.coverImageUrl}" th:src="${trip.coverImageUrl}"
                             th:alt="${trip.title + ' 封面圖片'}" class="w-full h-full object-cover">
                    </div>
                    <!-- Info -->
                    <div class="p-4">
                        <h3 class="text-body font-semibold text-gray-800 dark:text-gray-100 mb-1 group-hover:text-primary-600 transition-colors"
                            th:text="${trip.title}">行程名稱</h3>
                        <p class="text-body-sm text-gray-500 dark:text-gray-400"
                           th:text="${#temporals.format(trip.startDate, 'yyyy/M/d')} + ' - ' + ${#temporals.format(trip.endDate, 'M/d')}">
                            2024/1/15 - 1/20
                        </p>
                    </div>
                </a>
            </div>
        </section>

        <!-- Empty State -->
        <section th:if="${trips == null or trips.isEmpty()}" class="glass-card p-8 text-center animate-fade-in">
            <div class="w-24 h-24 mx-auto mb-4 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center">
                <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <h3 class="text-h4 text-gray-700 dark:text-gray-200 mb-2 font-heading">還沒有任何行程</h3>
            <p class="text-body-sm text-gray-500 dark:text-gray-400 mb-6">建立您的第一個行程，開始規劃下一次冒險！</p>
            <a th:href="@{/trips/create}" class="btn-primary" aria-label="建立第一個行程">
                開始規劃
            </a>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="flex justify-around max-w-md mx-auto">
            <!-- Dashboard -->
            <a th:href="@{/dashboard}" class="bottom-nav-item active">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span class="text-xs mt-1">行程</span>
            </a>

            <!-- Expenses -->
            <a th:href="@{/expenses}" class="bottom-nav-item">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                <span class="text-xs mt-1">分帳</span>
            </a>

            <!-- Add Button -->
            <button aria-label="新增"
                    class="-mt-5 w-14 h-14 bg-adventure-500 hover:bg-adventure-600
                           rounded-full text-white shadow-lg shadow-adventure-500/30
                           flex items-center justify-center
                           transition-all duration-200 active:scale-95 cursor-pointer">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
            </button>

            <!-- Documents -->
            <a th:href="@{/documents}" class="bottom-nav-item">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <span class="text-xs mt-1">檔案</span>
            </a>

            <!-- Profile -->
            <a th:href="@{/profile}" class="bottom-nav-item">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <span class="text-xs mt-1">我的</span>
            </a>
        </div>
    </nav>

    <!-- Scripts -->
    <script th:src="@{/js/app.js}" defer></script>
</body>
</html>
