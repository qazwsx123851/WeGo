<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='找不到頁面')}">
    <!-- Static fallback if Thymeleaf fails -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找不到頁面 - WeGo</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-primary-50 via-white to-sky-100
             dark:from-gray-900 dark:via-gray-900 dark:to-gray-800
             flex flex-col items-center justify-center p-6">
    <div class="text-center max-w-md mx-auto animate-fade-in">
        <!-- Lost Traveler Illustration -->
        <div class="w-64 h-64 mx-auto mb-6 flex items-center justify-center" aria-hidden="true">
            <svg class="w-48 h-48 animate-pulse-slow" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Map background -->
                <rect x="30" y="40" width="140" height="120" rx="12" class="fill-primary-100 dark:fill-primary-900/30"/>
                <rect x="30" y="40" width="140" height="120" rx="12" class="stroke-primary-300 dark:stroke-primary-600" stroke-width="2" fill="none"/>
                <!-- Map fold lines -->
                <line x1="80" y1="40" x2="80" y2="160" class="stroke-primary-200 dark:stroke-primary-700" stroke-width="1.5" stroke-dasharray="4 4"/>
                <line x1="130" y1="40" x2="130" y2="160" class="stroke-primary-200 dark:stroke-primary-700" stroke-width="1.5" stroke-dasharray="4 4"/>
                <!-- Path on map -->
                <path d="M50 130 Q70 90 100 100 T150 80" class="stroke-adventure-400" stroke-width="3" stroke-linecap="round" fill="none" stroke-dasharray="6 4"/>
                <!-- Location pin -->
                <g transform="translate(95, 60)">
                    <path d="M10 0C4.477 0 0 4.477 0 10c0 8 10 18 10 18s10-10 10-18c0-5.523-4.477-10-10-10z" class="fill-adventure-500"/>
                    <circle cx="10" cy="10" r="4" class="fill-white"/>
                </g>
                <!-- Question mark -->
                <g transform="translate(140, 20)">
                    <circle cx="16" cy="16" r="16" class="fill-warning/20"/>
                    <text x="16" y="22" text-anchor="middle" class="fill-warning-dark dark:fill-warning" font-size="20" font-weight="bold">?</text>
                </g>
                <!-- Dotted search path -->
                <circle cx="55" cy="125" r="3" class="fill-primary-400"/>
                <circle cx="150" cy="75" r="3" class="fill-adventure-400"/>
            </svg>
        </div>

        <!-- Error Message -->
        <div class="glass-card p-8">
            <h1 class="text-h2 text-gray-800 dark:text-gray-100 mb-3 font-heading">
                找不到這個頁面
            </h1>
            <p class="text-body text-gray-500 dark:text-gray-400 mb-6">
                這個行程可能已被刪除，或是連結有誤。<br/>
                讓我們帶你回到正確的路線上吧！
            </p>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a th:href="@{/dashboard}" class="btn-cta">
                    <svg class="w-5 h-5 mr-2 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    回到我的行程
                </a>
                <button onclick="history.back()" class="btn-text">
                    <svg class="w-5 h-5 mr-2 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                    </svg>
                    返回上一頁
                </button>
            </div>
        </div>

        <!-- Error Code -->
        <p class="text-caption text-gray-400 dark:text-gray-500 mt-6">
            錯誤代碼：404
        </p>
    </div>
</body>
</html>
