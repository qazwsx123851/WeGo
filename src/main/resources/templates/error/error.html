<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${errorTitle != null ? errorTitle + ' - WeGo' : '錯誤 - WeGo'}">錯誤 - WeGo</title>
    <!-- Dark Mode FOUC Prevention -->
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (theme === 'dark' || (!theme && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-primary-50 via-white to-sky-100 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 flex flex-col items-center justify-center p-6">
    <div class="text-center max-w-md mx-auto animate-fade-in">
        <!-- Error Icon - Dynamic based on error type -->
        <div class="w-48 h-48 mx-auto mb-6 flex items-center justify-center">
            <!-- 404: Map/Search Icon -->
            <svg th:if="${statusCode == 404}"
                 class="w-32 h-32 text-primary-400 dark:text-primary-500"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
            </svg>

            <!-- 403: Lock Icon -->
            <svg th:if="${statusCode == 403}"
                 class="w-32 h-32 text-warning dark:text-yellow-500"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>

            <!-- 401: User Icon -->
            <svg th:if="${statusCode == 401}"
                 class="w-32 h-32 text-gray-400 dark:text-gray-500"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>

            <!-- 500 and others: Warning Icon -->
            <svg th:if="${statusCode != 404 and statusCode != 403 and statusCode != 401}"
                 class="w-32 h-32 text-error dark:text-red-400"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>

        <!-- Error Message Card -->
        <div class="glass-card p-8">
            <!-- Dynamic Title -->
            <h1 class="text-h2 text-gray-800 dark:text-white mb-3 font-heading"
                th:text="${errorTitle != null ? errorTitle : '發生錯誤'}">
                發生錯誤
            </h1>

            <!-- Dynamic Description -->
            <p class="text-body text-gray-500 dark:text-gray-400 mb-6"
               th:text="${errorMessage != null ? errorMessage : '發生了未預期的錯誤，請稍後再試。'}">
                發生了未預期的錯誤，請稍後再試。
            </p>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <!-- Primary action based on error type -->
                <th:block th:switch="${statusCode}">
                    <!-- 401: Login button -->
                    <a th:case="401" th:href="@{/oauth2/authorization/google}" class="btn-cta">
                        <svg class="w-5 h-5 mr-2 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                        </svg>
                        登入
                    </a>

                    <!-- 500+: Refresh button -->
                    <button th:case="*" th:if="${statusCode >= 500}" onclick="location.reload()" class="btn-cta">
                        <svg class="w-5 h-5 mr-2 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        重新整理
                    </button>

                    <!-- 403, 404, others: Dashboard button -->
                    <a th:case="*" th:if="${statusCode < 500}" th:href="@{/dashboard}" class="btn-cta">
                        <svg class="w-5 h-5 mr-2 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                        </svg>
                        回到我的行程
                    </a>
                </th:block>

                <!-- Secondary action: Go back -->
                <button onclick="history.back()" class="btn-text">
                    <svg class="w-5 h-5 mr-2 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                    </svg>
                    返回上一頁
                </button>
            </div>
        </div>

        <!-- Technical Details (expandable, for debugging) -->
        <th:block th:if="${errorDetails != null or errorCode != null}">
            <div class="mt-6 text-left">
                <details class="glass-card p-4">
                    <summary class="text-body-sm text-gray-600 dark:text-gray-400 cursor-pointer font-medium">
                        技術詳情
                    </summary>
                    <div class="mt-3 space-y-2 text-caption text-gray-500 dark:text-gray-500 bg-gray-100 dark:bg-gray-800 p-3 rounded-lg overflow-x-auto">
                        <p th:if="${errorCode != null}">
                            <span class="font-medium">錯誤代碼：</span>
                            <code th:text="${errorCode}">ERROR_CODE</code>
                        </p>
                        <p th:if="${requestUri != null}">
                            <span class="font-medium">請求路徑：</span>
                            <code th:text="${requestUri}">/path</code>
                        </p>
                        <p th:if="${errorDetails != null}">
                            <span class="font-medium">詳細資訊：</span>
                            <code th:text="${errorDetails}">Details</code>
                        </p>
                        <p th:if="${timestamp != null}">
                            <span class="font-medium">時間：</span>
                            <code th:text="${timestamp}">2024-01-01 00:00:00</code>
                        </p>
                    </div>
                </details>
            </div>
        </th:block>

        <!-- Error Code Footer -->
        <p class="text-caption text-gray-400 dark:text-gray-500 mt-6">
            錯誤代碼：<span th:text="${statusCode != null ? statusCode : '未知'}">500</span>
        </p>
    </div>

</body>
</html>
