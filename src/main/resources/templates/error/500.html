<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統錯誤 - WeGo</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.2/dist/lottie-player.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-primary-50 via-white to-sky-100 flex flex-col items-center justify-center p-6">
    <div class="text-center max-w-md mx-auto animate-fade-in">
        <!-- Lottie Animation: Error/Broken -->
        <div class="w-64 h-64 mx-auto mb-6">
            <lottie-player
                src="https://lottie.host/embed/error-animation/error.json"
                background="transparent"
                speed="1"
                loop
                autoplay
                aria-hidden="true">
            </lottie-player>
            <!-- Fallback SVG -->
            <noscript>
                <svg class="w-48 h-48 mx-auto text-error" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </noscript>
        </div>

        <!-- Error Message -->
        <div class="glass-card p-8">
            <h1 class="text-h2 text-gray-800 mb-3 font-heading">
                哎呀！出了點問題
            </h1>
            <p class="text-body text-gray-500 mb-6">
                伺服器遇到了一些技術問題。<br/>
                請稍後再試，或聯繫我們的支援團隊。
            </p>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <button onclick="location.reload()" class="btn-cta">
                    <svg class="w-5 h-5 mr-2 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    重新整理
                </button>
                <a th:href="@{/dashboard}" class="btn-text">
                    <svg class="w-5 h-5 mr-2 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    回到首頁
                </a>
            </div>
        </div>

        <!-- Error Details (Only in dev) -->
        <div th:if="${exception != null}" class="mt-6 text-left">
            <details class="glass-card p-4">
                <summary class="text-body-sm text-gray-600 cursor-pointer font-medium">
                    技術詳情
                </summary>
                <pre class="mt-3 text-caption text-gray-500 overflow-x-auto bg-gray-100 p-3 rounded-lg">
                    <code th:text="${exception.message}">Error message here</code>
                </pre>
            </details>
        </div>

        <!-- Error Code -->
        <p class="text-caption text-gray-400 mt-6">
            錯誤代碼：500
        </p>
    </div>
</body>
</html>
