<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='伺服器錯誤')}">
    <!-- Static fallback if Thymeleaf fails -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伺服器錯誤 - WeGo</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-primary-50 via-white to-sky-100
             dark:from-gray-900 dark:via-gray-900 dark:to-gray-800
             flex flex-col items-center justify-center p-6">
    <div class="text-center max-w-md mx-auto animate-fade-in">
        <!-- Server Error Illustration -->
        <div class="w-64 h-64 mx-auto mb-6 flex items-center justify-center" aria-hidden="true">
            <svg class="w-48 h-48 animate-pulse-slow" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Server box -->
                <rect x="50" y="50" width="100" height="110" rx="12" class="fill-gray-100 dark:fill-gray-800"/>
                <rect x="50" y="50" width="100" height="110" rx="12" class="stroke-gray-300 dark:stroke-gray-600" stroke-width="2" fill="none"/>
                <!-- Server slots -->
                <rect x="65" y="70" width="50" height="8" rx="4" class="fill-gray-300 dark:fill-gray-600"/>
                <circle cx="130" cy="74" r="4" class="fill-error animate-pulse"/>
                <rect x="65" y="95" width="50" height="8" rx="4" class="fill-gray-300 dark:fill-gray-600"/>
                <circle cx="130" cy="99" r="4" class="fill-warning"/>
                <rect x="65" y="120" width="50" height="8" rx="4" class="fill-gray-300 dark:fill-gray-600"/>
                <circle cx="130" cy="124" r="4" class="fill-gray-300 dark:fill-gray-600"/>
                <!-- Lightning bolt (error) -->
                <g transform="translate(130, 25)">
                    <path d="M20 0L8 18h8L12 36l16-20h-8z" class="fill-warning"/>
                </g>
                <!-- Exclamation circle -->
                <g transform="translate(25, 30)">
                    <circle cx="16" cy="16" r="16" class="fill-error/20"/>
                    <text x="16" y="22" text-anchor="middle" class="fill-error" font-size="22" font-weight="bold">!</text>
                </g>
            </svg>
        </div>

        <!-- Error Message -->
        <div class="glass-card p-8">
            <h1 class="text-h2 text-gray-800 dark:text-gray-100 mb-3 font-heading">
                哎呀！出了點問題
            </h1>
            <p class="text-body text-gray-500 dark:text-gray-400 mb-6">
                伺服器遇到了一些技術問題。<br/>
                請稍後再試，或聯繫我們的支援團隊。
            </p>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <button onclick="location.reload()" class="btn-cta">
                    <svg class="w-5 h-5 mr-2 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    重新整理
                </button>
                <a th:href="@{/dashboard}" class="btn-text">
                    <svg class="w-5 h-5 mr-2 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    回到首頁
                </a>
            </div>
        </div>

        <!-- Error Details (Only in dev) -->
        <div th:if="${error != null or message != null}" class="mt-6 text-left">
            <details class="glass-card p-4">
                <summary class="text-body-sm text-gray-600 dark:text-gray-400 cursor-pointer font-medium">
                    技術詳情
                </summary>
                <pre class="mt-3 text-caption text-gray-500 dark:text-gray-400 overflow-x-auto bg-gray-100 dark:bg-gray-800 p-3 rounded-lg">
                    <code th:text="${message != null ? message : (error != null ? error : '未知錯誤')}">Error message here</code>
                </pre>
            </details>
        </div>

        <!-- Error Code -->
        <p class="text-caption text-gray-400 dark:text-gray-500 mt-6">
            錯誤代碼：500
        </p>
    </div>
</body>
</html>
